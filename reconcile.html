  .wh-breakdown { margin-top: 12px; }

  .wh-name { font-weight: 500; display: flex; align-items: center; gap: 6px; }
  .wh-qty { font-family: 'IBM Plex Mono', monospace; font-weight: 500; }

  .fsc.s-ok { border-left: 4px solid var(--green); } .fsc.s-warn { border-left: 4px solid var(--amber); }
  .fsc.s-err { border-left: 4px solid var(--red); } .fsc.s-critical { border-left: 4px solid var(--critical); }

<body>
<header>
  <div class="logo-wrap">
    <div class="company-name">FCS Can Ltd.</div>
    <div class="hdr-div"></div>
    <div>
      <div class="app-name">Accounting Reconciliation</div>
      <div class="tagline">Physical vs Official Accounting Stock · Since 2023-08-23</div>
    </div>
  </div>
  <div class="hdr-actions">
    <span class="sync-status" id="sync-status"></span>
    <button class="btn-hdr" onclick="syncNow()" id="sync-btn">↺ Sync Now</button>
    <button class="btn-hdr" onclick="init()">⟳ Refresh</button>
  </div>
</header>
<div class="container">
  <div id="main-content">
    <div class="loading-screen">
      <div class="loading-bar"><div class="loading-fill"></div></div>
      <div class="loading-text" id="load-msg">Loading data...</div>
    </div>
  </div>
</div>
<script>
const SHEET_ID = "1j6D_5NN07ovQa62wVvWs_7n6uXjystpVNHoJFsNe32Y"
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxoIXJThmwWxpa7_6iR1x_HqAR9Vjk14DEddoz_dFc5ZVbcXk8bm1GJykmOBThjicq_Ww/exec"
const INACTIVE_WAREHOUSES = ["fcs consignment delta"]
let allData = [], activeFilter = "discrepancy", searchTerm = "", sortBy = "value_diff", openRows = new Set()

function getFiscalYearEnd() {
  const now = new Date()
  const year = now.getMonth() < 2 ? now.getFullYear() - 1 : now.getFullYear()
  return new Date(year, 2, 31)
}

function isFiscalYearClosed(dateStr) {
  if (!dateStr) return false
  const d = parseDate(dateStr)
  if (!d) return false
  return d <= getFiscalYearEnd()
}

async function syncNow() {
  const btn = document.getElementById("sync-btn")
  const status = document.getElementById("sync-status")
  btn.classList.add("syncing"); btn.textContent = "Syncing..."
  status.textContent = "Syncing Stock..."
  try {
    await fetch(`${APPS_SCRIPT_URL}?action=syncStock`, { mode: "no-cors" })
    status.textContent = "Stock done. Syncing Valuation..."
    await new Promise(r => setTimeout(r, 3000))
    await fetch(`${APPS_SCRIPT_URL}?action=syncValuation`, { mode: "no-cors" })
    status.textContent = "Done. Refreshing..."
    await new Promise(r => setTimeout(r, 2000))
    status.textContent = ""; btn.classList.remove("syncing"); btn.textContent = "↺ Sync Now"
    init()
  } catch(e) {
    status.textContent = "Sync failed"
    btn.classList.remove("syncing"); btn.textContent = "↺ Sync Now"
  }
}

function parseDate(v) {
  if (!v) return null
  if (typeof v === "string") {
    const m = v.match(/Date\((\d+),(\d+),(\d+)/)
    if (m) return new Date(parseInt(m[1]), parseInt(m[2]), parseInt(m[3]))
    if (v.match(/^\d{4}-\d{2}-\d{2}/)) return new Date(v)
  }
  if (typeof v === "number") return new Date(v)
  return null
}
function fmtDate(v) { const d = parseDate(v); if (!d) return "—"; return d.toLocaleDateString("en-CA") }
function dateStr(v) { const d = parseDate(v); if (!d) return ""; return d.toISOString().substring(0,10) }

async function readSheet(name) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(name)}&headers=1`
  const res = await fetch(url)
  const text = await res.text()
  const m = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)
  if (!m) throw new Error(`Cannot read: ${name}`)
  const json = JSON.parse(m[1])
  if (!json.table || !json.table.rows) return []
  const cols = json.table.cols.map(c => c.label || "")
  return json.table.rows.map(r => {
    const o = {}
    cols.forEach((c, i) => { o[c] = r.c[i]?.v ?? "" })
    return o
  })
}

async function init() {
  setMsg("Loading data...")
  try {
    const [stockRows, valRows, billRows, invoiceRows, creditNoteRows, movRows] = await Promise.all([
      readSheet("Stock"), readSheet("Valuation"),
      readSheet("Bills"), readSheet("Invoices"), readSheet("CreditNotes"), readSheet("Sheet1")
    ])
    setMsg("Calculating...")
    allData = buildReconciliation(stockRows, valRows, billRows, invoiceRows, creditNoteRows, movRows)
    renderTable()
  } catch(e) {
    document.getElementById("main-content").innerHTML = `<div class="error-box"><strong>Error:</strong> ${e.message}</div>`
  }
}

function setMsg(msg) {
  const el = document.getElementById("load-msg")
  if (el) { el.textContent = msg; return }
  document.getElementById("main-content").innerHTML = `<div class="loading-screen"><div class="loading-bar"><div class="loading-fill"></div></div><div class="loading-text" id="load-msg">${msg}</div></div>`
}

function isInactiveWh(name) { return INACTIVE_WAREHOUSES.includes(String(name || "").toLowerCase().trim()) }

function buildReconciliation(stockRows, valRows, billRows, invoiceRows, creditNoteRows, movRows) {
  const physBySku = {}, nameBySku = {}, stockDateBySku = {}, whStockBySku = {}
  stockRows.forEach(r => {
    const sku = norm(r.sku); if (!sku) return
    physBySku[sku] = (physBySku[sku] || 0) + flt(r.physical_stock)
    if (r.item_name) nameBySku[sku] = r.item_name
    const d = dateStr(r.last_updated); if (d) stockDateBySku[sku] = d
    if (!whStockBySku[sku]) whStockBySku[sku] = []
    whStockBySku[sku].push({ warehouse_name: String(r.warehouse_name || ""), warehouse_status: String(r.warehouse_status || "active"), qty: flt(r.physical_stock) })
  })

  const accBySku = {}, valValueBySku = {}, unitCostBySku = {}, valDateBySku = {}
  valRows.forEach(r => {
    const sku = norm(r.sku); if (!sku) return
    accBySku[sku] = (accBySku[sku] || 0) + flt(r.valuation_qty)
    valValueBySku[sku] = (valValueBySku[sku] || 0) + flt(r.inventory_value)
    if (flt(r.unit_cost) > 0) unitCostBySku[sku] = flt(r.unit_cost)
    const d = dateStr(r.as_of_date); if (d) valDateBySku[sku] = d
  })

  const billsBySku = {}
  billRows.forEach(r => {
    const sku = norm(r.sku); if (!sku) return
    if (!billsBySku[sku]) billsBySku[sku] = []
    billsBySku[sku].push({ number: r.bill_number || "", date: r.date || "", qty: flt(r.qty), receive_id: r.receive_id || "", receive_number: r.receive_number || "", po_number: r.po_number || "", status: String(r.status || "").toLowerCase() })
  })

  const invoicesBySku = {}, invoicesBySo = {}
  invoiceRows.forEach(r => {
    const sku = norm(r.sku); if (!sku) return
    const soNum = String(r.so_number || "").trim()
    if (!invoicesBySku[sku]) invoicesBySku[sku] = []
    const inv = { number: r.invoice_number || "", date: r.date || "", qty: flt(r.qty), so_number: soNum, status: String(r.status || "").toLowerCase(), invoice_id: String(r.invoice_id || "") }
    invoicesBySku[sku].push(inv)
    if (soNum) { if (!invoicesBySo[soNum]) invoicesBySo[soNum] = []; invoicesBySo[soNum].push(inv) }
  })

  const creditNotesBySku = {}, creditNotesByInvoice = {}
  creditNoteRows.forEach(r => {
    const sku = norm(r.sku); if (!sku) return
    const invoiceId = String(r.invoice_id || "").trim()
    if (!creditNotesBySku[sku]) creditNotesBySku[sku] = []
    const cn = { number: r.creditnote_number || "", date: r.date || "", qty: flt(r.qty), invoice_id: invoiceId, so_number: String(r.so_number || "").trim(), status: String(r.status || "").toLowerCase() }
    creditNotesBySku[sku].push(cn)
    if (invoiceId) { if (!creditNotesByInvoice[invoiceId]) creditNotesByInvoice[invoiceId] = []; creditNotesByInvoice[invoiceId].push(cn) }
  })

  const receivesBySku = {}, shipmentsBySku = {}, adjBySku = {}
  movRows.forEach(r => {
    const sku = norm(r.sku); if (!sku) return
    const mod = String(r.module || "")
    const qty = flt(r.quantity) || flt(r.qty_received) || flt(r.quantity_packed) || flt(r.quantity_adjusted) || 0
    const soNum = String(r.so_number || "").trim()
    const doc = { number: r.doc_number || "", date: r.timestamp || r.date || "", qty, status: String(r.status || ""), so_number: soNum }
    if (mod === "Purchase Receive") { if (!receivesBySku[sku]) receivesBySku[sku] = []; receivesBySku[sku].push(doc) }
    if (mod === "Shipment" || mod === "Force Fulfill") { if (!shipmentsBySku[sku]) shipmentsBySku[sku] = []; shipmentsBySku[sku].push({...doc, force: mod==="Force Fulfill"}) }
    if (mod === "Inventory Adjustment") { if (!adjBySku[sku]) adjBySku[sku] = []; adjBySku[sku].push(doc) }
  })

  const allSkus = new Set([...Object.keys(physBySku), ...Object.keys(accBySku)])
  return [...allSkus].filter(s => s && s !== "SKU" && s !== "sku").map(sku => {
    const physical = physBySku[sku] ?? 0
    const accounting = accBySku[sku] ?? null
    const hasValuation = accounting !== null
    const diff = hasValuation ? physical - accounting : null
    const isAccountingNegative = hasValuation && accounting < 0

    const bills = billsBySku[sku] || []
    const invoices = invoicesBySku[sku] || []
    const receives = receivesBySku[sku] || []
    const shipments = shipmentsBySku[sku] || []
    const adjustments = adjBySku[sku] || []
    const whStock = whStockBySku[sku] || []
    const creditNotes = creditNotesBySku[sku] || []

    const draftBills = bills.filter(b => b.status === "draft")
    const activeBills = bills.filter(b => b.status !== "draft")
    const draftInvoices = invoices.filter(i => i.status === "draft")
    const activeInvoices = invoices.filter(i => i.status !== "draft")
    const activeCreditNotes = creditNotes.filter(c => c.status !== "void")

    const billQty = activeBills.reduce((s,b) => s+b.qty, 0)
    const invoiceQty = activeInvoices.reduce((s,i) => s+i.qty, 0)
    const creditNoteQty = activeCreditNotes.reduce((s,c) => s+c.qty, 0)
    const estAccounting = billQty - invoiceQty + creditNoteQty
    const draftBillQty = draftBills.reduce((s,b) => s+b.qty, 0)
    const draftInvoiceQty = draftInvoices.reduce((s,i) => s+i.qty, 0)
    const projectedAccounting = hasValuation ? accounting + draftBillQty - draftInvoiceQty : null
    const projectedDiff = projectedAccounting !== null ? physical - projectedAccounting : null

    const receivedQty = receives.reduce((s,r) => s+r.qty, 0)
    const shippedQty = shipments.reduce((s,s2) => s+s2.qty, 0)

    // Extract PR number from doc_number or bill_number for matching
    function extractPR(str) {
      const m = String(str || "").match(/PR-\d+/)
      return m ? m[0] : ""
    }

    const receivePRNumbers = new Set(receives.map(r => extractPR(r.number)).filter(Boolean))
    const billsNoReceive = activeBills.filter(b => {
      if (b.receive_id) return false // already linked
      const prFromBill = extractPR(b.number)
      if (prFromBill && receivePRNumbers.has(prFromBill)) return false // matched by PR number
      return true
    })
    const shipmentsWithSO = shipments.filter(s => s.so_number && s.so_number.trim() !== "")
    const invoicedSOs = new Set(activeInvoices.map(i => i.so_number).filter(Boolean))
    const shipmentsNoInvoice = shipmentsWithSO.filter(s => !invoicedSOs.has(s.so_number))
    const shippedSOs = new Set(shipmentsWithSO.map(s => s.so_number).filter(Boolean))
    const invoicesNoShipment = activeInvoices.filter(i => {
      if (!i.so_number) return true
      if (shippedSOs.has(i.so_number)) return false
      const cns = (creditNotesByInvoice[i.invoice_id] || []).filter(c => c.status !== "void")
      return cns.reduce((s,c) => s+c.qty, 0) < i.qty
    })

    const inactiveWhPhysical = whStock.filter(w => isInactiveWh(w.warehouse_name) && w.qty !== 0)
    const hasInactiveWhIssue = inactiveWhPhysical.length > 0
    const hasOnlyAdjustmentsNoDocuments = adjustments.length > 0 && activeBills.length === 0 && receives.length === 0

    const unitCost = unitCostBySku[sku] || (hasValuation && accounting > 0 ? (valValueBySku[sku]||0)/accounting : 0)
    const valueDiff = diff !== null ? diff * unitCost : null
    const stockDate = stockDateBySku[sku] || ""
    const valDate = valDateBySku[sku] || ""
    const dateMismatch = stockDate && valDate && stockDate !== valDate

    let primaryCause = "ok"
    if (!hasValuation) primaryCause = "no-valuation"
    else if (diff !== null && diff !== 0) {
      if (dateMismatch) primaryCause = "date-mismatch"
      else if (isAccountingNegative) primaryCause = "critical"
      else if (hasInactiveWhIssue) primaryCause = "inactive-warehouse"
      else if (draftBills.length > 0 || draftInvoices.length > 0) primaryCause = "draft-pending"
      else if (diff > 0 && receives.length > 0 && activeBills.length === 0) primaryCause = "receive-no-bill"
      else if (diff > 0 && invoicesNoShipment.length > 0) primaryCause = "invoice-no-shipment"
      else if (diff < 0 && billsNoReceive.length > 0) primaryCause = "bill-no-receive"
      else if (diff < 0 && shipmentsNoInvoice.length > 0) primaryCause = "shipment-no-invoice"
      else if (hasOnlyAdjustmentsNoDocuments) primaryCause = "opening-balance"
      else primaryCause = "multiple"
    }

    return {
      sku, name: nameBySku[sku] || "", physical, accounting, hasValuation,
      diff, unitCost, valueDiff, estAccounting,
      projectedAccounting, projectedDiff, draftBillQty, draftInvoiceQty,
      isAccountingNegative, dateMismatch, stockDate, valDate,
      bills, activeBills, draftBills, invoices, activeInvoices, draftInvoices,
      creditNotes, activeCreditNotes, creditNoteQty,
      receives, shipments, adjustments, whStock,
      billQty, invoiceQty, receivedQty, shippedQty,
      billsNoReceive, invoicesNoShipment, shipmentsNoInvoice,
      inactiveWhPhysical, hasInactiveWhIssue, hasOnlyAdjustmentsNoDocuments,
      primaryCause, inventoryValue: valValueBySku[sku] || 0
    }
  })
}

function assessRisk(item) {
  if (item.isAccountingNegative) return "critical"
  if (item.dateMismatch) return "gray"
  if (!item.hasValuation) return "gray"
  if (item.diff === 0) return "green"
  const hasPaidDocs = [...item.activeBills, ...item.activeInvoices].some(d => d.status === "paid" || d.status === "partially_paid")
  const oldestDoc = [...item.activeBills, ...item.activeInvoices, ...item.receives].map(d => d.date).filter(Boolean).sort()[0]
  if (oldestDoc && isFiscalYearClosed(oldestDoc)) return "red"
  if (hasPaidDocs && Math.abs(item.diff) > 100) return "red"
  if (item.hasInactiveWhIssue) return "amber"
  if (item.hasOnlyAdjustmentsNoDocuments) return "red"
  if (Math.abs(item.valueDiff || 0) > 5000) return "amber"
  return "green"
}

function riskLabel(r) {
  return { green:"🟢 Low Risk — Operational", amber:"🟡 Medium Risk — Manager Review", red:"🔴 High Risk — Accounting Approval", gray:"⚪ No Action Yet — Validate First", critical:"🔴 Critical — Do Not Adjust" }[r] || "⚪ Review"
}

function riskClass(r) {
  return { green:"rp-green", amber:"rp-amber", red:"rp-red", gray:"rp-gray", critical:"rp-critical" }[r] || "rp-gray"
}

function buildCorrectionDecision(item) {
  const risk = assessRisk(item)
  const diff = item.diff
  let suggestedAction = "", reasonForRisk = "", financialImpact = [], fiscalImpact = "", approvalRequired = "", docsToReview = [], doNotDo = []

  const oldestDocDate = [...item.activeBills, ...item.activeInvoices, ...item.receives].map(d => d.date).filter(Boolean).sort()[0]
  const isClosedPeriod = oldestDocDate ? isFiscalYearClosed(oldestDocDate) : false
  fiscalImpact = isClosedPeriod
    ? `⚠ Prior Fiscal Year (closes March 31) — Corrections may affect prior-year Balance Sheet, P&L, FIFO, COGS and Inventory Asset`
    : `Current Fiscal Year — Within open period`

  if (item.diff === 0) {
    suggestedAction = "No action required. SKU is reconciled."
    reasonForRisk = "No discrepancy detected."
    approvalRequired = "None"
  } else if (item.dateMismatch) {
    suggestedAction = "Re-sync both Stock and Valuation reports for the same date before taking any action."
    reasonForRisk = `Stock synced on ${item.stockDate}, Valuation on ${item.valDate}. Difference may be false positive.`
    approvalRequired = "None — sync first"
    doNotDo = ["Do not create any adjustment based on this difference until dates match", "Do not void or modify documents based on current reading"]
  } else if (item.isAccountingNegative) {
    suggestedAction = "Find the first transaction where Accounting Stock went below zero. Correct originating document. Do not create adjustment yet."
    reasonForRisk = `Official Accounting Stock is negative (${fmt(item.accounting)}). Accounting outflows exceeded inflows.`
    financialImpact = ["Inventory Asset","COGS","Balance Sheet","Profit & Loss","Inventory Valuation"]
    approvalRequired = "Accounting approval required before any correction"
    docsToReview = ["Inventory Valuation Report by date in Zoho", "Item Transaction History in Zoho", "Bills voided/deleted history", "Invoice history vs Bill history"]
    doNotDo = ["Do not create Inventory or Value Adjustment to fix negative accounting", "Do not void Invoices without reviewing FIFO/COGS impact", "Do not create new Bills without reviewing originating issue first"]
  } else if (item.hasInactiveWhIssue) {
    const physQty = item.inactiveWhPhysical.reduce((s,w) => s+w.qty, 0)
    if (physQty !== 0) {
      suggestedAction = "Check Inventory Valuation Summary for FCS Consignment Delta in Zoho. If Physical > 0 and Accounting > 0: reactivate warehouse, create Transfer Order to active warehouse, validate, reactivate inactive."
      reasonForRisk = `Physical stock (${fmt(physQty)} units) found in inactive warehouse FCS Consignment Delta.`
      financialImpact = ["Inventory Asset","Inventory Valuation","Balance Sheet"]
      approvalRequired = "Manager approval"
      docsToReview = ["Stock on Hand by warehouse in Zoho", "Inventory Valuation Summary by warehouse", "Transfer Order history"]
      doNotDo = ["Do not delete or adjust stock in inactive warehouse without verifying accounting impact", "Do not create Transfer Order if quantity is uncertain"]
    } else {
      suggestedAction = "Check Inventory Valuation Summary for FCS Consignment Delta. Identify originating document. Correct or create Value Adjustment with accounting approval."
      reasonForRisk = "Accounting value may be trapped in inactive warehouse."
      financialImpact = ["Inventory Asset","Inventory Valuation","Balance Sheet"]
      approvalRequired = "Accounting approval required"
      doNotDo = ["Do not create Quantity Adjustment without verifying accounting value"]
    }
  } else if (item.draftBills.length > 0 || item.draftInvoices.length > 0) {
    suggestedAction = `Review and confirm Draft Bills (${item.draftBills.length}) and Draft Invoices (${item.draftInvoices.length}) if quantities are correct. Re-sync Valuation after confirmation to verify impact.`
    reasonForRisk = "Draft documents have not yet affected Official Accounting Stock."
    approvalRequired = "Operational — confirm drafts if correct"
    doNotDo = ["Do not assume Draft Bill confirmation will fully resolve difference — re-sync and verify after", "Do not confirm Draft Bill if goods were not actually received"]
  } else if (diff !== null && diff > 0) {
    if (item.receives.length > 0 && item.activeBills.length === 0) {
      suggestedAction = "Create Bill from PO/Receive for each unmatched Purchase Receive. Ensure Bill date matches receipt date."
      reasonForRisk = `${item.receives.length} Purchase Receive(s) exist without corresponding Bills.`
      financialImpact = ["Inventory Asset","Accounts Payable","Inventory Valuation"]
      approvalRequired = isClosedPeriod ? "Accounting approval — prior fiscal year" : "Operational if period is open"
      docsToReview = item.receives.slice(0,5).map(r => `Purchase Receive ${r.number||"—"} (${fmtDate(r.date)})`)
      doNotDo = ["Do not create Inventory Adjustment before creating missing Bill", "Do not create Bill with today's date if goods arrived in prior period without accounting guidance"]
    } else if (item.invoicesNoShipment.length > 0) {
      suggestedAction = "For each Invoice without Shipment: if goods were shipped, create Package/Shipment from SO. If not shipped, review Invoice before void/cancel."
      reasonForRisk = `${item.invoicesNoShipment.length} Invoice(s) have no matching Shipment.`
      financialImpact = ["Accounts Receivable","COGS","Profit & Loss","Inventory Valuation"]
      approvalRequired = isClosedPeriod ? "Accounting approval — prior fiscal year" : "Manager review if paid"
      docsToReview = item.invoicesNoShipment.slice(0,5).map(i => `Invoice ${i.number||"—"} (SO: ${i.so_number||"—"})`)
      doNotDo = ["Do not void a paid Invoice without accounting approval", "Do not void tax-filed Invoices without accounting guidance", "Do not void prior-year Invoices without review"]
    } else if (item.hasOnlyAdjustmentsNoDocuments) {
      suggestedAction = "Accounting review required. No Bills or Receives found. Stock likely entered via Opening Balance, manual import, or Inventory Adjustment. If quantity is wrong: consider Quantity Adjustment with approval. If only value is wrong: Value Adjustment may be appropriate."
      reasonForRisk = "Stock exists physically but has no purchase document origin. Possible Opening Balance or migration issue."
      financialImpact = ["Inventory Asset","COGS","Balance Sheet","Inventory Valuation"]
      approvalRequired = "Accounting approval required"
      docsToReview = ["Item Transaction History in Zoho", "Opening Balance records", "Inventory Adjustment history"]
      doNotDo = ["Do not create Value Adjustment to fix a quantity difference — use Quantity Adjustment for quantity issues", "Do not adjust without understanding origin of the stock", "Do not treat Projected Result as confirmed — re-sync Valuation after any correction"]
    } else {
      suggestedAction = "Review stock history, opening balance, and all adjustments. Accounting review required."
      reasonForRisk = "Physical exceeds Accounting but no clear document mismatch found."
      financialImpact = ["Inventory Asset","Inventory Valuation"]
      approvalRequired = "Accounting review"
      doNotDo = ["Do not create adjustment without identifying root cause"]
    }
  } else if (diff !== null && diff < 0) {
    if (item.billsNoReceive.length > 0) {
      suggestedAction = "For each Bill without Receive: if goods physically arrived, create Purchase Receive. If not, review the Bill."
      reasonForRisk = `${item.billsNoReceive.length} Bill(s) exist without corresponding Purchase Receives.`
      financialImpact = ["Inventory Asset","Accounts Payable","Inventory Valuation"]
      approvalRequired = isClosedPeriod ? "Accounting approval — prior fiscal year" : "Operational if period is open"
      docsToReview = item.billsNoReceive.slice(0,5).map(b => `Bill ${b.number||"—"} (${fmtDate(b.date)})`)
      doNotDo = ["Do not void/delete a paid Bill without accounting approval", "Do not void reconciled or tax-filed Bills", "Do not void prior-year Bills without review"]
    } else if (item.shipmentsNoInvoice.length > 0) {
      suggestedAction = "For each Shipment without Invoice: create Invoice from SO/Shipment if the sale happened and period is open."
      reasonForRisk = `${item.shipmentsNoInvoice.length} Shipment(s) have no matching Invoice.`
      financialImpact = ["Accounts Receivable","COGS","Profit & Loss","Inventory Valuation"]
      approvalRequired = isClosedPeriod ? "Accounting approval — prior fiscal year" : "Operational"
      docsToReview = item.shipmentsNoInvoice.slice(0,5).map(s => `Shipment ${s.number||"—"} (SO: ${s.so_number||"—"})`)
      doNotDo = ["Do not create Invoice with today's date for prior-period shipment without accounting guidance"]
    } else {
      suggestedAction = "Review adjustment history, account used, and valuation. Accounting review required."
      reasonForRisk = "Accounting exceeds Physical but no clear document mismatch found."
      financialImpact = ["Inventory Asset","Inventory Valuation","COGS"]
      approvalRequired = "Accounting review"
      doNotDo = ["Do not create adjustment without identifying root cause"]
    }
  }

  return { risk, suggestedAction, reasonForRisk, financialImpact, fiscalImpact, approvalRequired, docsToReview, doNotDo, isClosedPeriod }
}

function runInvestigation(item) {
  const steps = []
  const diff = item.diff

  steps.push({ num:"01", title:"Item Overview", status:"info", actionType:"safe",
    finding:`Physical Stock: <strong>${fmt(item.physical)}</strong> · Official Accounting: <strong>${item.hasValuation?fmt(item.accounting):"Not found"}</strong>${item.isAccountingNegative?' <span style="color:var(--critical);font-weight:700">⚠ NEGATIVE</span>':""}<br>
    Est. Accounting Movement: <strong>${fmt(item.estAccounting)}</strong> (Bills−Invoices+CreditNotes, diagnostic only)<br>
    Credit Notes: <strong>${fmt(item.creditNoteQty)}</strong> units · Draft Bills: <strong>${item.draftBills.length}</strong> (${fmt(item.draftBillQty)} units) · Draft Invoices: <strong>${item.draftInvoices.length}</strong> (${fmt(item.draftInvoiceQty)} units)`,
    action:null, finImpact:null })

  // STEP 02 — Date (FIRST CHECK)
  steps.push({ num:"02", title:"Report Date Validation", status:item.dateMismatch?"warn":"ok", actionType:item.dateMismatch?"gray":"safe",
    finding:item.dateMismatch
      ? `⚪ <strong>No Action Yet.</strong> Stock synced <strong>${item.stockDate}</strong>, Valuation synced <strong>${item.valDate}</strong>. Re-sync both for same date — difference may be false positive.`
      : `Both reports share sync date <strong>${item.stockDate||"unknown"}</strong>. Passed.`,
    action:item.dateMismatch?{label:"Fix",steps:`Run syncPhysicalStock then syncValuation on same day. Or use "Sync Now" button.`}:null, finImpact:null })

  if (item.dateMismatch && diff !== 0) {
    steps.push({ num:"—", title:"Investigation paused — date mismatch", status:"skip", actionType:"gray", finding:"Re-sync first.", action:null, finImpact:null })
    return steps
  }

  // STEP 03 — Critical (SECOND CHECK)
  if (item.isAccountingNegative) {
    steps.push({ num:"03", title:"Critical — Accounting Stock Negative", status:"critical", actionType:"critical",
      finding:`<strong>Official Accounting Stock is NEGATIVE (${fmt(item.accounting)}).</strong> Physical: ${fmt(item.physical)}.<br><br>Accounting outflows exceeded inflows. Find the first transaction where Accounting went negative. <strong>Do not create any adjustment.</strong>`,
      action:{label:"Investigation Path", steps:`1. Zoho → Reports → Inventory Valuation Summary → filter by SKU <strong>${item.sku}</strong><br>2. Open Item Transaction History<br>3. Find first date Accounting Stock went below zero<br>4. Identify the document (Invoice, voided Bill, Adjustment, Credit Note)<br>5. Correct originating document<br>6. Re-sync Valuation and re-check`},
      finImpact:["Inventory Asset","COGS","Balance Sheet","Profit & Loss","Inventory Valuation"] })
    steps.push({ num:"—", title:"Remaining steps", status:"skip", actionType:"critical", finding:"Resolve critical issue first.", action:null, finImpact:null })
    return steps
  }

  // STEP 04 — Warehouse
  if (item.hasInactiveWhIssue) {
    const physQty = item.inactiveWhPhysical.reduce((s,w) => s+w.qty, 0)
    steps.push({ num:"04", title:"Warehouse — Inactive Warehouse Issue", status:"err", actionType:physQty!==0?"manager":"accounting",
      finding:physQty!==0
        ? `Physical stock <strong>${fmt(physQty)}</strong> units in inactive warehouse <strong>FCS Consignment Delta</strong>.<br><br>Check Accounting: Zoho → Reports → Inventory Valuation Summary → filter by FCS Consignment Delta`
        : `Inactive warehouse issue in FCS Consignment Delta. Physical = 0 but accounting may be trapped.<br><br>Check: Zoho → Reports → Inventory Valuation Summary → filter by FCS Consignment Delta`,
      action:{label:"Action", steps:physQty!==0
        ? `1. Check Valuation Summary for FCS Consignment Delta<br>2. If Physical > 0 and Accounting > 0: reactivate → Transfer Order to active warehouse → validate → reactivate inactive<br>3. If Physical > 0 and Accounting = 0: investigate document origin`
        : `1. Check Valuation Summary for FCS Consignment Delta<br>2. If accounting qty exists without physical: find originating document → correct or reverse<br>3. If only value exists: Value Adjustment with accounting approval`},
      finImpact:["Inventory Asset","Inventory Valuation","Balance Sheet"] })
  } else {
    const activeWithStock = item.whStock.filter(w => !isInactiveWh(w.warehouse_name) && w.qty > 0)
    steps.push({ num:"04", title:"Warehouse Analysis", status:activeWithStock.length>1?"warn":"ok", actionType:"safe",
      finding:activeWithStock.length>1
        ? `Stock across ${activeWithStock.length} warehouses: ${activeWithStock.map(w=>`${w.warehouse_name}: <strong>${fmt(w.qty)}</strong>`).join(" · ")}. Quantities may match company level but warehouse mismatch may still exist.`
        : "No inactive warehouse issues detected.",
      action:null, finImpact:null })
  }

  // STEP 05 — Draft Documents
  if (item.draftBills.length > 0 || item.draftInvoices.length > 0) {
    const projSign = item.projectedDiff !== null && item.projectedDiff > 0 ? "+" : ""
    steps.push({ num:"05", title:"Draft Documents Pending", status:"warn", actionType:"gray",
      finding:`<strong>${item.draftBills.length} Draft Bill(s)</strong> (${fmt(item.draftBillQty)} units) · <strong>${item.draftInvoices.length} Draft Invoice(s)</strong> (${fmt(item.draftInvoiceQty)} units)<br><br>
      Draft Bill may reduce the difference if approved but has <strong>not affected Official Accounting Stock yet</strong>.<br>
      If all drafts confirmed: Projected Accounting = <strong>${fmt(item.projectedAccounting)}</strong> · Projected Diff = <strong>${projSign}${fmt(item.projectedDiff)}</strong><br>
      <em>Projected result is an estimate — validate against Zoho Valuation after confirmation.</em>`,
      action:{label:"Action", steps:[...item.draftBills.slice(0,3).map((b,i)=>`${i+1}. Draft Bill <strong>${b.number||"—"}</strong> (${fmtDate(b.date)}, ${fmt(b.qty)} units) → Verify goods received → Confirm as Open if correct`), ...item.draftInvoices.slice(0,3).map((inv,i)=>`${item.draftBills.length+i+1}. Draft Invoice <strong>${inv.number||"—"}</strong> → Verify goods shipped → Confirm as Sent if correct`)].join("<br>")},
      finImpact:["Inventory Asset","Accounts Payable","Inventory Valuation"] })
  }

  if (!item.hasValuation) {
    steps.push({ num:"06", title:"No Valuation Data", status:"warn", actionType:"gray",
      finding:`No entry in Valuation Report. Physical: <strong>${fmt(item.physical)}</strong>.`,
      action:{label:"Action",steps:`Zoho → Reports → Inventory Valuation Summary → Search <strong>${item.sku}</strong>`},
      finImpact:["Inventory Asset","Inventory Valuation"] })
    return steps
  }

  if (diff === 0) {
    steps.push({ num:"06", title:"Accounting vs Physical", status:"ok", actionType:"safe",
      finding:`✓ Physical (<strong>${fmt(item.physical)}</strong>) equals Official Accounting (<strong>${fmt(item.accounting)}</strong>). Reconciled.`,
      action:null, finImpact:null })
    return steps
  }

  steps.push({ num:"06", title:"Accounting vs Physical", status:diff>0?"warn":"err", actionType:diff>0?"operational":"accounting",
    finding:diff>0
      ? `Physical is <strong>+${fmt(Math.abs(diff))}</strong> units higher than Accounting.`
      : `Accounting is <strong>+${fmt(Math.abs(diff))}</strong> units higher than Physical.`,
    action:{label:"Direction", steps:diff>0?"Physical > Accounting. Check: Receives without Bills → Invoice without Shipment → Opening Balance / Adjustment":"Accounting > Physical. Check: Bills without Receives → Shipment without Invoice → Adjustment / Valuation Issue"},
    finImpact:null })

  // STEP 07 — Bills without Receives
  steps.push({ num:"07", title:"Bills without Purchase Receives", status:item.billsNoReceive.length>0?"err":"ok", actionType:item.billsNoReceive.length>0?"accounting":"safe",
    finding:item.billsNoReceive.length>0
      ? `<strong>${item.billsNoReceive.length} Bill(s)</strong> with no linked Purchase Receive.`
      : "All active Bills have a linked Purchase Receive.",
    action:item.billsNoReceive.length>0?{label:"Action",steps:item.billsNoReceive.slice(0,5).map((b,i)=>`${i+1}. Bill <strong>${b.number||"—"}</strong> → If goods arrived: create Receive from PO ${b.po_number||"—"} (ensure period is open) → If not arrived: review Bill (do not void paid/reconciled/prior-year Bills without accounting approval)`).join("<br>")}:null,
    docs:item.billsNoReceive, docType:"bill",
    finImpact:item.billsNoReceive.length>0?["Inventory Asset","Accounts Payable","Inventory Valuation"]:null })

  // STEP 08 — Invoices without Shipments
  steps.push({ num:"08", title:"Invoices without Shipments", status:item.invoicesNoShipment.length>0?"err":"ok", actionType:item.invoicesNoShipment.length>0?"accounting":"safe",
    finding:item.invoicesNoShipment.length>0
      ? `<strong>${item.invoicesNoShipment.length} Invoice(s)</strong> with no matching Shipment (by SO number). Invoices covered by Credit Notes excluded.`
      : "All Invoices have a matching Shipment or Credit Note.",
    action:item.invoicesNoShipment.length>0?{label:"Action",steps:item.invoicesNoShipment.slice(0,5).map((inv,i)=>`${i+1}. Invoice <strong>${inv.number||"—"}</strong> (SO: ${inv.so_number||"—"}) → If goods shipped: create Package/Shipment → If not shipped: review before void/cancel (do not void paid, tax-filed, or prior-year Invoices without accounting approval)`).join("<br>")}:null,
    docs:item.invoicesNoShipment, docType:"invoice",
    finImpact:item.invoicesNoShipment.length>0?["Accounts Receivable","COGS","Profit & Loss","Inventory Valuation"]:null })

  // STEP 08b — Credit Notes
  if (item.activeCreditNotes.length > 0) {
    const linkedCNs = item.activeCreditNotes.filter(c => c.invoice_id)
    const unlinkedCNs = item.activeCreditNotes.filter(c => !c.invoice_id)
    steps.push({ num:"08b", title:"Credit Notes", status:"info", actionType:"accounting",
      finding:`<strong>${item.activeCreditNotes.length} Credit Note(s)</strong> — ${fmt(item.creditNoteQty)} units.<br>
      Linked: <strong>${linkedCNs.length}</strong> · Unlinked: <strong>${unlinkedCNs.length}</strong>${unlinkedCNs.length>0?' <span style="color:var(--amber)">⚠ Unlinked CNs do not automatically resolve Invoice/Shipment mismatches</span>':""}<br><br>
      ${item.activeCreditNotes.slice(0,8).map(c=>`· <strong>${c.number||"—"}</strong> · ${fmtDate(c.date)} · ${fmt(c.qty)} units · ${c.status}${c.invoice_id?" · Linked":' · <span style="color:var(--amber)">Unlinked</span>'}${c.so_number?" · SO: "+c.so_number:""}`).join("<br>")}`,
      action:{label:"Action",steps:`Verify each Credit Note is linked to its Invoice with matching SKU and compatible quantity. Unlinked Credit Notes should be reviewed and linked.`},
      finImpact:["Accounts Receivable","COGS","Inventory Valuation","Profit & Loss"] })
  }

  // STEP 09 — Receives without Bills
  const rNoBill = item.receives.length > 0 && item.activeBills.length === 0
  const rLtB = item.receives.length > item.activeBills.length
  steps.push({ num:"09", title:"Purchase Receives without Bills", status:rNoBill||(diff>0&&rLtB)?"err":"ok", actionType:rNoBill||(diff>0&&rLtB)?"operational":"safe",
    finding:rNoBill
      ? `<strong>${item.receives.length} Purchase Receive(s)</strong> found but no active Bills.${item.draftBills.length>0?` Note: ${item.draftBills.length} Draft Bill(s) exist but not confirmed yet.`:""}`
      : rLtB?`<strong>${item.receives.length} Receive(s)</strong> vs <strong>${item.activeBills.length} active Bill(s)</strong>. Some Receives may lack a Bill.`
      : `${item.receives.length} Receive(s) and ${item.activeBills.length} Bill(s). Volume balanced.`,
    action:(rNoBill||rLtB)?{label:"Action",steps:item.receives.slice(0,5).map((r,i)=>`${i+1}. Locate PO for Receive <strong>${r.number||"—"}</strong> → Create Bill → Confirm quantities → Save as Open (if period is open)`).join("<br>")}:null,
    docs:item.receives, docType:"receive",
    finImpact:(rNoBill||rLtB)?["Inventory Asset","Accounts Payable","Inventory Valuation"]:null })

  // STEP 10 — Shipments without Invoices (SO-based)
  steps.push({ num:"10", title:"Shipments without Invoices", status:item.shipmentsNoInvoice.length>0?"err":"ok", actionType:item.shipmentsNoInvoice.length>0?"operational":"safe",
    finding:item.shipmentsNoInvoice.length>0
      ? `<strong>${item.shipmentsNoInvoice.length} Shipment(s)</strong> with no matching Invoice (by SO):<br><br>${item.shipmentsNoInvoice.slice(0,8).map(s=>`· <strong>${s.number||"—"}</strong> · SO: <strong>${s.so_number||"no SO"}</strong> · ${fmtDate(s.date)} · ${fmt(s.qty)} units`).join("<br>")}${item.shipmentsNoInvoice.length>8?`<br>+ ${item.shipmentsNoInvoice.length-8} more`:""}`
      : "All Shipments have a matching Invoice via Sales Order.",
    action:item.shipmentsNoInvoice.length>0?{label:"Action",steps:item.shipmentsNoInvoice.slice(0,5).map((s,i)=>`${i+1}. Open SO <strong>${s.so_number||"—"}</strong> → Create Invoice → Confirm quantities → Save as Sent (if period is open)`).join("<br>")}:null,
    docs:item.shipmentsNoInvoice, docType:"shipment",
    finImpact:item.shipmentsNoInvoice.length>0?["Accounts Receivable","COGS","Inventory Valuation"]:null })

  // STEP 11 — Purchase qty cross-check
  const pDiff = item.receivedQty - item.billQty
  steps.push({ num:"11", title:"Purchase Qty Cross-Check", status:Math.abs(pDiff)>0.01?(pDiff>0?"warn":"err"):"ok", actionType:Math.abs(pDiff)>0.01?"operational":"safe",
    finding:Math.abs(pDiff)<0.01
      ? `Received <strong>${fmt(item.receivedQty)}</strong> matches Billed <strong>${fmt(item.billQty)}</strong>. Note: warehouse-level mismatch may still exist.`
      : pDiff>0?`Received <strong>${fmt(item.receivedQty)}</strong> but Billed <strong>${fmt(item.billQty)}</strong>. Missing Bill for <strong>${fmt(pDiff)}</strong> units.`
      : `Billed <strong>${fmt(item.billQty)}</strong> but received <strong>${fmt(item.receivedQty)}</strong>. Bill may predate receipt.`,
    action:Math.abs(pDiff)>0.01?{label:"Action",steps:pDiff>0?`Create Bill for <strong>${fmt(pDiff)}</strong> units from PO — ensure date matches actual receipt`:`Review Bills exceeding received — create missing Receive or review Bill (do not void paid Bills without accounting approval)`}:null,
    finImpact:Math.abs(pDiff)>0.01?["Inventory Asset","Accounts Payable"]:null })

  // STEP 12 — Sales qty cross-check (SO-based)
  const shipmentsWithSO = item.shipments.filter(s => s.so_number && s.so_number.trim() !== "")
  const invoicedSOs = new Set(item.activeInvoices.map(i => i.so_number).filter(Boolean))
  const shipmentsSONoInvoice = shipmentsWithSO.filter(s => !invoicedSOs.has(s.so_number))
  const grouped = {}
  shipmentsSONoInvoice.forEach(s => {
    if (!grouped[s.so_number]) grouped[s.so_number] = { so_number: s.so_number, qty: 0, shipments: [] }
    grouped[s.so_number].qty += s.qty; grouped[s.so_number].shipments.push(s)
  })
  const unpairedSOs = Object.values(grouped)
  const shippedSOs2 = new Set(shipmentsWithSO.map(s => s.so_number).filter(Boolean))
  const invoicesSONoShipment = item.activeInvoices.filter(i => i.so_number && !shippedSOs2.has(i.so_number))
  const s12status = unpairedSOs.length > 0 ? "warn" : invoicesSONoShipment.length > 0 ? "err" : "ok"
  let s12finding = s12status==="ok" ? "All Shipments with SOs have matching Invoices." :
    unpairedSOs.length>0 ? `<strong>${unpairedSOs.length} SO(s)</strong> have Shipments but no Invoice:<br><br>`+unpairedSOs.map(g=>`· SO <strong>${g.so_number}</strong> — ${g.shipments.map(s=>`${s.number||"—"} (${fmtDate(s.date)}, ${fmt(s.qty)} units)`).join(", ")}`).join("<br>")+(invoicesSONoShipment.length>0?`<br><br><strong>${invoicesSONoShipment.length} Invoice(s)</strong> no matching Shipment SO:<br>`+invoicesSONoShipment.slice(0,5).map(i=>`· <strong>${i.number||"—"}</strong> · SO: ${i.so_number||"—"} · ${fmtDate(i.date)} · ${fmt(i.qty)} units`).join("<br>"):"") :
    `<strong>${invoicesSONoShipment.length} Invoice(s)</strong> no matching Shipment SO:<br>`+invoicesSONoShipment.slice(0,5).map(i=>`· <strong>${i.number||"—"}</strong> · SO: ${i.so_number||"—"} · ${fmtDate(i.date)} · ${fmt(i.qty)} units`).join("<br>")
  steps.push({ num:"12", title:"Sales Qty Cross-Check", status:s12status, actionType:s12status!=="ok"?"operational":"safe",
    finding:s12finding,
    action:s12status!=="ok"?{label:"Action",steps:unpairedSOs.length>0?unpairedSOs.map((g,i)=>`${i+1}. Open SO <strong>${g.so_number}</strong> → Create Invoice → Confirm quantities → Save as Sent`).join("<br>"):`Review Invoices above — verify Shipment exists for each SO in Zoho`}:null,
    finImpact:s12status!=="ok"?["Accounts Receivable","COGS","Profit & Loss"]:null })

  // STEP 13 — Adjustments
  steps.push({ num:"13", title:"Inventory Adjustments", status:item.adjustments.length>0?"warn":"ok", actionType:item.adjustments.length>0?"accounting":"safe",
    finding:item.adjustments.length>0
      ? `<strong>${item.adjustments.length} Adjustment(s)</strong> found.<br><br>
      <strong>Quantity Adjustment</strong> — affects quantity and valuation.<br>
      <strong>Value/Revaluation</strong> — affects valuation only, not quantity.<br>
      <strong>Stock Count</strong> — adjusts physical and posts to accounting account.<br><br>
      Review this adjustment before recommending any new adjustment.`
      : "No Inventory Adjustments found.",
    action:item.adjustments.length>0?{label:"Action",steps:`Zoho → Inventory → Inventory Adjustments → Filter by SKU <strong>${item.sku}</strong> → Verify: date, warehouse, account used (Inventory Asset vs P&L), type, quantity/value impact`}:null,
    docs:item.adjustments, docType:"adjustment",
    finImpact:item.adjustments.length>0?["Inventory Asset","COGS","Inventory Valuation","Balance Sheet"]:null })

  // STEP 14 — Opening Balance
  const likelyOB = item.hasOnlyAdjustmentsNoDocuments || (item.activeBills.length === 0 && item.receives.length === 0 && item.physical > 0)
  steps.push({ num:"14", title:"Opening Balance & Initial Import", status:likelyOB?"warn":"info", actionType:likelyOB?"red":"accounting",
    finding:likelyOB
      ? `<strong>Likely Opening Balance / Migration Issue.</strong> No Bills or Receives found, but Physical Stock = ${fmt(item.physical)}. Stock was likely loaded via Opening Balance, manual import, or Adjustment without accounting entry.<br><br>
      If quantity is wrong: Quantity Adjustment with accounting approval.<br>
      If quantity correct but value wrong: Value Adjustment may be appropriate — confirm quantity is truly correct first.`
      : `If discrepancy existed since first transaction: check incorrect opening stock, wrong opening cost, or stock loaded to wrong warehouse.`,
    action:{label:"Action",steps:`Zoho → Items → SKU <strong>${item.sku}</strong> → Review "Opening Stock" and "Opening Stock Rate" → Cross-reference with physical count on migration date → Accounting approval required`},
    finImpact:["Inventory Asset","Inventory Valuation","Balance Sheet","COGS"] })

  return steps
}

function renderTable() {
  const filtered = getFiltered()
  const total = allData.length
  const withDiff = allData.filter(r => r.diff!==0&&r.diff!==null).length
  const ok = allData.filter(r => r.diff===0).length
  const criticalCount = allData.filter(r => r.isAccountingNegative).length
  const physGt = allData.filter(r => r.diff!==null&&r.diff>0).length
  const accGt = allData.filter(r => r.diff!==null&&r.diff<0).length
  const inactiveWh = allData.filter(r => r.hasInactiveWhIssue).length
  const totalVal = allData.reduce((s,r) => s+Math.abs(r.valueDiff||0), 0)
  const now = new Date().toLocaleString("en-CA",{timeZone:"America/Vancouver"})

  const globalDisclaimer = `<div class="global-disclaimer">
    <div class="global-disclaimer-title">⚠ Investigation Tool — Not an Automatic Correction Tool</div>
    <div class="global-disclaimer-text">This app identifies likely causes and recommended correction paths. It does not replace accounting review. <strong>Do not create Inventory or Value Adjustments until document mismatches, warehouse issues, draft documents, and opening balances have been reviewed.</strong></div>
    <div class="global-disclaimer-steps">Safe order: 1. Diagnose &nbsp;·&nbsp; 2. Separate operational from accounting corrections &nbsp;·&nbsp; 3. Do not void/delete paid or historical documents without review &nbsp;·&nbsp; 4. Use cut-off date &nbsp;·&nbsp; 5. Final adjustment only with accounting approval</div>
    <div class="fiscal-note">📅 Fiscal year closes March 31. Corrections in closed periods affect prior-year Balance Sheet, P&L, FIFO, COGS and Inventory Asset.</div>
  </div>`

  const summary = `<div class="summary-grid">
    <div class="stat ${withDiff>0?'s-alert':'s-ok'}"><div class="stat-label">SKUs with Discrepancy</div><div class="stat-value ${withDiff>0?'c-red':'c-green'}">${withDiff}</div></div>
    <div class="stat ${criticalCount>0?'s-critical':'s-ok'}"><div class="stat-label">Critical (Neg. Accounting)</div><div class="stat-value ${criticalCount>0?'c-critical':'c-green'}">${criticalCount}</div></div>
    <div class="stat ${physGt>0?'s-warn':''}"><div class="stat-label">Physical &gt; Accounting</div><div class="stat-value ${physGt>0?'c-amber':''}">${physGt}</div></div>
    <div class="stat ${accGt>0?'s-alert':''}"><div class="stat-label">Accounting &gt; Physical</div><div class="stat-value ${accGt>0?'c-red':''}">${accGt}</div></div>
    <div class="stat ${inactiveWh>0?'s-alert':''}"><div class="stat-label">Inactive Warehouse</div><div class="stat-value ${inactiveWh>0?'c-red':''}">${inactiveWh}</div></div>
    <div class="stat ${totalVal>0?'s-alert':'s-ok'}"><div class="stat-label">Total Value at Risk</div><div class="stat-value ${totalVal>0?'c-red':'c-green'}" style="font-size:16px">$${totalVal.toLocaleString("en-CA",{maximumFractionDigits:0})}</div></div>
  </div>`

  const disclaimer = `<div class="disclaimer">
    <strong>Official Accounting Stock</strong> = Zoho Valuation Report &nbsp;·&nbsp;
    <strong>Est. Acc. Movement</strong> = Bills−Invoices+CreditNotes (diagnostic) &nbsp;·&nbsp;
    <strong>Matching</strong> = by SO number &nbsp;·&nbsp;
    <strong>Fiscal Year ends</strong> March 31
  </div>`

  const filters = `<div class="filter-bar">
    <input class="search-input" type="text" placeholder="Search SKU or name..." value="${searchTerm}" oninput="onSearch(this.value)" />
    <span class="flabel">Show:</span>
    <button class="filter-btn ${activeFilter==='all'?'active':''}" onclick="setFilter('all')">All (${total})</button>
    <button class="filter-btn ${activeFilter==='discrepancy'?'active':''}" onclick="setFilter('discrepancy')">Issues (${withDiff})</button>
    <button class="filter-btn ${activeFilter==='critical'?'active':''}" onclick="setFilter('critical')">Critical (${criticalCount})</button>
    <button class="filter-btn ${activeFilter==='physical_gt'?'active':''}" onclick="setFilter('physical_gt')">Physical &gt; Acc (${physGt})</button>
    <button class="filter-btn ${activeFilter==='accounting_gt'?'active':''}" onclick="setFilter('accounting_gt')">Acc &gt; Physical (${accGt})</button>
    <button class="filter-btn ${activeFilter==='inactive_wh'?'active':''}" onclick="setFilter('inactive_wh')">Inactive WH (${inactiveWh})</button>
    <button class="filter-btn ${activeFilter==='ok'?'active':''}" onclick="setFilter('ok')">OK (${ok})</button>
    <span class="flabel ml-auto">Sort:</span>
    <select class="sort-sel" onchange="setSort(this.value)">
      <option value="value_diff" ${sortBy==='value_diff'?'selected':''}>Value Impact</option>
      <option value="qty_diff" ${sortBy==='qty_diff'?'selected':''}>Qty Difference</option>
      <option value="sku" ${sortBy==='sku'?'selected':''}>SKU</option>
      <option value="physical" ${sortBy==='physical'?'selected':''}>Physical Stock</option>
    </select>
    <span class="ts-label">Updated: ${now}</span>
  </div>`

  if (!filtered.length) {
    document.getElementById("main-content").innerHTML = globalDisclaimer + summary + disclaimer + filters + `<div style="text-align:center;padding:80px;color:var(--muted)">No items match filter.</div>`
    return
  }

  const rows = filtered.map((item, idx) => {
    const cp = causeInfo(item.primaryCause)
    const risk = assessRisk(item)
    const dCls = item.diff===null?"diff-zero":item.diff>0?"diff-pos":item.diff<0?"diff-neg":"diff-zero"
    const dSign = item.diff!==null&&item.diff>0?"+":""
    const vCls = !item.valueDiff?"":item.valueDiff>0?"c-green":item.valueDiff<0?"c-red":""
    const isOpen = openRows.has(idx)
    const draftBadge = item.draftBills.length>0?`<span class="badge badge-draft">${item.draftBills.length}D</span>`:""
    const critBadge = item.isAccountingNegative?`<span class="badge badge-critical">CRIT</span>`:""
    const whBadge = item.hasInactiveWhIssue?`<span class="badge badge-inactive">WH</span>`:""
    return `<tr class="dr ${item.isAccountingNegative?'row-critical':''} ${isOpen?'expanded':''}" onclick="toggleRow(${idx})">
      <td style="width:22px"><span class="arr ${isOpen?'open':''}">▶</span></td>
      <td class="sku-cell" style="width:140px">${item.sku}${critBadge}${draftBadge}${whBadge}</td>
      <td class="name-cell" style="width:140px" title="${item.name}">${item.name||"—"}</td>
      <td class="mono r" style="width:80px">${fmt(item.physical)}</td>
      <td class="mono r" style="width:100px"><span ${item.isAccountingNegative?'style="color:var(--critical);font-weight:600"':''}>${item.hasValuation?fmt(item.accounting):'<span class="no-val">—</span>'}</span></td>
      <td class="mono r" style="width:85px"><span style="font-size:10px;color:var(--muted)">${fmt(item.estAccounting)}</span></td>
      <td class="r" style="width:85px"><span class="${dCls}">${item.diff===null?"—":dSign+fmt(item.diff)}</span></td>
      <td class="r" style="width:110px"><span class="mono ${vCls}">${!item.valueDiff||item.unitCost===0?"—":fmtVal(item.valueDiff)}</span></td>
      <td style="width:90px"><span class="risk-pill ${riskClass(risk)}" style="font-size:9px;padding:2px 5px">${riskLabel(risk).substring(0,2)}</span> <span class="cp ${cp.cls}" style="font-size:9px">${cp.label}</span></td>
      <td style="width:105px"><button class="open-full-btn" onclick="event.stopPropagation();openInv('${item.sku}')">Investigate →</button></td>
    </tr>
    <tr class="detail-row ${isOpen?'open':''}" id="drow-${idx}">
      <td class="detail-cell" colspan="10"><div class="detail-inner">${buildInlineDetail(item)}</div></td>
    </tr>`
  }).join("")

  document.getElementById("main-content").innerHTML = globalDisclaimer + summary + disclaimer + filters + `
    <div id="tbl-view">
      <div class="table-wrap"><table>
        <thead><tr>
          <th style="width:22px"></th><th style="width:140px">SKU</th><th style="width:140px">Item Name</th>
          <th class="r" style="width:80px">Physical</th><th class="r" style="width:100px">Official Acc.</th>
          <th class="r" style="width:85px">Est. Mov.</th><th class="r" style="width:85px">Difference</th>
          <th class="r" style="width:110px">Value Impact</th><th style="width:90px">Risk / Cause</th><th style="width:105px"></th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
      <p class="result-meta">${filtered.length} of ${total} SKUs · Official Acc. = Valuation Report · Est. = Bills−Invoices+CreditNotes · SO matching · FY ends March 31</p>
    </div>
    <div id="inv-page"></div>`
}

function buildInlineDetail(item) {
  if (!item.hasValuation && item.physical === 0) return `<div style="font-size:12px;color:var(--muted)">Physical = 0 and no Valuation. Item may be inactive.</div>`
  if (!item.hasValuation) return `<div style="font-size:12px;color:var(--amber)">⚠ No Valuation data. Check item cost in Zoho.</div>`
  if (item.diff === 0 && item.draftBills.length === 0) return `<div style="font-size:12px;color:var(--green);font-weight:500">✓ Reconciled. No action needed.</div>`
  const cd = buildCorrectionDecision(item)
  return `<div class="risk-pill ${riskClass(cd.risk)}" style="margin-bottom:10px">${riskLabel(cd.risk)}</div>
    <div style="font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:8px"><strong style="color:var(--text)">Suggested Action:</strong> ${cd.suggestedAction}</div>
    ${cd.doNotDo.length>0?`<div style="font-size:11px;color:var(--red);margin-top:6px">${cd.doNotDo.slice(0,2).map(d=>`✗ ${d}`).join("<br>")}</div>`:""}
    <div style="margin-top:8px"><button class="open-full-btn" onclick="openInv('${item.sku}')">Full Investigation →</button></div>`
}

function buildCorrectionHTML(item, cd) {
  // Build action list with numeric impact
  var actions = []
  var accImpact = 0

  function extractPRnum(str) {
    var m = String(str || "").match(/PR-\d+/)
    return m ? m[0] : ""
  }

  // Build set of PR numbers from draft bills
  var draftBillPRSet = {}
  item.draftBills.forEach(function(b) {
    var pr = extractPRnum(b.number)
    if (pr) draftBillPRSet[pr] = true
  })

  // Bills to create (Receives without Bills) — match by receive_id OR PR number
  // Skip if a Draft Bill already exists for the same Receive
  item.receives.forEach(function(r) {
    var prNum = extractPRnum(r.number)
    var hasBill = item.activeBills.some(function(b) {
      if (b.receive_id && b.receive_id === r.doc_id) return true
      if (prNum && extractPRnum(b.number) === prNum) return true
      return false
    })
    var hasDraftBill = prNum && draftBillPRSet[prNum]
    if (!hasBill && !hasDraftBill) {
      actions.push({ type: 'bill', label: 'Create Bill for Receive ' + (r.number||'—'), date: r.date, qty: r.qty, impact: +r.qty, color: 'c-green' })
      accImpact += r.qty
    }
  })

  // Invoices to create (Shipments without Invoices)
  var shipmentsWithSO = item.shipments.filter(function(s){ return s.so_number && s.so_number.trim() !== '' })
  var invoicedSOs = {}
  item.activeInvoices.forEach(function(i){ if(i.so_number) invoicedSOs[i.so_number] = true })
  var grouped = {}
  shipmentsWithSO.filter(function(s){ return !invoicedSOs[s.so_number] }).forEach(function(s) {
    if (!grouped[s.so_number]) grouped[s.so_number] = { so_number: s.so_number, qty: 0 }
    grouped[s.so_number].qty += s.qty
  })
  Object.values(grouped).forEach(function(g) {
    actions.push({ type: 'invoice', label: 'Create Invoice for SO ' + g.so_number, qty: g.qty, impact: -g.qty, color: 'c-red' })
    accImpact -= g.qty
  })

  // Draft Bills
  item.draftBills.forEach(function(b) {
    actions.push({ type: 'draft-bill', label: 'Confirm Draft Bill ' + (b.number||'—'), date: b.date, qty: b.qty, impact: +b.qty, color: 'c-green' })
    accImpact += b.qty
  })

  // Calculate projected result
  var currentAcc = item.accounting || 0
  var projectedAcc = currentAcc + accImpact
  var projectedDiff = item.physical - projectedAcc
  var resolves = Math.abs(projectedDiff) < 0.01
  var partiallyResolves = Math.abs(projectedDiff) < Math.abs(item.diff || 0)
  var residual = projectedDiff

  // Build actions HTML
  var actionsHTML = ''
  if (actions.length > 0) {
    actionsHTML = '<div style="margin-bottom:16px">'
    actionsHTML += '<div class="cd-label" style="margin-bottom:10px">Required Actions</div>'
    actions.forEach(function(a, i) {
      var impactStr = (a.impact > 0 ? '+' : '') + fmt(a.impact) + ' units to Accounting'
      var bgColor = a.impact > 0 ? 'rgba(45,106,79,0.2)' : 'rgba(227,6,19,0.15)'
      var borderColor = a.impact > 0 ? 'rgba(45,106,79,0.4)' : 'rgba(227,6,19,0.3)'
      actionsHTML += '<div style="display:flex;justify-content:space-between;align-items:center;background:' + bgColor + ';border:1px solid ' + borderColor + ';border-radius:2px;padding:10px 14px;margin-bottom:6px">'
      actionsHTML += '<div style="display:flex;flex-direction:column;gap:3px">'
      actionsHTML += '<div style="font-size:12px;color:white;font-weight:600">' + (i+1) + '. ' + a.label + '</div>'
      actionsHTML += a.date ? '<div style="font-size:10px;color:rgba(255,255,255,0.5)">' + fmtDate(a.date) + ' &middot; ' + fmt(a.qty) + ' units</div>' : '<div style="font-size:10px;color:rgba(255,255,255,0.5)">' + fmt(a.qty) + ' units</div>'
      actionsHTML += '</div>'
      actionsHTML += '<div style="font-family:\'IBM Plex Mono\',monospace;font-size:13px;font-weight:600;' + (a.impact>0?'color:#7FBA9F':'color:#F1948A') + '">' + impactStr + '</div>'
      actionsHTML += '</div>'
    })
    actionsHTML += '</div>'
  } else if (!item.isAccountingNegative && !item.dateMismatch && item.diff !== 0) {
    actionsHTML = '<div style="margin-bottom:16px;padding:12px 14px;background:rgba(255,255,255,0.05);border-radius:2px">'
    actionsHTML += '<div style="font-size:12px;color:rgba(255,255,255,0.6)">No document corrections identified automatically. Manual investigation required — review stock history, opening balance, and adjustments in Zoho.</div>'
    actionsHTML += '</div>'
  }

  // Build projected result HTML
  var projHTML = ''
  if (item.hasValuation && item.diff !== 0 && !item.isAccountingNegative && !item.dateMismatch) {
    var resolveColor = resolves ? '#7FBA9F' : partiallyResolves ? '#F0C060' : '#F1948A'
    var resolveIcon = resolves ? '✓' : partiallyResolves ? '~' : '✗'
    var resolveLabel = resolves ? 'YES — These actions will reconcile this SKU' : partiallyResolves ? 'PARTIALLY — Residual difference of ' + (residual>0?'+':'') + fmt(residual) + ' units remains' : 'NO — Actions do not cover the full difference'
    var resolveNote = resolves ? '' : partiallyResolves ? '<br><div style="font-size:11px;color:rgba(255,255,255,0.5);margin-top:6px">Residual may be due to Opening Balance, Inventory Adjustments, or historical documents not captured in the system.</div>' : '<div style="font-size:11px;color:rgba(255,255,255,0.5);margin-top:6px">Review Opening Balance, Inventory Adjustments, and Item Transaction History in Zoho Inventory.</div>'

    projHTML = '<div style="background:rgba(255,255,255,0.05);border-radius:3px;padding:16px;margin-bottom:12px">'
    projHTML += '<div class="cd-label" style="margin-bottom:12px">Projected Result After Actions</div>'

    // Calculation table
    projHTML += '<div style="font-family:\'IBM Plex Mono\',monospace;font-size:12px;line-height:2;color:rgba(255,255,255,0.7)">'
    projHTML += '<div style="display:flex;justify-content:space-between"><span>Current Official Accounting</span><span>' + fmt(currentAcc) + '</span></div>'
    actions.forEach(function(a) {
      projHTML += '<div style="display:flex;justify-content:space-between;color:' + (a.impact>0?'#7FBA9F':'#F1948A') + '"><span>&nbsp;&nbsp;' + (a.impact>0?'+':'') + fmt(a.impact) + ' (' + a.label + ')</span><span>' + fmt(currentAcc + actions.slice(0,actions.indexOf(a)+1).reduce(function(s,x){return s+x.impact},0)) + '</span></div>'
    })
    projHTML += '<div style="display:flex;justify-content:space-between;border-top:1px solid rgba(255,255,255,0.2);margin-top:4px;padding-top:4px;color:white;font-weight:600"><span>= Projected Accounting</span><span>' + fmt(projectedAcc) + '</span></div>'
    projHTML += '<div style="display:flex;justify-content:space-between;color:rgba(255,255,255,0.5)"><span>&nbsp;&nbsp;Physical Stock</span><span>' + fmt(item.physical) + '</span></div>'
    projHTML += '<div style="display:flex;justify-content:space-between;' + (resolves?'color:#7FBA9F':partiallyResolves?'color:#F0C060':'color:#F1948A') + ';border-top:1px solid rgba(255,255,255,0.1);margin-top:4px;padding-top:4px;font-weight:600"><span>= Projected Difference</span><span>' + (projectedDiff>0?'+':'') + fmt(projectedDiff) + '</span></div>'
    projHTML += '</div>'

    // Resolve status
    projHTML += '<div style="margin-top:14px;padding:12px 14px;background:rgba(255,255,255,0.05);border-left:3px solid ' + resolveColor + ';border-radius:2px">'
    projHTML += '<div style="font-size:13px;font-weight:700;color:' + resolveColor + '">' + resolveIcon + ' DO THESE ACTIONS RESOLVE THE PROBLEM? ' + resolveLabel + '</div>'
    projHTML += resolveNote
    projHTML += '</div>'
    projHTML += '</div>'
  }

  // Risk / approval info
  var infoHTML = '<div class="cd-grid" style="margin-bottom:12px">'
  infoHTML += '<div class="cd-item"><div class="cd-label">Risk Level</div><div class="cd-value"><span class="risk-pill ' + riskClass(cd.risk) + '">' + riskLabel(cd.risk) + '</span></div></div>'
  infoHTML += '<div class="cd-item"><div class="cd-label">Approval Required</div><div class="cd-value">' + cd.approvalRequired + '</div></div>'
  if (cd.financialImpact.length > 0) {
    infoHTML += '<div class="cd-item"><div class="cd-label">Financial Impact</div><div class="cd-value">' + cd.financialImpact.join(' &middot; ') + '</div></div>'
  }
  infoHTML += '<div class="cd-item"><div class="cd-label">Fiscal Period</div><div class="cd-value">' + cd.fiscalImpact + '</div></div>'
  infoHTML += '</div>'

  var doNotHTML = cd.doNotDo.length > 0 ? [
    '<div class="cd-donot"><div class="cd-donot-title">Do Not Do</div>',
    cd.doNotDo.map(function(d){ return '<div class="cd-donot-item">' + d + '</div>' }).join(''),
    '</div>'
  ].join('') : ''

  var validationHTML = '<div class="cd-validation"><strong>Validation after correction:</strong> Re-sync Stock and Valuation &rarr; Verify Official Accounting Stock in Zoho Valuation Report &rarr; Confirm Difference = 0.<br><em>Projected result is an estimate. Final Official Accounting Stock must be validated against Zoho Inventory Valuation Report after correction.</em></div>'

  return [
    '<div class="correction-decision">',
    '<div class="cd-title">&#128203; Correction Decision</div>',
    actionsHTML,
    projHTML,
    infoHTML,
    doNotHTML,
    validationHTML,
    '</div>'
  ].join('')
}

function openInv(sku) {
  const item = allData.find(r => r.sku===sku)
  if (!item) return
  const steps = runInvestigation(item)
  const cd = buildCorrectionDecision(item)
  const dSign = item.diff!==null&&item.diff>0?"+":""
  const dCls = item.diff===null?"":item.isAccountingNegative?"c-critical":item.diff>0?"c-green":"c-red"

  const dateAlertHtml = item.dateMismatch
    ? `<div class="date-alert-box">⚪ <strong>No Action Yet.</strong> Stock: <strong>${item.stockDate}</strong> · Valuation: <strong>${item.valDate}</strong>. Use "Sync Now" or run syncs manually before acting.</div>`
    : ""

  const whBreakdown = item.whStock.length > 0 ? `<div class="wh-breakdown"><div class="wh-breakdown-title">Physical Stock by Warehouse</div>${item.whStock.map(w => {
    const inactive = isInactiveWh(w.warehouse_name)
    const cls = inactive && w.qty !== 0 ? "wh-inactive-issue" : w.qty === 0 ? "wh-zero" : "wh-active"
    return `<div class="wh-row ${cls}"><span class="wh-name">${w.warehouse_name||"Unknown"}${inactive?`<span class="badge badge-inactive" style="margin-left:6px">Inactive</span>`:""}</span><span class="wh-qty">${fmt(w.qty)} units</span></div>`
  }).join("")}</div>` : ""

  const sourceBanner = `<div class="source-banner">
    <div class="source-box source-physical">
      <div class="source-box-lbl">Physical Stock · Stock on Hand</div>
      <div class="source-box-val">${fmt(item.physical)}</div>
      <div class="source-box-sub">Zoho Stock Summary → Sheet: Stock · ${item.stockDate||"—"}</div>
      ${whBreakdown}
    </div>
    <div class="source-box source-official ${item.isAccountingNegative?'critical':''}">
      <div class="source-box-lbl">Official Accounting Stock · Valuation Report${item.isAccountingNegative?' ⚠ NEGATIVE':''}</div>
      <div class="source-box-val ${item.isAccountingNegative?'c-critical':''}">${item.hasValuation?fmt(item.accounting):"Not found"}</div>
      <div class="source-box-sub">Zoho Valuation Report → ${item.valDate||"—"}<br>Value: $${fmt(item.inventoryValue)} · Unit Cost: $${fmt(item.unitCost)}</div>
    </div>
    <div class="source-box source-diff ${item.diff===0?'ok':''}">
      <div class="source-box-lbl">Difference = Physical − Official Accounting</div>
      <div class="source-box-val ${dCls}">${item.diff===null?"—":dSign+fmt(item.diff)}</div>
      <div class="source-box-sub">Est. Acc. Movement: ${fmt(item.estAccounting)} units${item.creditNoteQty>0?`<br>Credit Notes: +${fmt(item.creditNoteQty)}`:""}${item.draftBills.length>0?`<br><span style="color:var(--amber);font-weight:600">${item.draftBills.length} Draft Bill(s) pending</span>`:""}</div>
    </div>
  </div>`

  const stepsHtml = steps.map((s, idx) => {
    const cls = {ok:"s-ok",warn:"s-warn",err:"s-err",critical:"s-critical",skip:"s-skip",info:"s-info"}[s.status]||"s-skip"
    const scls = {ok:"ss-ok",warn:"ss-warn",err:"ss-err",critical:"ss-critical",skip:"ss-skip",info:"ss-info"}[s.status]||"ss-skip"
    const slbl = {ok:"✓ OK",warn:"⚠ Warning",err:"⚠ Issue",critical:"🚫 Critical",skip:"— Skipped",info:"ℹ Info"}[s.status]||"Skip"
    const isOpenStep = s.status==="err"||s.status==="warn"||s.status==="critical"
    const atMap = { safe:{cls:"at-safe",label:"✓ Safe to investigate"}, operational:{cls:"at-operational",label:"🔧 Safe to correct operationally"}, manager:{cls:"at-manager",label:"👔 Manager approval"}, accounting:{cls:"at-accounting",label:"📊 Accounting approval"}, critical:{cls:"at-critical",label:"🚫 Do not adjust yet"}, gray:{cls:"at-safe",label:"⚪ Validate first"}, red:{cls:"at-critical",label:"🔴 High risk"} }
    const at = atMap[s.actionType] || atMap.safe
    const finHtml = s.finImpact ? `<div class="fin-impact" style="margin-bottom:12px"><div class="fin-impact-title">⚠ Financial Impact — Review before execution</div><div class="fin-impact-list">${s.finImpact.map(r=>`<span class="fin-tag">${r}</span>`).join("")}</div></div>` : ""
    let docsHtml = ""
    if (s.docs && s.docs.length > 0) {
      const isDraft = s.docType==="bill-draft"
      docsHtml = `<div class="doc-list">${s.docs.slice(0,8).map(d => {
        const isProblem = !isDraft && ((s.docType==="bill"&&!d.receive_id)||(s.docType==="invoice"&&!d.so_number))
        const dcls = isDraft?"fdi-draft":isProblem?"fdi-prob":"fdi-neutral"
        const linked = s.docType==="bill"?(d.receive_id?`Receive: ${d.receive_number||d.receive_id}`:`<span style="color:var(--red);font-weight:600">No Receive</span>`)
          :s.docType==="invoice"?(d.so_number?`SO: ${d.so_number}`:`<span style="color:var(--red)">No SO</span>`)
          :s.docType==="shipment"?(d.so_number?`SO: ${d.so_number}`:`<span style="color:var(--amber)">No SO</span>`)
          :""
        return `<div class="fdi ${dcls}"><div class="fdi-left"><div class="fdi-num">${d.number||"—"}</div><div class="fdi-meta">${fmtDate(d.date)}${d.status?" · "+d.status:""}${isDraft?' <strong style="color:var(--amber)">DRAFT</strong>':""}${linked?" · "+linked:""}</div></div><div class="fdi-qty">${fmt(d.qty)} un</div></div>`
      }).join("")}${s.docs.length>8?`<div style="font-size:11px;color:var(--muted);padding:4px">+ ${s.docs.length-8} more</div>`:""}</div>`
    }
    return `<div class="fsc ${cls}">
      <div class="fsc-head" onclick="toggleStep(${idx})">
        <span class="fsc-num">Step ${s.num}</span>
        <span class="fsc-title">${s.title}</span>
        <span class="ss ${scls}" style="margin-left:auto">${slbl}</span>
        <span class="arr ${isOpenStep?'open':''}" style="margin-left:10px" id="farr-${idx}">▶</span>
      </div>
      <div class="fsc-body ${isOpenStep?'open':''}" id="fbdy-${idx}">
        <div class="at ${at.cls}">${at.label}</div>
        ${finHtml}
        <div class="finding-box"><div class="finding-lbl">Finding</div>${s.finding}</div>
        ${docsHtml}
        ${s.action?`<div class="action-blk"><div class="action-blk-lbl">${s.action.label||"Action"}</div><div class="action-blk-body">${s.action.steps}</div></div>`:""}
      </div>
    </div>`
  }).join("")

  const correctionBlock = buildCorrectionHTML(item, cd)

  const invPage = document.getElementById("inv-page")
  const tblView = document.getElementById("tbl-view")
  if (invPage && tblView) {
    tblView.classList.add("hidden")
    const backBtn = '<button class="back-btn" onclick="closeInv()">&#8592; Back to All SKUs</button>'
    const hdrOpen = '<div class="inv-hdr ' + (item.isAccountingNegative?'critical':'') + '">'
    const skuLine = '<div class="inv-sku">' + item.sku + (item.isAccountingNegative?' <span class="badge badge-critical">CRITICAL</span>':'') + '</div>'
    const nameLine = '<div class="inv-name">' + (item.name||'—') + '</div>'
    const hdrClose = '</div>'
    const stepsWrap = '<div class="full-steps">' + stepsHtml + '</div>'
    invPage.innerHTML = backBtn + dateAlertHtml + hdrOpen + skuLine + nameLine + sourceBanner + hdrClose + stepsWrap + correctionBlock
    invPage.classList.add("active")
    window.scrollTo(0,0)
  }
}

function closeInv() {
  document.getElementById("inv-page").classList.remove("active")
  document.getElementById("inv-page").innerHTML=""
  document.getElementById("tbl-view").classList.remove("hidden")
}
function toggleStep(idx) {
  document.getElementById(`fbdy-${idx}`)?.classList.toggle("open")
  document.getElementById(`farr-${idx}`)?.classList.toggle("open")
}
function norm(v){return String(v||"").trim().toUpperCase()}
function flt(v){return parseFloat(v)||0}
function fmt(n){return parseFloat(n||0).toLocaleString("en-CA",{maximumFractionDigits:2})}
function fmtVal(n){if(!n)return"$0";return`${n>0?"+":"-"}$${Math.abs(n).toLocaleString("en-CA",{minimumFractionDigits:2,maximumFractionDigits:2})}`}
function causeInfo(c){
  return({
    "receive-no-bill":{cls:"cp-rnb",label:"Receive → No Bill"},
    "bill-no-receive":{cls:"cp-bnr",label:"Bill → No Receive"},
    "shipment-no-invoice":{cls:"cp-sni",label:"Shipment → No Invoice"},
    "invoice-no-shipment":{cls:"cp-ins",label:"Invoice → No Shipment"},
    "draft-pending":{cls:"cp-draft",label:"Draft Pending"},
    "inactive-warehouse":{cls:"cp-wh",label:"Inactive WH"},
    "critical":{cls:"cp-critical",label:"⚠ Critical"},
    "opening-balance":{cls:"cp-multi",label:"Opening Balance"},
    "date-mismatch":{cls:"cp-noval",label:"Date Mismatch"},
    "multiple":{cls:"cp-multi",label:"Multiple Causes"},
    "no-valuation":{cls:"cp-noval",label:"No Valuation"},
    "ok":{cls:"cp-ok",label:"Reconciled"},
  })[c]||{cls:"cp-multi",label:"Review Needed"}
}
function getFiltered(){
  let d=[...allData]
  if(searchTerm){const q=searchTerm.toLowerCase();d=d.filter(r=>r.sku.toLowerCase().includes(q)||r.name.toLowerCase().includes(q))}
  if(activeFilter==="discrepancy")d=d.filter(r=>r.diff!==0&&r.diff!==null&&!(r.physical===0&&!r.hasValuation))
  if(activeFilter==="critical")d=d.filter(r=>r.isAccountingNegative)
  if(activeFilter==="physical_gt")d=d.filter(r=>r.diff!==null&&r.diff>0)
  if(activeFilter==="accounting_gt")d=d.filter(r=>r.diff!==null&&r.diff<0)
  if(activeFilter==="inactive_wh")d=d.filter(r=>r.hasInactiveWhIssue)
  if(activeFilter==="ok")d=d.filter(r=>r.diff===0)
  if(sortBy==="value_diff")d.sort((a,b)=>Math.abs(b.valueDiff||0)-Math.abs(a.valueDiff||0))
  if(sortBy==="qty_diff")d.sort((a,b)=>Math.abs(b.diff||0)-Math.abs(a.diff||0))
  if(sortBy==="sku")d.sort((a,b)=>a.sku.localeCompare(b.sku))
  if(sortBy==="physical")d.sort((a,b)=>b.physical-a.physical)
  return d
}
function toggleRow(idx){if(openRows.has(idx))openRows.delete(idx);else openRows.add(idx);renderTable()}
function setFilter(f){activeFilter=f;openRows.clear();renderTable()}
function setSort(s){sortBy=s;openRows.clear();renderTable()}
function onSearch(v){searchTerm=v;openRows.clear();renderTable()}

init()
</script>
</body>
</html>
