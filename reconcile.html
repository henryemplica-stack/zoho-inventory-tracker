<body>
<header>
  <div class="logo-wrap">
    <div class="company-name">FCS Can Ltd.</div>
    <div class="hdr-div"></div>
    <div>
      <div class="app-name">Accounting Reconciliation</div>
      <div class="tagline">Physical vs Official Accounting Stock</div>
    </div>
  </div>
  <div class="hdr-actions">
    <button class="btn-hdr" onclick="init()">↺ Refresh Data</button>
  </div>
</header>
<div class="container">
  <div id="main-content">
    <div class="loading-screen">
      <div class="loading-bar"><div class="loading-fill"></div></div>
      <div class="loading-text" id="load-msg">Loading data...</div>
    </div>
  </div>
</div>
<script>
const SHEET_ID = "1j6D_5NN07ovQa62wVvWs_7n6uXjystpVNHoJFsNe32Y"
const INACTIVE_WAREHOUSES = ["fcs consignment delta"]
let allData = [], activeFilter = "discrepancy", searchTerm = "", sortBy = "value_diff", openRows = new Set()

function parseDate(v) {
  if (!v) return null
  if (typeof v === "string") {
    const m = v.match(/Date\((\d+),(\d+),(\d+)/)
    if (m) return new Date(parseInt(m[1]), parseInt(m[2]), parseInt(m[3]))
    if (v.match(/^\d{4}-\d{2}-\d{2}/)) return new Date(v)
  }
  if (typeof v === "number") return new Date(v)
  if (v instanceof Date) return v
  return null
}
function fmtDate(v) { const d = parseDate(v); if (!d) return "—"; return d.toLocaleDateString("en-CA") }
function dateStr(v) { const d = parseDate(v); if (!d) return ""; return d.toISOString().substring(0,10) }

async function readSheet(name) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(name)}&headers=1`
  const res = await fetch(url)
  const text = await res.text()
  const m = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)
  if (!m) throw new Error(`Cannot read: ${name}`)
  const json = JSON.parse(m[1])
  if (!json.table || !json.table.rows) return []
  const cols = json.table.cols.map(c => c.label || "")
  return json.table.rows.map(r => {
    const o = {}
    cols.forEach((c, i) => { o[c] = r.c[i]?.v ?? "" })
    return o
  })
}

async function init() {
  setMsg("Loading data...")
  try {
    const [stockRows, valRows, valWhRows, billRows, invoiceRows, movRows] = await Promise.all([
      readSheet("Stock"), readSheet("Valuation"), readSheet("Valuation_WH"),
      readSheet("Bills"), readSheet("Invoices"), readSheet("Sheet1")
    ])
    setMsg("Calculating reconciliation...")
    allData = buildReconciliation(stockRows, valRows, valWhRows, billRows, invoiceRows, movRows)
    renderTable()
  } catch(e) {
    document.getElementById("main-content").innerHTML = `<div class="error-box"><strong>Error:</strong> ${e.message}</div>`
  }
}

function setMsg(msg) {
  const el = document.getElementById("load-msg")
  if (el) { el.textContent = msg; return }
  document.getElementById("main-content").innerHTML = `
    <div class="loading-screen"><div class="loading-bar"><div class="loading-fill"></div></div>
    <div class="loading-text" id="load-msg">${msg}</div></div>`
}

function isInactiveWh(name) { return INACTIVE_WAREHOUSES.includes(String(name || "").toLowerCase().trim()) }

function buildReconciliation(stockRows, valRows, valWhRows, billRows, invoiceRows, movRows) {
  const physBySku = {}, nameBySku = {}, stockDateBySku = {}, whStockBySku = {}
  stockRows.forEach(r => {
    const sku = norm(r.sku); if (!sku) return
    const qty = flt(r.physical_stock)
    physBySku[sku] = (physBySku[sku] || 0) + qty
    if (r.item_name) nameBySku[sku] = r.item_name
    const d = dateStr(r.last_updated); if (d) stockDateBySku[sku] = d
    if (!whStockBySku[sku]) whStockBySku[sku] = []
    whStockBySku[sku].push({ warehouse_name: String(r.warehouse_name || ""), warehouse_status: String(r.warehouse_status || "active"), qty })
  })

  const accBySku = {}, valValueBySku = {}, unitCostBySku = {}, valDateBySku = {}
  valRows.forEach(r => {
    const sku = norm(r.sku); if (!sku) return
    accBySku[sku] = (accBySku[sku] || 0) + flt(r.valuation_qty)
    valValueBySku[sku] = (valValueBySku[sku] || 0) + flt(r.inventory_value)
    if (flt(r.unit_cost) > 0) unitCostBySku[sku] = flt(r.unit_cost)
    const d = dateStr(r.as_of_date); if (d) valDateBySku[sku] = d
  })

  const valWhBySku = {}
  valWhRows.forEach(r => {
    const sku = norm(r.sku); if (!sku) return
    if (!valWhBySku[sku]) valWhBySku[sku] = []
    valWhBySku[sku].push({
      warehouse_id: r.warehouse_id || "",
      warehouse_name: String(r.warehouse_name || ""),
      warehouse_status: String(r.warehouse_status || "active"),
      qty: flt(r.valuation_qty),
      value: flt(r.inventory_value)
    })
  })

  const billsBySku = {}
  billRows.forEach(r => {
    const sku = norm(r.sku); if (!sku) return
    if (!billsBySku[sku]) billsBySku[sku] = []
    billsBySku[sku].push({
      number: r.bill_number || "", date: r.date || "",
      qty: flt(r.qty), unit_cost: flt(r.unit_cost),
      receive_id: r.receive_id || "", receive_number: r.receive_number || "",
      po_number: r.po_number || "", status: String(r.status || "").toLowerCase()
    })
  })

  const invoicesBySku = {}, invoicesBySo = {}
  invoiceRows.forEach(r => {
    const sku = norm(r.sku); if (!sku) return
    const soNum = String(r.so_number || "").trim()
    if (!invoicesBySku[sku]) invoicesBySku[sku] = []
    const inv = {
      number: r.invoice_number || "", date: r.date || "",
      qty: flt(r.qty), shipment_id: r.shipment_id || "",
      so_number: soNum, status: String(r.status || "").toLowerCase(),
      warehouse_name: r.warehouse_name || ""
    }
    invoicesBySku[sku].push(inv)
    if (soNum) { if (!invoicesBySo[soNum]) invoicesBySo[soNum] = []; invoicesBySo[soNum].push(inv) }
  })

  const receivesBySku = {}, shipmentsBySku = {}, adjBySku = {}
  movRows.forEach(r => {
    const sku = norm(r.sku); if (!sku) return
    const mod = String(r.module || "")
    const qty = flt(r.quantity) || flt(r.qty_received) || flt(r.quantity_packed) || flt(r.quantity_adjusted) || 0
    const soNum = String(r.so_number || "").trim()
    const doc = { number: r.doc_number || "", date: r.timestamp || "", qty, status: String(r.status || ""), so_number: soNum }
    if (mod === "Purchase Receive") { if (!receivesBySku[sku]) receivesBySku[sku] = []; receivesBySku[sku].push(doc) }
    if (mod === "Shipment" || mod === "Force Fulfill") { if (!shipmentsBySku[sku]) shipmentsBySku[sku] = []; shipmentsBySku[sku].push({...doc, force: mod==="Force Fulfill"}) }
    if (mod === "Inventory Adjustment") { if (!adjBySku[sku]) adjBySku[sku] = []; adjBySku[sku].push(doc) }
  })

  const allSkus = new Set([...Object.keys(physBySku), ...Object.keys(accBySku)])

  return [...allSkus].filter(s => s && s !== "SKU" && s !== "sku").map(sku => {
    const physical = physBySku[sku] ?? 0
    const accounting = accBySku[sku] ?? null
    const hasValuation = accounting !== null
    const diff = hasValuation ? physical - accounting : null
    const isAccountingNegative = hasValuation && accounting < 0

    const bills = billsBySku[sku] || []
    const invoices = invoicesBySku[sku] || []
    const receives = receivesBySku[sku] || []
    const shipments = shipmentsBySku[sku] || []
    const adjustments = adjBySku[sku] || []
    const whStock = whStockBySku[sku] || []
    const whValuation = valWhBySku[sku] || []

    const draftBills = bills.filter(b => b.status === "draft")
    const activeBills = bills.filter(b => b.status !== "draft")
    const draftInvoices = invoices.filter(i => i.status === "draft")
    const activeInvoices = invoices.filter(i => i.status !== "draft")

    const billQty = activeBills.reduce((s,b) => s+b.qty, 0)
    const invoiceQty = activeInvoices.reduce((s,i) => s+i.qty, 0)
    const estAccounting = billQty - invoiceQty
    const draftBillQty = draftBills.reduce((s,b) => s+b.qty, 0)
    const draftInvoiceQty = draftInvoices.reduce((s,i) => s+i.qty, 0)
    const projectedAccounting = hasValuation ? accounting + draftBillQty - draftInvoiceQty : null
    const projectedDiff = projectedAccounting !== null ? physical - projectedAccounting : null

    const receivedQty = receives.reduce((s,r) => s+r.qty, 0)
    const shippedQty = shipments.reduce((s,s2) => s+s2.qty, 0)

    const billsNoReceive = activeBills.filter(b => !b.receive_id)
    const shipmentsNoInvoice = shipments.filter(s => {
      if (!s.so_number) return true
      return !invoicesBySo[s.so_number] || invoicesBySo[s.so_number].length === 0
    })
    const invoicesNoShipment = activeInvoices.filter(i => {
      if (!i.so_number) return true
      return !shipments.some(s => s.so_number === i.so_number)
    })

    // Warehouse analysis
    const inactiveWhPhysical = whStock.filter(w => isInactiveWh(w.warehouse_name) && w.qty !== 0)
    const inactiveWhAccounting = whValuation.filter(w => isInactiveWh(w.warehouse_name) && (w.qty !== 0 || w.value !== 0))
    const hasInactiveWhIssue = inactiveWhPhysical.length > 0 || inactiveWhAccounting.length > 0

    let whCase = null
    if (hasInactiveWhIssue) {
      const physQty = inactiveWhPhysical.reduce((s,w) => s+w.qty, 0)
      const accQty = inactiveWhAccounting.reduce((s,w) => s+w.qty, 0)
      const accVal = inactiveWhAccounting.reduce((s,w) => s+w.value, 0)
      if (physQty !== 0 && accQty !== 0) whCase = "A"
      else if (physQty === 0 && accQty !== 0) whCase = "B"
      else if (physQty === 0 && accQty === 0 && accVal !== 0) whCase = "C"
      else whCase = "D"
    }

    const unitCost = unitCostBySku[sku] || (hasValuation && accounting > 0 ? (valValueBySku[sku]||0)/accounting : 0)
    const valueDiff = diff !== null ? diff * unitCost : null
    const stockDate = stockDateBySku[sku] || ""
    const valDate = valDateBySku[sku] || ""
    const dateMismatch = stockDate && valDate && stockDate !== valDate

    let primaryCause = "ok"
    if (!hasValuation) primaryCause = "no-valuation"
    else if (diff !== null && diff !== 0) {
      if (isAccountingNegative) primaryCause = "critical"
      else if (hasInactiveWhIssue) primaryCause = "inactive-warehouse"
      else if (draftBills.length > 0 && diff < 0) primaryCause = "draft-bill"
      else if (diff > 0 && receivedQty > billQty && receives.length > 0) primaryCause = "receive-no-bill"
      else if (diff < 0 && billsNoReceive.length > 0) primaryCause = "bill-no-receive"
      else if (diff < 0 && shipmentsNoInvoice.length > 0) primaryCause = "shipment-no-invoice"
      else if (diff > 0 && invoicesNoShipment.length > 0) primaryCause = "invoice-no-shipment"
      else primaryCause = "multiple"
    }

    return {
      sku, name: nameBySku[sku] || "", physical, accounting, hasValuation,
      diff, unitCost, valueDiff, estAccounting,
      projectedAccounting, projectedDiff, draftBillQty, draftInvoiceQty,
      isAccountingNegative,
      bills, activeBills, draftBills, invoices, activeInvoices, draftInvoices,
      receives, shipments, adjustments, whStock, whValuation,
      billQty, invoiceQty, receivedQty, shippedQty,
      billsNoReceive, invoicesNoShipment, shipmentsNoInvoice,
      inactiveWhPhysical, inactiveWhAccounting, hasInactiveWhIssue, whCase,
      primaryCause, stockDate, valDate, dateMismatch,
      inventoryValue: valValueBySku[sku] || 0
    }
  })
}

function atBadge(type) {
  const map = {
    safe:        { cls:"at-safe",        label:"✓ Safe to investigate" },
    operational: { cls:"at-operational", label:"🔧 Safe to correct operationally" },
    manager:     { cls:"at-manager",     label:"👔 Requires manager approval" },
    accounting:  { cls:"at-accounting",  label:"📊 Requires accounting review" },
    critical:    { cls:"at-critical",    label:"🚫 Do not adjust yet — Critical" },
  }
  const t = map[type] || map.safe
  return `<div class="at ${t.cls}">${t.label}</div>`
}

function finImpactBox(reports) {
  return `<div class="fin-impact">
    <div class="fin-impact-title">⚠ Financial Impact Warning</div>
    This correction may affect Zoho Books financial statements. Review before execution.
    <div class="fin-impact-list">${reports.map(r => `<span class="fin-impact-tag">${r}</span>`).join("")}</div>
  </div>`
}

function runInvestigation(item) {
  const steps = []
  const diff = item.diff
  const absDiff = Math.abs(diff || 0)

  // STEP 01
  steps.push({
    num:"01", title:"Item Overview", status:"info", actionType:"safe",
    finding:`Physical Stock: <strong>${fmt(item.physical)}</strong> units<br>
      Official Accounting Stock: <strong>${item.hasValuation ? fmt(item.accounting) : "Not found"}</strong>${item.isAccountingNegative?' <span style="color:var(--critical);font-weight:700">⚠ NEGATIVE ACCOUNTING STOCK</span>':""}<br>
      Est. Accounting Movement (Active Bills − Invoices): <strong>${fmt(item.estAccounting)}</strong> (diagnostic only)<br>
      Draft Bills: <strong>${item.draftBills.length}</strong> (${fmt(item.draftBillQty)} units) · Draft Invoices: <strong>${item.draftInvoices.length}</strong> (${fmt(item.draftInvoiceQty)} units)`,
    action: null, finImpact: null
  })

  // STEP 02
  steps.push({
    num:"02", title:"Report Date Validation", status: item.dateMismatch?"warn":"ok", actionType: item.dateMismatch?"operational":"safe",
    finding: item.dateMismatch
      ? `Stock synced on <strong>${item.stockDate}</strong>, Valuation synced on <strong>${item.valDate}</strong>. Dates differ — reconciliation may show false discrepancies. Run both syncs on the same day before acting.`
      : `Both reports share sync date <strong>${item.stockDate||"unknown"}</strong>. Passed.`,
    action: item.dateMismatch ? { label:"How to fix", steps:`Run <strong>syncPhysicalStock</strong> then <strong>syncValuation</strong> on the same day in Apps Script.` } : null,
    finImpact: null
  })

  // STEP 03 — Warehouse (only show relevant case)
  if (item.hasInactiveWhIssue) {
    const physQty = item.inactiveWhPhysical.reduce((s,w) => s+w.qty, 0)
    const accQty = item.inactiveWhAccounting.reduce((s,w) => s+w.qty, 0)
    const accVal = item.inactiveWhAccounting.reduce((s,w) => s+w.value, 0)
    let wh3finding = "", wh3action = null, wh3actionType = "manager"

    if (item.whCase === "A") {
      wh3finding = `Physical stock (<strong>${fmt(physQty)}</strong> units) and Accounting stock (<strong>${fmt(accQty)}</strong> units) both exist in inactive warehouse <strong>FCS Consignment Delta</strong>. Both need to be moved to an active warehouse.`
      wh3action = { label:"Recommended Action — Case A", steps:`1. Temporarily reactivate FCS Consignment Delta in Zoho Settings<br>2. Create a Transfer Order from FCS Consignment Delta to the correct active warehouse<br>3. Transfer the full quantity<br>4. Validate Stock on Hand and Inventory Valuation by warehouse<br>5. Reactivate the inactive warehouse` }
      wh3actionType = "manager"
    } else if (item.whCase === "B") {
      wh3finding = `Accounting stock (<strong>${fmt(accQty)}</strong> units) exists in inactive warehouse <strong>FCS Consignment Delta</strong> but Physical stock is zero. Accounting record exists without physical stock in that location.`
      wh3action = { label:"Recommended Action — Case B", steps:`1. Identify which document created the accounting stock in FCS Consignment Delta (Bill, Receive, Opening Balance, or Adjustment)<br>2. Correct the document if possible — change warehouse to the correct active warehouse<br>3. If document cannot be corrected: use a Quantity Adjustment as a last resort with accounting approval<br>4. Validate Inventory Valuation shows zero for this warehouse` }
      wh3actionType = "accounting"
    } else if (item.whCase === "C") {
      wh3finding = `Inventory value ($${fmt(accVal)}) is trapped in inactive warehouse <strong>FCS Consignment Delta</strong> but quantity is zero. This is a value residual without quantity.`
      wh3action = { label:"Recommended Action — Case C", steps:`1. Review Inventory Valuation Detail for this SKU in FCS Consignment Delta<br>2. Look for Value Adjustment, Revaluation, or landed cost entries<br>3. Create a Value Adjustment to zero out the trapped value<br>4. Use the correct account with accounting guidance` }
      wh3actionType = "accounting"
    } else {
      wh3finding = `Warehouse discrepancy detected in <strong>FCS Consignment Delta</strong>. The company total may match but the warehouse breakdown does not. This indicates a possible wrong warehouse entry or incomplete transfer.`
      wh3action = { label:"Recommended Action — Case D", steps:`1. Identify which document was posted to the wrong warehouse<br>2. Use Transfer Order if quantity is transferable<br>3. If not, use mirrored adjustments: reduce in incorrect warehouse, increase in correct warehouse on same date<br>4. Validate that both warehouse totals and company total are correct` }
      wh3actionType = "manager"
    }

    steps.push({
      num:"03", title:"Warehouse Analysis — Inactive Warehouse Issue", status:"err", actionType: wh3actionType,
      finding: wh3finding, action: wh3action,
      finImpact: ["Inventory Asset","Inventory Valuation","Balance Sheet"]
    })
  } else {
    const activeWithStock = item.whStock.filter(w => !isInactiveWh(w.warehouse_name) && w.qty > 0)
    steps.push({
      num:"03", title:"Warehouse Analysis", status:"ok", actionType:"safe",
      finding: activeWithStock.length > 1
        ? `Stock spread across ${activeWithStock.length} active warehouses: ${activeWithStock.map(w=>`${w.warehouse_name}: <strong>${fmt(w.qty)}</strong>`).join(" · ")}. Verify all are correct and no transfer is pending.`
        : `No inactive warehouse issues detected.`,
      action: null, finImpact: null
    })
  }

  // STEP 04 — Draft Bills
  if (item.draftBills.length > 0) {
    const projDiff = item.projectedDiff
    const projSign = projDiff !== null && projDiff > 0 ? "+" : ""
    steps.push({
      num:"04", title:"Draft Bills Detected", status:"warn", actionType:"operational",
      finding:`<strong>${item.draftBills.length} Bill(s) in Draft status</strong> found. Draft Bills do not impact Official Accounting Stock until confirmed as Open.<br><br>
        If confirmed: Accounting Stock would change from <strong>${fmt(item.accounting)}</strong> to <strong>${fmt(item.projectedAccounting)}</strong><br>
        Projected Difference would change from <strong>${item.diff>0?"+":""}${fmt(item.diff)}</strong> to <strong>${projSign}${fmt(projDiff)}</strong>`,
      action:{ label:"Action", steps: item.draftBills.slice(0,5).map((b,i) =>
        `${i+1}. Open Bill <strong>${b.number||"—"}</strong> (${fmtDate(b.date)}, ${fmt(b.qty)} units) → Verify quantities match Purchase Receive → If correct: confirm to Open → If wrong: void or delete`
      ).join("<br>") },
      docs: item.draftBills, docType:"bill-draft",
      finImpact: ["Inventory Asset","Accounts Payable","Inventory Valuation","Balance Sheet"]
    })
  }

  if (!item.hasValuation) {
    steps.push({ num:"05", title:"Accounting vs Physical", status:"warn", actionType:"accounting",
      finding:`No entry in Valuation Report for this SKU. Physical: <strong>${fmt(item.physical)}</strong>. Cannot calculate official difference.`,
      action:{ label:"Action", steps:`Zoho Inventory → Reports → Inventory Valuation Summary → Search <strong>${item.sku}</strong> → If not found: check item cost method, opening stock, and whether item has been assigned a cost.` },
      finImpact: ["Inventory Asset","Inventory Valuation"]
    })
    steps.push({ num:"—", title:"Remaining steps", status:"skip", actionType:"safe", finding:"Cannot run full investigation without Official Accounting Stock.", action:null, finImpact:null })
    return steps
  }

  if (diff === 0) {
    steps.push({ num:"05", title:"Accounting vs Physical", status:"ok", actionType:"safe",
      finding:`✓ Physical Stock (<strong>${fmt(item.physical)}</strong>) equals Official Accounting Stock (<strong>${fmt(item.accounting)}</strong>). SKU is reconciled.`,
      action:null, finImpact:null })
    steps.push({ num:"—", title:"Remaining steps", status:"skip", actionType:"safe", finding:"No discrepancy — no further investigation needed.", action:null, finImpact:null })
    return steps
  }

  // CRITICAL STATUS
  if (item.isAccountingNegative) {
    steps.push({
      num:"05", title:"Accounting vs Physical — CRITICAL", status:"critical", actionType:"critical",
      finding:`<strong>Official Accounting Stock is NEGATIVE (${fmt(item.accounting)} units)</strong>. Physical Stock is positive at <strong>${fmt(item.physical)}</strong> units.<br><br>
        This means accounting outflows exceeded accounting inflows for this SKU. Likely causes in order of probability:<br>
        1. Invoices created without enough Bills/Opening Balance to support stock<br>
        2. Bills were voided/deleted after sales were already invoiced<br>
        3. Opening Balance missing or incorrect<br>
        4. Warehouse mismatch — entries and exits in different warehouses<br>
        5. Sales Return / Credit Note incorrectly applied<br><br>
        <strong>Do not create an Inventory Adjustment to fix this.</strong> Find the first transaction where Accounting Stock became negative first.`,
      action:{ label:"Recommended Investigation Path", steps:
        `1. Open Inventory Valuation Report for SKU <strong>${item.sku}</strong> in Zoho Inventory<br>
        2. Open Stock History / Item Transaction History for this SKU<br>
        3. Find the first date where Accounting Stock went below zero<br>
        4. On that date, identify the document that caused the drop (Invoice, Credit Note, voided Bill, Adjustment)<br>
        5. Correct the originating document — do not create a new adjustment yet<br>
        6. After corrections, run syncValuation and re-check this app<br>
        7. Only use a final Value or Quantity Adjustment if document corrections are not possible, and only with accounting approval` },
      finImpact: ["Inventory Asset","COGS","Inventory Valuation","Balance Sheet","Profit & Loss"]
    })
  } else {
    steps.push({
      num:"05", title:"Accounting vs Physical Comparison", status: diff>0?"warn":"err", actionType: diff>0?"operational":"accounting",
      finding: diff>0
        ? `Physical Stock is <strong>+${fmt(absDiff)}</strong> units higher than Accounting Stock. Physical inventory exists without equivalent accounting recognition.`
        : `Accounting Stock is <strong>+${fmt(absDiff)}</strong> units higher than Physical Stock. Accounting records exist without equivalent physical stock.`,
      action:{ label:"Direction of Investigation", steps: diff>0
        ? `Physical > Accounting. Check first: Purchase Receives without Bills → Opening Balance → Positive Inventory Adjustments → Stock import without valuation.`
        : `Accounting > Physical. Check first: Bills without Purchase Receives → Draft Bills not confirmed → Invoices without Shipments → Negative Adjustments → Incorrect Opening Balance.`
      }, finImpact: null
    })
  }

  // STEP 06 — Bills without Receives
  steps.push({
    num:"06", title:"Bills without Purchase Receives", status: item.billsNoReceive.length>0?"err":"ok",
    actionType: item.billsNoReceive.length>0?"accounting":"safe",
    finding: item.billsNoReceive.length>0
      ? `<strong>${item.billsNoReceive.length} Bill(s)</strong> with no linked Purchase Receive. These increased Accounting Stock without physical arrival.`
      : "All active Bills have a linked Purchase Receive.",
    action: item.billsNoReceive.length>0 ? { label:"Action", steps: item.billsNoReceive.slice(0,5).map((b,i) =>
      `${i+1}. Open Bill <strong>${b.number||"—"}</strong> in Zoho → Verify if goods physically arrived → If yes: create Purchase Receive from PO <strong>${b.po_number||"—"}</strong> → If no: void or delete the Bill`
    ).join("<br>") } : null,
    docs: item.billsNoReceive, docType:"bill",
    finImpact: item.billsNoReceive.length>0 ? ["Inventory Asset","Accounts Payable","Inventory Valuation"] : null
  })

  // STEP 07 — Invoices without Shipments
  steps.push({
    num:"07", title:"Invoices without Shipments", status: item.invoicesNoShipment.length>0?"err":"ok",
    actionType: item.invoicesNoShipment.length>0?"accounting":"safe",
    finding: item.invoicesNoShipment.length>0
      ? `<strong>${item.invoicesNoShipment.length} Invoice(s)</strong> with no matching Shipment (matched by Sales Order number). These reduced Accounting Stock without physical outbound.`
      : "All Invoices have a matching Shipment via Sales Order.",
    action: item.invoicesNoShipment.length>0 ? { label:"Action", steps: item.invoicesNoShipment.slice(0,5).map((inv,i) =>
      `${i+1}. Open Invoice <strong>${inv.number||"—"}</strong> (SO: <strong>${inv.so_number||"—"}</strong>) → If goods shipped: create Package/Shipment from SO → If not shipped: void the Invoice`
    ).join("<br>") } : null,
    docs: item.invoicesNoShipment, docType:"invoice",
    finImpact: item.invoicesNoShipment.length>0 ? ["Accounts Receivable","COGS","Inventory Valuation","Profit & Loss"] : null
  })

  // STEP 08 — Receives without Bills
  const rNoBill = item.receives.length>0 && item.activeBills.length===0
  const rLtB = item.receives.length>item.activeBills.length
  steps.push({
    num:"08", title:"Purchase Receives without Bills", status: rNoBill||(diff>0&&rLtB)?"err":"ok",
    actionType: rNoBill||(diff>0&&rLtB)?"operational":"safe",
    finding: rNoBill
      ? `<strong>${item.receives.length} Purchase Receive(s)</strong> found but no active Bills. Goods arrived physically but not posted to accounting.${item.draftBills.length>0?" Note: "+item.draftBills.length+" Draft Bill(s) exist but need confirmation.":""}`
      : rLtB ? `<strong>${item.receives.length} Receive(s)</strong> vs <strong>${item.activeBills.length} active Bill(s)</strong>. Some Receives may lack a Bill.`
      : `${item.receives.length} Receive(s) and ${item.activeBills.length} active Bill(s). Volume appears balanced.`,
    action: (rNoBill||rLtB) ? { label:"Action", steps: item.receives.slice(0,5).map((r,i) =>
      `${i+1}. Locate PO for Receive <strong>${r.number||"—"}</strong> → Click "Create Bill" → Confirm quantities → Save as Open`
    ).join("<br>") } : null,
    docs: item.receives, docType:"receive",
    finImpact: (rNoBill||rLtB) ? ["Inventory Asset","Accounts Payable","Inventory Valuation"] : null
  })

  // STEP 09 — Shipments without Invoices
  steps.push({
    num:"09", title:"Shipments without Invoices", status: item.shipmentsNoInvoice.length>0?"err":"ok",
    actionType: item.shipmentsNoInvoice.length>0?"operational":"safe",
    finding: item.shipmentsNoInvoice.length>0
      ? `<strong>${item.shipmentsNoInvoice.length} Shipment(s)</strong> with no matching Invoice (matched by Sales Order number). Goods left physically but not posted to accounting.`
      : "All Shipments have a matching Invoice via Sales Order.",
    action: item.shipmentsNoInvoice.length>0 ? { label:"Action", steps: item.shipmentsNoInvoice.slice(0,5).map((s,i) =>
      `${i+1}. Open SO for Shipment <strong>${s.number||"—"}</strong>${s.so_number?" ("+s.so_number+")":""} → Click "Create Invoice" → Confirm quantities → Save as Sent`
    ).join("<br>") } : null,
    docs: item.shipmentsNoInvoice, docType:"shipment",
    finImpact: item.shipmentsNoInvoice.length>0 ? ["Accounts Receivable","COGS","Inventory Valuation"] : null
  })

  // STEP 10 — Purchase qty cross-check
  const pDiff = item.receivedQty - item.billQty
  steps.push({
    num:"10", title:"Purchase Qty Cross-Check (Received vs Billed)", status: Math.abs(pDiff)>0.01?(pDiff>0?"warn":"err"):"ok",
    actionType: Math.abs(pDiff)>0.01?"operational":"safe",
    finding: Math.abs(pDiff)<0.01
      ? `Received <strong>${fmt(item.receivedQty)}</strong> matches Billed <strong>${fmt(item.billQty)}</strong>. Balanced.`
      : pDiff>0
        ? `Received <strong>${fmt(item.receivedQty)}</strong> but Billed only <strong>${fmt(item.billQty)}</strong>. <strong>Missing Bill for ${fmt(pDiff)} units.</strong>${item.draftBills.length>0?" Note: "+item.draftBills.length+" Draft Bill(s) pending confirmation.":""}`
        : `Billed <strong>${fmt(item.billQty)}</strong> but received only <strong>${fmt(item.receivedQty)}</strong>. Bill may have been created before goods arrived.`,
    action: Math.abs(pDiff)>0.01 ? { label:"Action", steps: pDiff>0
      ? `Create Bill for remaining <strong>${fmt(pDiff)}</strong> units from the relevant PO in Zoho Inventory`
      : `Review Bills with qty exceeding received — create missing Purchase Receive or adjust Bill qty`
    } : null,
    finImpact: Math.abs(pDiff)>0.01 ? ["Inventory Asset","Accounts Payable"] : null
  })

  // STEP 11 — Sales qty cross-check
  const sDiff = item.shippedQty - item.invoiceQty
  steps.push({
    num:"11", title:"Sales Qty Cross-Check (Shipped vs Invoiced)", status: Math.abs(sDiff)>0.01?(sDiff>0?"warn":"err"):"ok",
    actionType: Math.abs(sDiff)>0.01?"operational":"safe",
    finding: Math.abs(sDiff)<0.01
      ? `Shipped <strong>${fmt(item.shippedQty)}</strong> matches Invoiced <strong>${fmt(item.invoiceQty)}</strong>. Balanced.`
      : sDiff>0
        ? `Shipped <strong>${fmt(item.shippedQty)}</strong> but Invoiced only <strong>${fmt(item.invoiceQty)}</strong>. <strong>Missing Invoice for ${fmt(sDiff)} units.</strong>`
        : `Invoiced <strong>${fmt(item.invoiceQty)}</strong> but shipped only <strong>${fmt(item.shippedQty)}</strong>. Invoice may have been created before shipment.`,
    action: Math.abs(sDiff)>0.01 ? { label:"Action", steps: sDiff>0
      ? `Create Invoice for remaining <strong>${fmt(sDiff)}</strong> units from the relevant SO`
      : `Review Invoices with qty exceeding shipped — create missing Shipment or adjust Invoice qty`
    } : null,
    finImpact: Math.abs(sDiff)>0.01 ? ["Accounts Receivable","COGS","Profit & Loss"] : null
  })

  // STEP 12 — Adjustments
  steps.push({
    num:"12", title:"Inventory Adjustments", status: item.adjustments.length>0?"warn":"ok",
    actionType: item.adjustments.length>0?"accounting":"safe",
    finding: item.adjustments.length>0
      ? `<strong>${item.adjustments.length} Inventory Adjustment(s)</strong> found. Review each for: correct date, warehouse, account used (must post to Inventory Asset — not P&L unless write-off), and whether Quantity or Value Adjustment.`
      : "No Inventory Adjustments found for this SKU.",
    action: item.adjustments.length>0 ? { label:"Action", steps:`Zoho Inventory → Inventory → Inventory Adjustments → Filter by SKU <strong>${item.sku}</strong> → Verify date, warehouse, account, and type for each` } : null,
    docs: item.adjustments, docType:"adjustment",
    finImpact: item.adjustments.length>0 ? ["Inventory Asset","COGS","Inventory Valuation","Balance Sheet"] : null
  })

  // STEP 13 — Opening Balance
  steps.push({
    num:"13", title:"Opening Balance & Initial Import", status:"info", actionType:"accounting",
    finding:`If the discrepancy existed since this item's first transaction, root cause may be: incorrect opening stock, wrong opening cost, initial stock loaded to the wrong warehouse, or a migration import without valuation posting.`,
    action:{ label:"Action", steps:`Zoho Inventory → Items → SKU <strong>${item.sku}</strong> → Review "Opening Stock" and "Opening Stock Rate" → Cross-reference with physical count on migration date → If incorrect: consult your accountant — correction requires a Value Adjustment or opening balance edit, not a Quantity Adjustment` },
    finImpact: ["Inventory Asset","Inventory Valuation","Balance Sheet","COGS"]
  })

  return steps
}

// ── RENDER TABLE ──────────────────────────────────────
function renderTable() {
  const filtered = getFiltered()
  const total = allData.length
  const withDiff = allData.filter(r => r.diff!==0&&r.diff!==null).length
  const ok = allData.filter(r => r.diff===0).length
  const physGt = allData.filter(r => r.diff!==null&&r.diff>0).length
  const accGt = allData.filter(r => r.diff!==null&&r.diff<0).length
  const critical = allData.filter(r => r.isAccountingNegative).length
  const noVal = allData.filter(r => !r.hasValuation&&r.physical>0).length
  const inactiveWh = allData.filter(r => r.hasInactiveWhIssue).length
  const totalVal = allData.reduce((s,r) => s+Math.abs(r.valueDiff||0), 0)
  const now = new Date().toLocaleString("en-CA",{timeZone:"America/Vancouver"})

  const globalDisclaimer = `<div class="global-disclaimer">
    <div class="global-disclaimer-title">⚠ Investigation Tool — Not an Automatic Correction Tool</div>
    <div class="global-disclaimer-text">This app identifies likely causes and recommended correction paths. It does not replace accounting review. <strong>Do not create Inventory Adjustments or Value Adjustments until document mismatches, warehouse issues, draft documents, and opening balances have been reviewed.</strong></div>
    <div class="global-disclaimer-steps">Safe correction order: 1. Diagnose in this app &nbsp;·&nbsp; 2. Separate operational corrections from accounting corrections &nbsp;·&nbsp; 3. Do not void/delete paid or historical documents without reviewing impact &nbsp;·&nbsp; 4. Use a cut-off date &nbsp;·&nbsp; 5. Final adjustment only with accounting approval</div>
  </div>`

  const summary = `<div class="summary-grid">
    <div class="stat ${withDiff>0?'s-alert':'s-ok'}"><div class="stat-label">SKUs with Discrepancy</div><div class="stat-value ${withDiff>0?'c-red':'c-green'}">${withDiff}</div></div>
    <div class="stat ${critical>0?'s-critical':'s-ok'}"><div class="stat-label">Critical (Neg. Accounting)</div><div class="stat-value ${critical>0?'c-critical':'c-green'}">${critical}</div></div>
    <div class="stat ${physGt>0?'s-warn':''}"><div class="stat-label">Physical &gt; Accounting</div><div class="stat-value ${physGt>0?'c-amber':''}">${physGt}</div></div>
    <div class="stat ${accGt>0?'s-alert':''}"><div class="stat-label">Accounting &gt; Physical</div><div class="stat-value ${accGt>0?'c-red':''}">${accGt}</div></div>
    <div class="stat ${inactiveWh>0?'s-alert':''}"><div class="stat-label">Inactive Warehouse</div><div class="stat-value ${inactiveWh>0?'c-red':''}">${inactiveWh}</div></div>
    <div class="stat ${totalVal>0?'s-alert':'s-ok'}"><div class="stat-label">Total Value at Risk</div><div class="stat-value ${totalVal>0?'c-red':'c-green'}" style="font-size:16px">$${totalVal.toLocaleString("en-CA",{maximumFractionDigits:0})}</div></div>
  </div>`

  const disclaimer = `<div class="disclaimer">
    <strong>Official Accounting Stock</strong> = Zoho Inventory Valuation Report &nbsp;·&nbsp;
    <strong>Est. Acc. Movement</strong> = Active Bills − Invoices (diagnostic only) &nbsp;·&nbsp;
    <strong>Shipment/Invoice matching</strong> = by Sales Order number &nbsp;·&nbsp;
    Items with Physical = 0 and No Valuation are hidden from Issues filter
  </div>`

  const filters = `<div class="filter-bar">
    <input class="search-input" type="text" placeholder="Search SKU or name..." value="${searchTerm}" oninput="onSearch(this.value)" />
    <span class="flabel">Show:</span>
    <button class="filter-btn ${activeFilter==='all'?'active':''}" onclick="setFilter('all')">All (${total})</button>
    <button class="filter-btn ${activeFilter==='discrepancy'?'active':''}" onclick="setFilter('discrepancy')">Issues (${withDiff})</button>
    <button class="filter-btn ${activeFilter==='critical'?'active':''}" onclick="setFilter('critical')">Critical (${critical})</button>
    <button class="filter-btn ${activeFilter==='physical_gt'?'active':''}" onclick="setFilter('physical_gt')">Physical &gt; Acc (${physGt})</button>
    <button class="filter-btn ${activeFilter==='accounting_gt'?'active':''}" onclick="setFilter('accounting_gt')">Acc &gt; Physical (${accGt})</button>
    <button class="filter-btn ${activeFilter==='inactive_wh'?'active':''}" onclick="setFilter('inactive_wh')">Inactive WH (${inactiveWh})</button>
    <button class="filter-btn ${activeFilter==='ok'?'active':''}" onclick="setFilter('ok')">OK (${ok})</button>
    <span class="flabel ml-auto">Sort:</span>
    <select class="sort-sel" onchange="setSort(this.value)">
      <option value="value_diff" ${sortBy==='value_diff'?'selected':''}>Value Impact</option>
      <option value="qty_diff" ${sortBy==='qty_diff'?'selected':''}>Qty Difference</option>
      <option value="sku" ${sortBy==='sku'?'selected':''}>SKU</option>
      <option value="physical" ${sortBy==='physical'?'selected':''}>Physical Stock</option>
    </select>
    <span class="ts-label">Updated: ${now}</span>
  </div>`

  if (!filtered.length) {
    document.getElementById("main-content").innerHTML = globalDisclaimer + summary + disclaimer + filters +
      `<div class="empty-state"><div class="empty-big">✓</div><p>No items match the current filter.</p></div>`
    return
  }

  const rows = filtered.map((item, idx) => {
    const cp = causeInfo(item.primaryCause)
    const dCls = item.diff===null?"diff-zero":item.diff>0?"diff-pos":item.diff<0?"diff-neg":"diff-zero"
    const dSign = item.diff!==null&&item.diff>0?"+":""
    const vCls = !item.valueDiff?"":item.valueDiff>0?"c-green":item.valueDiff<0?"c-red":""
    const isOpen = openRows.has(idx)
    const draftBadge = item.draftBills.length>0?`<span class="badge badge-draft">${item.draftBills.length} DRAFT</span>`:""
    const critBadge = item.isAccountingNegative?`<span class="badge badge-critical">CRITICAL</span>`:""
    const whBadge = item.hasInactiveWhIssue?`<span class="badge badge-inactive">INACT.WH</span>`:""
    const rowClass = item.isAccountingNegative ? "row-critical" : ""

    return `<tr class="dr ${rowClass} ${isOpen?'expanded':''}" onclick="toggleRow(${idx})">
      <td style="width:26px"><span class="arr ${isOpen?'open':''}">▶</span></td>
      <td class="sku-cell" style="width:140px">${item.sku}${critBadge}${draftBadge}${whBadge}</td>
      <td class="name-cell" style="width:145px" title="${item.name}">${item.name||"—"}</td>
      <td class="mono r" style="width:85px">${fmt(item.physical)}</td>
      <td class="mono r" style="width:100px">${item.hasValuation?`<span ${item.isAccountingNegative?'style="color:var(--critical);font-weight:600"':''}>${fmt(item.accounting)}</span>`:'<span class="no-val">No data</span>'}</td>
      <td class="mono r" style="width:90px"><span style="font-size:10px;color:var(--muted)">${fmt(item.estAccounting)}</span></td>
      <td class="r" style="width:90px"><span class="${dCls}">${item.diff===null?"—":dSign+fmt(item.diff)}</span></td>
      <td class="r" style="width:115px"><span class="mono ${vCls}">${!item.valueDiff||item.unitCost===0?"—":fmtVal(item.valueDiff)}</span></td>
      <td style="width:175px"><span class="cp ${cp.cls}">${cp.label}</span></td>
      <td style="width:120px"><button class="open-full-btn" onclick="event.stopPropagation();openInv('${item.sku}')">Full Investigation →</button></td>
    </tr>
    <tr class="detail-row ${isOpen?'open':''}" id="drow-${idx}">
      <td class="detail-cell" colspan="10"><div class="detail-inner">${buildInlineDetail(item)}</div></td>
    </tr>`
  }).join("")

  document.getElementById("main-content").innerHTML = globalDisclaimer + summary + disclaimer + filters + `
    <div id="tbl-view">
      <div class="table-wrap"><table>
        <thead><tr>
          <th style="width:26px"></th>
          <th style="width:140px">SKU</th>
          <th style="width:145px">Item Name</th>
          <th class="r" style="width:85px">Physical</th>
          <th class="r" style="width:100px">Official Acc.</th>
          <th class="r" style="width:90px">Est. Acc. Mov.</th>
          <th class="r" style="width:90px">Difference</th>
          <th class="r" style="width:115px">Value Impact</th>
          <th style="width:175px">Primary Cause</th>
          <th style="width:120px"></th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
      <p class="result-meta">${filtered.length} of ${total} SKU(s) shown · Official Acc. = Valuation Report · Est. Acc. Mov. = Active Bills − Invoices · SO-based shipment matching</p>
    </div>
    <div id="inv-page"></div>`
}

function buildInlineDetail(item) {
  if (!item.hasValuation && item.physical === 0) return `<div style="font-size:12px;color:var(--muted)">Physical stock is zero and no Valuation data. Item may be inactive.</div>`
  if (!item.hasValuation) return `<div style="font-size:12px;color:var(--amber);font-weight:500">⚠ No entry in Valuation Report. Check item cost and opening stock in Zoho Inventory.</div>`

  let html = ""
  if (item.isAccountingNegative) {
    html += `<div class="critical-alert">
      <div class="critical-alert-title">🚫 Critical — Accounting Stock is Negative</div>
      <div class="critical-alert-text">Official Accounting Stock: <strong>${fmt(item.accounting)}</strong> units. Do not create an adjustment before identifying the originating transaction. Open Full Investigation for the complete analysis path.</div>
    </div>`
  }
  if (item.hasInactiveWhIssue) {
    html += `<div class="wh-remark">⚠ <strong>Inactive Warehouse Issue (${item.whCase ? 'Case '+item.whCase : ''})</strong> — Stock or accounting value detected in FCS Consignment Delta. See Full Investigation Step 03 for the exact correction path.</div>`
  }
  if (item.draftBills.length > 0) {
    html += item.draftBills.map(b =>
      `<div class="draft-remark">⚠ <strong>Draft Bill: ${b.number||"—"}</strong> (${fmtDate(b.date)}, ${fmt(b.qty)} units) — If confirmed: Accounting Stock would change from <strong>${fmt(item.accounting)}</strong> to <strong>${fmt(item.projectedAccounting)}</strong></div>`
    ).join("")
  }
  if (item.diff !== 0 && !item.isAccountingNegative) {
    const steps = runInvestigation(item).filter(s => s.status==="err"||s.status==="warn")
    const filtered = steps.filter(s => s.title !== "Draft Bills Detected" && s.title.indexOf("Warehouse") === -1)
    if (filtered.length > 0) html += `<div class="steps-grid" style="margin-top:${html?'12px':'0'}">${filtered.map(s => buildStepCard(s)).join("")}</div>`
  }
  if (!html) {
    if (item.diff === 0) return `<div style="font-size:12px;color:var(--green);font-weight:500">✓ Physical and Official Accounting Stock match. No action needed.</div>`
    return `<div style="font-size:12px;color:var(--muted)">No specific document mismatches found. Check Adjustments and Opening Balance in Full Investigation.</div>`
  }
  return html
}

function buildStepCard(s) {
  const cls = {ok:"s-ok",warn:"s-warn",err:"s-err",critical:"s-critical",skip:"s-skip",info:"s-info"}[s.status]||"s-skip"
  const scls = {ok:"ss-ok",warn:"ss-warn",err:"ss-err",critical:"ss-critical",skip:"ss-skip",info:"ss-info"}[s.status]||"ss-skip"
  const slbl = {ok:"OK",warn:"Warning",err:"Issue Found",critical:"Critical",skip:"Skip",info:"Info"}[s.status]||"Skip"
  return `<div class="sc ${cls}">
    <div class="sc-head"><span class="sc-num">Step ${s.num}</span><span class="sc-title">${s.title}</span><span class="ss ${scls}">${slbl}</span></div>
    <div class="sc-body">
      <div class="sc-finding">${s.finding}</div>
      ${s.action?`<div class="sc-action"><div class="sc-action-lbl">Action</div>${s.action.steps}</div>`:""}
    </div>
  </div>`
}

function openInv(sku) {
  const item = allData.find(r => r.sku===sku)
  if (!item) return
  const steps = runInvestigation(item)
  const dSign = item.diff!==null&&item.diff>0?"+":""
  const dCls = item.diff===null?"":item.isAccountingNegative?"c-critical":item.diff>0?"c-green":item.diff<0?"c-red":""

  const dateAlertHtml = item.dateMismatch
    ? `<div class="date-alert-box">⚠ <strong>Date mismatch.</strong> Stock: <strong>${item.stockDate}</strong> · Valuation: <strong>${item.valDate}</strong>. Run both syncs on the same day before acting.</div>`
    : ""

  const projHtml = (item.draftBills.length > 0 || item.draftInvoices.length > 0) && item.hasValuation ? `
    <div class="projected-box">
      <div class="projected-title">Projected Impact if Drafts are Confirmed</div>
      <div class="projected-grid">
        <div class="projected-item">
          <div class="projected-label">Current Official Accounting</div>
          <div class="projected-value ${item.isAccountingNegative?'c-critical':''}">${fmt(item.accounting)}</div>
        </div>
        <div class="projected-item">
          <div class="projected-label">Projected Accounting (+ Draft Bills − Draft Invoices)</div>
          <div class="projected-value">${fmt(item.projectedAccounting)}</div>
        </div>
        <div class="projected-item">
          <div class="projected-label">Projected Difference</div>
          <div class="projected-value ${item.projectedDiff===0?'c-green':item.projectedDiff>0?'c-green':'c-red'}">${item.projectedDiff>0?"+":""}${fmt(item.projectedDiff)}</div>
        </div>
      </div>
    </div>` : ""

  const whBreakdown = item.whStock.length > 0 ? `
    <div class="wh-breakdown">
      <div class="wh-breakdown-title">Physical Stock by Warehouse</div>
      ${item.whStock.map(w => {
        const inactive = isInactiveWh(w.warehouse_name)
        const hasIssue = inactive && w.qty !== 0
        const cls = hasIssue ? "wh-inactive-issue" : w.qty === 0 ? "wh-zero" : "wh-active"
        return `<div class="wh-row ${cls}">
          <span class="wh-name">${w.warehouse_name||"Unknown"}${inactive?`<span class="badge badge-inactive">Inactive</span>`:""}</span>
          <span class="wh-qty">${fmt(w.qty)} units</span>
        </div>`
      }).join("")}
    </div>` : ""

  const whValBreakdown = item.whValuation.filter(w => w.qty !== 0 || w.value !== 0).length > 0 ? `
    <div class="wh-breakdown" style="margin-top:10px">
      <div class="wh-breakdown-title">Accounting Stock by Warehouse (Valuation Report)</div>
      ${item.whValuation.filter(w => w.qty !== 0 || w.value !== 0).map(w => {
        const inactive = isInactiveWh(w.warehouse_name)
        const hasIssue = inactive && (w.qty !== 0 || w.value !== 0)
        const cls = hasIssue ? "wh-inactive-issue" : w.qty < 0 ? "wh-inactive-issue" : "wh-active"
        return `<div class="wh-row ${cls}">
          <span class="wh-name">${w.warehouse_name||"Unknown"}${inactive?`<span class="badge badge-inactive">Inactive</span>`:""}</span>
          <span class="wh-qty">${fmt(w.qty)} units · $${fmt(w.value)}</span>
        </div>`
      }).join("")}
    </div>` : ""

  const sourceBanner = `<div class="source-banner">
    <div class="source-box source-physical">
      <div class="source-box-lbl">Physical Stock · Stock on Hand</div>
      <div class="source-box-val">${fmt(item.physical)}</div>
      <div class="source-box-sub">Zoho Stock Summary → Sheet: Stock · ${item.stockDate||"—"}</div>
      ${whBreakdown}
    </div>
    <div class="source-box source-official ${item.isAccountingNegative?'critical':''}">
      <div class="source-box-lbl">Official Accounting Stock · Valuation Report${item.isAccountingNegative?' ⚠ NEGATIVE':''}</div>
      <div class="source-box-val ${item.isAccountingNegative?'c-critical':''}">${item.hasValuation?fmt(item.accounting):"Not found"}</div>
      <div class="source-box-sub">Zoho Inventory Valuation Report → Sheet: Valuation · ${item.valDate||"—"}<br>Inventory Value: $${fmt(item.inventoryValue)} · Unit Cost: $${fmt(item.unitCost)}</div>
      ${whValBreakdown}
    </div>
    <div class="source-box source-diff ${item.diff===0?'ok':''}">
      <div class="source-box-lbl">Difference = Physical − Official Accounting</div>
      <div class="source-box-val ${dCls}">${item.diff===null?"—":dSign+fmt(item.diff)}</div>
      <div class="source-box-sub">Est. Accounting Movement (Active Bills−Invoices): ${fmt(item.estAccounting)} units${item.draftBills.length>0?`<br><span style="color:var(--amber);font-weight:600">${item.draftBills.length} Draft Bill(s) · ${item.draftInvoices.length} Draft Invoice(s) pending</span>`:""}</div>
    </div>
  </div>`

  const stepsHtml = steps.map((s, idx) => {
    const cls = {ok:"s-ok",warn:"s-warn",err:"s-err",critical:"s-critical",skip:"s-skip",info:"s-info"}[s.status]||"s-skip"
    const scls = {ok:"ss-ok",warn:"ss-warn",err:"ss-err",critical:"ss-critical",skip:"ss-skip",info:"ss-info"}[s.status]||"ss-skip"
    const slbl = {ok:"✓ OK",warn:"⚠ Warning",err:"⚠ Issue Found",critical:"🚫 Critical",skip:"— Skipped",info:"ℹ Info"}[s.status]||"Skip"
    const isOpen = s.status==="err"||s.status==="warn"||s.status==="critical"

    const atMap = {
      safe:        { cls:"at-safe",        label:"✓ Safe to investigate" },
      operational: { cls:"at-operational", label:"🔧 Safe to correct operationally" },
      manager:     { cls:"at-manager",     label:"👔 Requires manager approval" },
      accounting:  { cls:"at-accounting",  label:"📊 Requires accounting review" },
      critical:    { cls:"at-critical",    label:"🚫 Do not adjust yet — Critical" },
    }
    const at = atMap[s.actionType] || atMap.safe
    const atHtml = `<div class="at ${at.cls}">${at.label}</div>`

    const finHtml = s.finImpact ? `<div class="fin-impact" style="margin-bottom:12px">
      <div class="fin-impact-title">⚠ Financial Impact Warning — Review before execution</div>
      Possible affected reports:
      <div class="fin-impact-list">${s.finImpact.map(r=>`<span class="fin-impact-tag">${r}</span>`).join("")}</div>
    </div>` : ""

    let docsHtml = ""
    if (s.docs && s.docs.length > 0) {
      const isDraft = s.docType==="bill-draft"
      docsHtml = `<div class="doc-list">${s.docs.slice(0,8).map(d => {
        const isProblem = !isDraft && ((s.docType==="bill"&&!d.receive_id)||(s.docType==="invoice"&&!d.so_number))
        const dcls = isDraft?"fdi-draft":isProblem?"fdi-prob":"fdi-neutral"
        const linked = s.docType==="bill"
          ? (d.receive_id?`Receive: ${d.receive_number||d.receive_id}`:`<span style="color:var(--red);font-weight:600">No Receive linked</span>`)
          : s.docType==="invoice"
          ? (d.so_number?`SO: ${d.so_number}`:`<span style="color:var(--red);font-weight:600">No SO number</span>`)
          : s.docType==="shipment"
          ? (d.so_number?`SO: ${d.so_number}`:`<span style="color:var(--amber);font-weight:600">No SO — cannot match</span>`)
          : ""
        const draftNote = isDraft?`<span style="color:var(--amber);font-weight:700"> · DRAFT</span>`:""
        return `<div class="fdi ${dcls}">
          <div class="fdi-left">
            <div class="fdi-num">${d.number||"No number"}</div>
            <div class="fdi-meta">${fmtDate(d.date)}${d.status?" · "+d.status:""}${draftNote}${linked?" · "+linked:""}</div>
          </div>
          <div class="fdi-qty">${d.qty>0?fmt(d.qty)+" un":d.qty===0?"0 un":""}</div>
        </div>`
      }).join("")}${s.docs.length>8?`<div style="font-size:11px;color:var(--muted);padding:4px 0">+ ${s.docs.length-8} more</div>`:""}</div>`
    }

    return `<div class="fsc ${cls}">
      <div class="fsc-head" onclick="toggleStep(${idx})">
        <span class="fsc-num">Step ${s.num}</span>
        <span class="fsc-title">${s.title}</span>
        <span class="ss ${scls}" style="margin-left:auto">${slbl}</span>
        <span class="arr ${isOpen?'open':''}" style="margin-left:10px" id="farr-${idx}">▶</span>
      </div>
      <div class="fsc-body ${isOpen?'open':''}" id="fbdy-${idx}">
        ${atHtml}
        ${finHtml}
        <div class="finding-box"><div class="finding-lbl">Finding</div>${s.finding}</div>
        ${docsHtml}
        ${s.action?`<div class="action-blk"><div class="action-blk-lbl">${s.action.label||"Recommended Action"}</div><div class="action-blk-body">${s.action.steps}</div></div>`:""}
      </div>
    </div>`
  }).join("")

  const invPage = document.getElementById("inv-page")
  const tblView = document.getElementById("tbl-view")
  if (invPage && tblView) {
    tblView.classList.add("hidden")
    invPage.innerHTML = `
      <button class="back-btn" onclick="closeInv()">← Back to All SKUs</button>
      ${dateAlertHtml}
      <div class="inv-hdr ${item.isAccountingNegative?'critical':''}">
        <div class="inv-sku">${item.sku}${item.isAccountingNegative?` <span class="badge badge-critical">CRITICAL</span>`:""}</div>
        <div class="inv-name">${item.name||"—"}</div>
        ${sourceBanner}
        ${projHtml}
      </div>
      <div class="full-steps">${stepsHtml}</div>`
    invPage.classList.add("active")
    window.scrollTo(0,0)
  }
}

function closeInv() {
  document.getElementById("inv-page").classList.remove("active")
  document.getElementById("inv-page").innerHTML=""
  document.getElementById("tbl-view").classList.remove("hidden")
}
function toggleStep(idx) {
  document.getElementById(`fbdy-${idx}`)?.classList.toggle("open")
  document.getElementById(`farr-${idx}`)?.classList.toggle("open")
}

function norm(v){return String(v||"").trim().toUpperCase()}
function flt(v){return parseFloat(v)||0}
function fmt(n){return parseFloat(n||0).toLocaleString("en-CA",{maximumFractionDigits:2})}
function fmtVal(n){if(!n)return"$0";return`${n>0?"+":"-"}$${Math.abs(n).toLocaleString("en-CA",{minimumFractionDigits:2,maximumFractionDigits:2})}`}
function causeInfo(c){
  return({
    "receive-no-bill":{cls:"cp-rnb",label:"Receive → No Bill"},
    "bill-no-receive":{cls:"cp-bnr",label:"Bill → No Receive"},
    "shipment-no-invoice":{cls:"cp-sni",label:"Shipment → No Invoice"},
    "invoice-no-shipment":{cls:"cp-ins",label:"Invoice → No Shipment"},
    "draft-bill":{cls:"cp-draft",label:"Draft Bill Pending"},
    "inactive-warehouse":{cls:"cp-wh",label:"Inactive Warehouse"},
    "critical":{cls:"cp-critical",label:"⚠ Critical"},
    "multiple":{cls:"cp-multi",label:"Multiple Causes"},
    "no-valuation":{cls:"cp-noval",label:"No Valuation Data"},
    "ok":{cls:"cp-ok",label:"Reconciled"},
  })[c]||{cls:"cp-multi",label:"Review Needed"}
}
function getFiltered(){
  let d=[...allData]
  if(searchTerm){const q=searchTerm.toLowerCase();d=d.filter(r=>r.sku.toLowerCase().includes(q)||r.name.toLowerCase().includes(q))}
  if(activeFilter==="discrepancy")d=d.filter(r=>r.diff!==0&&r.diff!==null&&!(r.physical===0&&!r.hasValuation))
  if(activeFilter==="critical")d=d.filter(r=>r.isAccountingNegative)
  if(activeFilter==="physical_gt")d=d.filter(r=>r.diff!==null&&r.diff>0)
  if(activeFilter==="accounting_gt")d=d.filter(r=>r.diff!==null&&r.diff<0)
  if(activeFilter==="inactive_wh")d=d.filter(r=>r.hasInactiveWhIssue)
  if(activeFilter==="ok")d=d.filter(r=>r.diff===0)
  if(sortBy==="value_diff")d.sort((a,b)=>Math.abs(b.valueDiff||0)-Math.abs(a.valueDiff||0))
  if(sortBy==="qty_diff")d.sort((a,b)=>Math.abs(b.diff||0)-Math.abs(a.diff||0))
  if(sortBy==="sku")d.sort((a,b)=>a.sku.localeCompare(b.sku))
  if(sortBy==="physical")d.sort((a,b)=>b.physical-a.physical)
  return d
}
function toggleRow(idx){if(openRows.has(idx))openRows.delete(idx);else openRows.add(idx);renderTable()}
function setFilter(f){activeFilter=f;openRows.clear();renderTable()}
function setSort(s){sortBy=s;openRows.clear();renderTable()}
function onSearch(v){searchTerm=v;openRows.clear();renderTable()}

init()
</script>
</body>
</html>
