<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FCS Can — Accounting Reconciliation</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F5F5F5; --surface: #FFFFFF; --border: #D6D6D6;
    --text: #000000; --muted: #4B4B4D;
    --red: #E30613; --red-bg: #FDECEA;
    --green: #2D6A4F; --green-bg: #D8F3DC;
    --blue: #2F4F6F; --blue-bg: #D6E8F5;
    --amber: #7D4E00; --amber-bg: #FEF3CD;
    --purple: #4A235A; --purple-bg: #E8DAEF;
    --gray: #4B4B4D; --gray-bg: #EBEBEB;
  }
  body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header { background: #000; padding: 0 40px; display: flex; align-items: center; height: 64px; border-bottom: 3px solid var(--red); }
  header .logo-wrap { display: flex; align-items: center; gap: 20px; }
  header .company-name { color: white; font-size: 28px; font-weight: 700; letter-spacing: -0.02em; }
  header .divider { width: 1px; height: 28px; background: rgba(255,255,255,0.2); }
  header .app-name { color: white; font-size: 13px; font-weight: 500; letter-spacing: 0.04em; opacity: 0.7; }
  header .tagline { color: rgba(255,255,255,0.4); font-size: 11px; font-family: 'IBM Plex Mono', monospace; letter-spacing: 0.06em; text-transform: uppercase; }
  header .reload-btn { margin-left: auto; background: transparent; border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.7); padding: 7px 16px; font-family: 'IBM Plex Sans', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; border-radius: 2px; letter-spacing: 0.04em; transition: all 0.15s; }
  header .reload-btn:hover { border-color: var(--red); color: white; }

  .container { max-width: 1200px; margin: 0 auto; padding: 36px 24px; }

  .summary-grid { display: grid; grid-template-columns: repeat(5, minmax(0,1fr)); gap: 10px; margin-bottom: 28px; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 3px; padding: 14px 16px; border-top: 3px solid var(--border); }
  .stat.alert { border-top-color: var(--red); }
  .stat.ok { border-top-color: var(--green); }
  .stat.warn { border-top-color: var(--amber); }
  .stat-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 6px; }
  .stat-value { font-family: 'IBM Plex Mono', monospace; font-size: 24px; font-weight: 400; line-height: 1; }
  .stat-value.red { color: var(--red); }
  .stat-value.green { color: var(--green); }
  .stat-value.amber { color: var(--amber); }

  .filter-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  .filter-bar input[type=text] { border: 2px solid var(--text); border-radius: 3px; padding: 9px 14px; font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--text); background: var(--surface); outline: none; width: 220px; }
  .filter-bar input[type=text]:focus { border-color: var(--red); }
  .filter-group { display: flex; align-items: center; gap: 6px; }
  .filter-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
  .filter-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 2px; padding: 7px 14px; font-family: 'IBM Plex Sans', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; color: var(--muted); transition: all 0.1s; }
  .filter-btn.active { background: #000; color: white; border-color: #000; }
  .filter-btn:hover:not(.active) { border-color: var(--text); color: var(--text); }
  .sort-select { border: 1px solid var(--border); border-radius: 2px; padding: 7px 12px; font-family: 'IBM Plex Sans', sans-serif; font-size: 12px; color: var(--text); background: var(--surface); outline: none; cursor: pointer; }

  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 3px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { background: #000; color: white; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; text-align: left; padding: 10px 14px; white-space: nowrap; }
  thead th.right { text-align: right; }
  tbody tr { border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #FAFAFA; }
  td { padding: 11px 14px; vertical-align: middle; }
  .mono { font-family: 'IBM Plex Mono', monospace; font-size: 12px; }
  .right { text-align: right; }
  .sku-cell { font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 500; }
  .name-cell { font-size: 12px; color: var(--muted); max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .diff-positive { color: var(--green); font-family: 'IBM Plex Mono', monospace; font-weight: 500; }
  .diff-negative { color: var(--red); font-family: 'IBM Plex Mono', monospace; font-weight: 500; }
  .diff-zero { color: var(--muted); font-family: 'IBM Plex Mono', monospace; }
  .value-diff { font-family: 'IBM Plex Mono', monospace; font-size: 12px; }
  .value-positive { color: var(--green); }
  .value-negative { color: var(--red); }

  .cause-pill { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 2px; white-space: nowrap; text-transform: uppercase; letter-spacing: 0.04em; }
  .cause-receive-no-bill { background: var(--amber-bg); color: var(--amber); }
  .cause-bill-no-receive { background: var(--red-bg); color: var(--red); }
  .cause-shipment-no-invoice { background: var(--purple-bg); color: var(--purple); }
  .cause-invoice-no-shipment { background: var(--blue-bg); color: var(--blue); }
  .cause-multiple { background: var(--gray-bg); color: var(--gray); }
  .cause-ok { background: var(--green-bg); color: var(--green); }

  /* Detail panel */
  .detail-panel { display: none; background: #FAFAFA; border-top: 1px solid var(--border); }
  .detail-panel.open { display: table-row; }
  .detail-inner { padding: 20px 24px; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .detail-section { }
  .detail-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  .detail-doc { background: var(--surface); border: 1px solid var(--border); border-radius: 2px; padding: 10px 14px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
  .detail-doc.problem { border-left: 3px solid var(--red); }
  .detail-doc.ok { border-left: 3px solid var(--green); }
  .detail-doc-left { display: flex; flex-direction: column; gap: 2px; }
  .detail-doc-num { font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 500; }
  .detail-doc-meta { font-size: 11px; color: var(--muted); }
  .detail-doc-qty { font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 500; }
  .action-box { background: #000; color: white; border-radius: 3px; padding: 14px 18px; margin-top: 16px; }
  .action-box-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(255,255,255,0.5); margin-bottom: 8px; }
  .action-step { font-size: 13px; color: white; padding: 4px 0; display: flex; gap: 10px; }
  .action-step-num { color: var(--red); font-family: 'IBM Plex Mono', monospace; font-weight: 500; flex-shrink: 0; }
  .no-docs { font-size: 12px; color: var(--muted); font-style: italic; padding: 8px 0; }

  .loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 400px; gap: 16px; }
  .loading-bar { width: 240px; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .loading-fill { height: 100%; background: var(--red); border-radius: 2px; animation: loadpulse 1.4s ease-in-out infinite; }
  @keyframes loadpulse { 0%,100%{width:20%} 50%{width:80%} }
  .loading-text { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--muted); letter-spacing: 0.06em; }

  .empty-state { text-align: center; padding: 80px 20px; color: var(--muted); }
  .empty-state .big { font-size: 48px; font-family: 'IBM Plex Mono', monospace; margin-bottom: 12px; opacity: 0.15; color: var(--green); }
  .error-box { background: var(--red-bg); color: var(--red); border: 1px solid #F1948A; border-radius: 3px; padding: 14px 18px; font-size: 13px; margin-bottom: 16px; }
  .result-meta { font-size: 11px; color: var(--muted); margin-top: 8px; font-family: 'IBM Plex Mono', monospace; }
  .last-updated { font-size: 11px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; margin-left: auto; }
</style>
</head>
<body>

<header>
  <div class="logo-wrap">
    <div class="company-name">FCS Can Ltd.</div>
    <div class="divider"></div>
    <div>
      <div class="app-name">Accounting Reconciliation</div>
      <div class="tagline">Physical vs Accounting Stock</div>
    </div>
  </div>
  <button class="reload-btn" onclick="init()">↺ Refresh Data</button>
</header>

<div class="container">
  <div id="main-content">
    <div class="loading-screen">
      <div class="loading-bar"><div class="loading-fill"></div></div>
      <div class="loading-text">Loading sheets...</div>
    </div>
  </div>
</div>

<script>
const SHEET_ID = "1j6D_5NN07ovQa62wVvWs_7n6uXjystpVNHoJFsNe32Y"

let allData = []
let activeFilter = "all"
let searchTerm = ""
let sortBy = "value_diff"
let openRow = null

async function readSheet(sheetName) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}&headers=1`
  const res = await fetch(url)
  const text = await res.text()
  const match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)
  if (!match) throw new Error(`Could not read sheet: ${sheetName}`)
  const json = JSON.parse(match[1])
  if (!json.table || !json.table.rows) return { cols: [], rows: [] }
  const cols = json.table.cols.map(c => c.label || "")
  const rows = json.table.rows.map(r => {
    const obj = {}
    cols.forEach((col, i) => { obj[col] = r.c[i]?.v ?? "" })
    return obj
  })
  return { cols, rows }
}

function setLoading(msg) {
  document.querySelector(".loading-text") && (document.querySelector(".loading-text").textContent = msg)
}

async function init() {
  document.getElementById("main-content").innerHTML = `
    <div class="loading-screen">
      <div class="loading-bar"><div class="loading-fill"></div></div>
      <div class="loading-text" id="load-msg">Loading Stock sheet...</div>
    </div>`

  try {
    const setMsg = m => { const el = document.getElementById("load-msg"); if(el) el.textContent = m }

    setMsg("Loading physical stock (Sheet4)...")
    const stockData = await readSheet("Stock")

    setMsg("Loading bills (Sheet2)...")
    const billsData = await readSheet("Bills")

    setMsg("Loading invoices (Sheet3)...")
    const invoicesData = await readSheet("Invoices")

    setMsg("Loading movements (Sheet1)...")
    const movData = await readSheet("Sheet1")

    setMsg("Calculating discrepancies...")
    allData = buildReconciliation(stockData.rows, billsData.rows, invoicesData.rows, movData.rows)

    render()

  } catch(e) {
    document.getElementById("main-content").innerHTML = `<div class="error-box"><strong>Error loading data:</strong> ${e.message}</div>`
  }
}

function buildReconciliation(stockRows, billRows, invoiceRows, movRows) {
  // Physical stock by SKU from Stock sheet
  const physicalBySku = {}
  const nameBySku = {}
  const costBySku = {}

  stockRows.forEach(r => {
    const sku = String(r.sku || "").trim().toUpperCase()
    if (!sku) return
    const qty = parseFloat(r.physical_stock) || 0
    physicalBySku[sku] = (physicalBySku[sku] || 0) + qty
    if (r.item_name) nameBySku[sku] = r.item_name
  })

  // Accounting stock from Bills (IN) and Invoices (OUT) by SKU
  // Bills increase accounting stock
  const billQtyBySku = {}
  const billDocsBySku = {}
  billRows.forEach(r => {
    const sku = String(r.sku || "").trim().toUpperCase()
    if (!sku) return
    const qty = parseFloat(r.qty) || 0
    const cost = parseFloat(r.unit_cost) || 0
    billQtyBySku[sku] = (billQtyBySku[sku] || 0) + qty
    if (!costBySku[sku] && cost > 0) costBySku[sku] = cost
    if (!billDocsBySku[sku]) billDocsBySku[sku] = []
    billDocsBySku[sku].push({
      number: r.bill_number || "",
      date: r.date || "",
      qty,
      receive_id: r.receive_id || "",
      receive_number: r.receive_number || "",
      status: r.status || ""
    })
  })

  // Invoices decrease accounting stock
  const invoiceQtyBySku = {}
  const invoiceDocsBySku = {}
  invoiceRows.forEach(r => {
    const sku = String(r.sku || "").trim().toUpperCase()
    if (!sku) return
    const qty = parseFloat(r.qty) || 0
    invoiceQtyBySku[sku] = (invoiceQtyBySku[sku] || 0) + qty
    if (!invoiceDocsBySku[sku]) invoiceDocsBySku[sku] = []
    invoiceDocsBySku[sku].push({
      number: r.invoice_number || "",
      date: r.date || "",
      qty,
      shipment_id: r.shipment_id || "",
      shipment_number: r.shipment_number || "",
      status: r.status || ""
    })
  })

  // Physical movements from Sheet1
  const receivesBySku = {}
  const shipmentsBySku = {}
  movRows.forEach(r => {
    const sku = String(r.sku || "").trim().toUpperCase()
    if (!sku) return
    const mod = r.module || ""
    const qty = parseFloat(r.quantity) || 0
    if (mod === "Purchase Receive") {
      if (!receivesBySku[sku]) receivesBySku[sku] = []
      receivesBySku[sku].push({ number: r.doc_number || "", date: r.timestamp || "", qty, status: r.status || "" })
    }
    if (mod === "Shipment" || mod === "Force Fulfill") {
      if (!shipmentsBySku[sku]) shipmentsBySku[sku] = []
      shipmentsBySku[sku].push({ number: r.doc_number || "", date: r.timestamp || "", qty, status: r.status || "", force: mod === "Force Fulfill" })
    }
  })

  // Build all SKUs set
  const allSkus = new Set([
    ...Object.keys(physicalBySku),
    ...Object.keys(billQtyBySku),
    ...Object.keys(invoiceQtyBySku)
  ])

  const result = []

  allSkus.forEach(sku => {
    const physical = physicalBySku[sku] || 0
    const billQty = billQtyBySku[sku] || 0
    const invoiceQty = invoiceQtyBySku[sku] || 0
    const accounting = billQty - invoiceQty
    const diff = physical - accounting // positive = physical > accounting
    const unitCost = costBySku[sku] || 0
    const valueDiff = diff * unitCost

    // Diagnose causes
    const causes = []
    const actions = []

    // Receives without Bills
    const receives = receivesBySku[sku] || []
    const billDocs = billDocsBySku[sku] || []
    const invoiceDocs = invoiceDocsBySku[sku] || []
    const shipments = shipmentsBySku[sku] || []

    const billsWithNoReceive = billDocs.filter(b => !b.receive_id || b.receive_id === "")
    const invoicesWithNoShipment = invoiceDocs.filter(i => !i.shipment_id || i.shipment_id === "")

    // Physical > Accounting: receives without bills OR invoices without shipments
    if (diff > 0) {
      if (receives.length > 0 && billDocs.length === 0) {
        causes.push("receive-no-bill")
        actions.push("Create Bill from Purchase Receive/PO in Zoho Inventory")
      } else if (receives.length > billDocs.length) {
        causes.push("receive-no-bill")
        actions.push("Some Purchase Receives have no matching Bill — create Bills from PO")
      }
      if (invoicesWithNoShipment.length > 0) {
        causes.push("invoice-no-shipment")
        actions.push(`${invoicesWithNoShipment.length} Invoice(s) have no Shipment — create Shipment or review Invoice`)
      }
    }

    // Accounting > Physical: bills without receives OR shipments without invoices
    if (diff < 0) {
      if (billsWithNoReceive.length > 0) {
        causes.push("bill-no-receive")
        actions.push(`${billsWithNoReceive.length} Bill(s) have no Purchase Receive — create Receive or review Bill`)
      }
      if (shipments.length > 0 && invoiceDocs.length === 0) {
        causes.push("shipment-no-invoice")
        actions.push("Shipments exist with no Invoice — create Invoice from SO/Shipment")
      } else if (shipments.length > invoiceDocs.length) {
        causes.push("shipment-no-invoice")
        actions.push("Some Shipments have no matching Invoice — create Invoice from SO/Shipment")
      }
    }

    if (causes.length === 0 && diff !== 0) {
      causes.push("multiple")
      actions.push("Review Inventory Adjustments, Opening Balance, or Value Adjustments for this SKU")
    }

    result.push({
      sku,
      name: nameBySku[sku] || "",
      physical,
      accounting,
      diff,
      unitCost,
      valueDiff,
      causes,
      actions,
      billDocs,
      invoiceDocs,
      receives,
      shipments,
      billsWithNoReceive,
      invoicesWithNoShipment
    })
  })

  return result.filter(r => r.sku && r.sku !== "SKU" && r.sku !== "sku")
}

function primaryCause(item) {
  if (item.diff === 0) return "ok"
  if (item.causes.length > 1) return "multiple"
  return item.causes[0] || "multiple"
}

function causeLabel(cause) {
  const map = {
    "receive-no-bill": "Receive → No Bill",
    "bill-no-receive": "Bill → No Receive",
    "shipment-no-invoice": "Shipment → No Invoice",
    "invoice-no-shipment": "Invoice → No Shipment",
    "multiple": "Multiple Causes",
    "ok": "Reconciled"
  }
  return map[cause] || cause
}

function causeClass(cause) {
  const map = {
    "receive-no-bill": "cause-receive-no-bill",
    "bill-no-receive": "cause-bill-no-receive",
    "shipment-no-invoice": "cause-shipment-no-invoice",
    "invoice-no-shipment": "cause-invoice-no-shipment",
    "multiple": "cause-multiple",
    "ok": "cause-ok"
  }
  return map[cause] || "cause-multiple"
}

function formatQty(n) {
  return n.toLocaleString("en-CA", { maximumFractionDigits: 2 })
}

function formatValue(n) {
  if (n === 0) return "$0"
  const abs = Math.abs(n)
  const sign = n > 0 ? "+" : "-"
  return `${sign}$${abs.toLocaleString("en-CA", { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`
}

function formatDate(ts) {
  if (!ts) return "—"
  try { return new Date(ts).toLocaleDateString("en-CA") } catch { return String(ts) }
}

function getFiltered() {
  let data = [...allData]

  if (searchTerm) {
    const q = searchTerm.toLowerCase()
    data = data.filter(r => r.sku.toLowerCase().includes(q) || r.name.toLowerCase().includes(q))
  }

  if (activeFilter === "discrepancy") data = data.filter(r => r.diff !== 0)
  if (activeFilter === "physical_gt") data = data.filter(r => r.diff > 0)
  if (activeFilter === "accounting_gt") data = data.filter(r => r.diff < 0)
  if (activeFilter === "ok") data = data.filter(r => r.diff === 0)

  if (sortBy === "value_diff") data.sort((a,b) => Math.abs(b.valueDiff) - Math.abs(a.valueDiff))
  if (sortBy === "qty_diff") data.sort((a,b) => Math.abs(b.diff) - Math.abs(a.diff))
  if (sortBy === "sku") data.sort((a,b) => a.sku.localeCompare(b.sku))
  if (sortBy === "physical") data.sort((a,b) => b.physical - a.physical)

  return data
}

function render() {
  const filtered = getFiltered()
  const total = allData.length
  const withDiff = allData.filter(r => r.diff !== 0).length
  const ok = allData.filter(r => r.diff === 0).length
  const physGt = allData.filter(r => r.diff > 0).length
  const accGt = allData.filter(r => r.diff < 0).length
  const totalValueDiff = allData.reduce((s, r) => s + Math.abs(r.valueDiff), 0)
  const now = new Date().toLocaleString("en-CA", { timeZone: "America/Vancouver" })

  const summaryHtml = `<div class="summary-grid">
    <div class="stat ${withDiff > 0 ? 'alert' : 'ok'}">
      <div class="stat-label">SKUs with Discrepancy</div>
      <div class="stat-value ${withDiff > 0 ? 'red' : 'green'}">${withDiff}</div>
    </div>
    <div class="stat ok">
      <div class="stat-label">Reconciled</div>
      <div class="stat-value green">${ok}</div>
    </div>
    <div class="stat ${physGt > 0 ? 'warn' : ''}">
      <div class="stat-label">Physical &gt; Accounting</div>
      <div class="stat-value ${physGt > 0 ? 'amber' : ''}">${physGt}</div>
    </div>
    <div class="stat ${accGt > 0 ? 'alert' : ''}">
      <div class="stat-label">Accounting &gt; Physical</div>
      <div class="stat-value ${accGt > 0 ? 'red' : ''}">${accGt}</div>
    </div>
    <div class="stat ${totalValueDiff > 0 ? 'alert' : 'ok'}">
      <div class="stat-label">Total Value at Risk</div>
      <div class="stat-value ${totalValueDiff > 0 ? 'red' : 'green'}" style="font-size:18px">$${totalValueDiff.toLocaleString("en-CA",{maximumFractionDigits:0})}</div>
    </div>
  </div>`

  const filterHtml = `<div class="filter-bar">
    <input type="text" id="search-input" placeholder="Search SKU or name..." value="${searchTerm}" oninput="onSearch(this.value)" />
    <div class="filter-group">
      <span class="filter-label">Show:</span>
      <button class="filter-btn ${activeFilter==='all'?'active':''}" onclick="setFilter('all')">All (${total})</button>
      <button class="filter-btn ${activeFilter==='discrepancy'?'active':''}" onclick="setFilter('discrepancy')">Issues (${withDiff})</button>
      <button class="filter-btn ${activeFilter==='physical_gt'?'active':''}" onclick="setFilter('physical_gt')">Physical &gt; Acc (${physGt})</button>
      <button class="filter-btn ${activeFilter==='accounting_gt'?'active':''}" onclick="setFilter('accounting_gt')">Acc &gt; Physical (${accGt})</button>
      <button class="filter-btn ${activeFilter==='ok'?'active':''}" onclick="setFilter('ok')">OK (${ok})</button>
    </div>
    <div class="filter-group" style="margin-left:auto">
      <span class="filter-label">Sort:</span>
      <select class="sort-select" onchange="setSort(this.value)">
        <option value="value_diff" ${sortBy==='value_diff'?'selected':''}>Value Impact</option>
        <option value="qty_diff" ${sortBy==='qty_diff'?'selected':''}>Qty Difference</option>
        <option value="sku" ${sortBy==='sku'?'selected':''}>SKU</option>
        <option value="physical" ${sortBy==='physical'?'selected':''}>Physical Stock</option>
      </select>
    </div>
    <span class="last-updated">Updated: ${now}</span>
  </div>`

  if (!filtered.length) {
    document.getElementById("main-content").innerHTML = summaryHtml + filterHtml + `
      <div class="empty-state"><div class="big">✓</div><p>No items match the current filter.</p></div>`
    return
  }

  const tableRows = filtered.map((item, idx) => {
    const cause = primaryCause(item)
    const diffClass = item.diff > 0 ? "diff-positive" : item.diff < 0 ? "diff-negative" : "diff-zero"
    const diffSign = item.diff > 0 ? "+" : ""
    const valueClass = item.valueDiff > 0 ? "value-positive" : item.valueDiff < 0 ? "value-negative" : ""

    return `<tr onclick="toggleDetail('detail-${idx}')" id="row-${idx}">
      <td class="sku-cell">${item.sku}</td>
      <td class="name-cell" title="${item.name}">${item.name || "—"}</td>
      <td class="mono right">${formatQty(item.physical)}</td>
      <td class="mono right">${formatQty(item.accounting)}</td>
      <td class="right"><span class="${diffClass}">${diffSign}${formatQty(item.diff)}</span></td>
      <td class="right"><span class="value-diff ${valueClass}">${item.unitCost > 0 ? formatValue(item.valueDiff) : "—"}</span></td>
      <td><span class="cause-pill ${causeClass(cause)}">${causeLabel(cause)}</span></td>
    </tr>
    <tr class="detail-panel" id="detail-${idx}">
      <td colspan="7">
        ${buildDetailHtml(item)}
      </td>
    </tr>`
  }).join("")

  document.getElementById("main-content").innerHTML = summaryHtml + filterHtml + `
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th style="width:120px">SKU</th>
          <th style="width:200px">Item Name</th>
          <th class="right" style="width:110px">Physical</th>
          <th class="right" style="width:110px">Accounting</th>
          <th class="right" style="width:100px">Difference</th>
          <th class="right" style="width:130px">Value Impact</th>
          <th style="width:200px">Diagnosis</th>
        </tr></thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div>
    <p class="result-meta">${filtered.length} of ${total} SKU(s) shown</p>`
}

function buildDetailHtml(item) {
  // Bills section
  const billsHtml = item.billDocs.length ? item.billDocs.slice(0,10).map(b => {
    const hasReceive = b.receive_id && b.receive_id !== ""
    return `<div class="detail-doc ${hasReceive ? 'ok' : 'problem'}">
      <div class="detail-doc-left">
        <div class="detail-doc-num">${b.number || "No number"}</div>
        <div class="detail-doc-meta">${formatDate(b.date)} · ${b.status} ${hasReceive ? '· Receive: ' + (b.receive_number || b.receive_id) : '· <strong style="color:var(--red)">No Receive linked</strong>'}</div>
      </div>
      <div class="detail-doc-qty">+${formatQty(b.qty)}</div>
    </div>`
  }).join("") : `<div class="no-docs">No Bills found for this SKU</div>`

  // Invoices section
  const invoicesHtml = item.invoiceDocs.length ? item.invoiceDocs.slice(0,10).map(i => {
    const hasShipment = i.shipment_id && i.shipment_id !== ""
    return `<div class="detail-doc ${hasShipment ? 'ok' : 'problem'}">
      <div class="detail-doc-left">
        <div class="detail-doc-num">${i.number || "No number"}</div>
        <div class="detail-doc-meta">${formatDate(i.date)} · ${i.status} ${hasShipment ? '· Shipment: ' + (i.shipment_number || i.shipment_id) : '· <strong style="color:var(--red)">No Shipment linked</strong>'}</div>
      </div>
      <div class="detail-doc-qty">-${formatQty(i.qty)}</div>
    </div>`
  }).join("") : `<div class="no-docs">No Invoices found for this SKU</div>`

  // Actions
  const actionsHtml = item.diff === 0
    ? `<div class="action-step"><span class="action-step-num">✓</span> Physical and Accounting stock match. No action needed.</div>`
    : item.actions.map((a, i) => `<div class="action-step"><span class="action-step-num">${i+1}.</span> ${a}</div>`).join("")

  return `<div class="detail-inner">
    <div class="detail-grid">
      <div class="detail-section">
        <div class="detail-title">Bills (Accounting IN) — Total: +${formatQty(item.billDocs.reduce((s,b)=>s+b.qty,0))}</div>
        ${billsHtml}
      </div>
      <div class="detail-section">
        <div class="detail-title">Invoices (Accounting OUT) — Total: -${formatQty(item.invoiceDocs.reduce((s,i)=>s+i.qty,0))}</div>
        ${invoicesHtml}
      </div>
    </div>
    <div class="action-box">
      <div class="action-box-title">Recommended Actions</div>
      ${actionsHtml}
    </div>
  </div>`
}

function toggleDetail(id) {
  const panel = document.getElementById(id)
  if (!panel) return
  if (openRow && openRow !== id) {
    const prev = document.getElementById(openRow)
    if (prev) prev.classList.remove("open")
  }
  panel.classList.toggle("open")
  openRow = panel.classList.contains("open") ? id : null
}

function setFilter(f) {
  activeFilter = f
  openRow = null
  render()
}

function setSort(s) {
  sortBy = s
  openRow = null
  render()
}

function onSearch(val) {
  searchTerm = val
  openRow = null
  render()
}

init()
</script>
</body>
</html>
