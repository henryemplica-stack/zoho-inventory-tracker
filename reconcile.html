<body>
<header>
  <div class="logo-wrap">
    <div class="company-name">FCS Can Ltd.</div>
    <div class="hdr-div"></div>
    <div>
      <div class="app-name">Accounting Reconciliation</div>
      <div class="tagline">Physical vs Official Accounting Stock</div>
    </div>
  </div>
  <div class="hdr-actions">
    <button class="btn-hdr" onclick="init()">↺ Refresh Data</button>
  </div>
</header>
<div class="container">
  <div id="main-content">
    <div class="loading-screen">
      <div class="loading-bar"><div class="loading-fill"></div></div>
      <div class="loading-text" id="load-msg">Loading data...</div>
    </div>
  </div>
</div>
<script>
const SHEET_ID = "1j6D_5NN07ovQa62wVvWs_7n6uXjystpVNHoJFsNe32Y"
const INACTIVE_WAREHOUSES = ["fcs consignment delta"]
let allData = [], activeFilter = "discrepancy", searchTerm = "", sortBy = "value_diff", openRows = new Set()

// ── DATE PARSING ─────────────────────────────────────
function parseDate(v) {
  if (!v) return null
  if (typeof v === "string") {
    const m = v.match(/Date\((\d+),(\d+),(\d+)/)
    if (m) return new Date(parseInt(m[1]), parseInt(m[2]), parseInt(m[3]))
    if (v.match(/^\d{4}-\d{2}-\d{2}/)) return new Date(v)
  }
  if (typeof v === "number") return new Date(v)
  if (v instanceof Date) return v
  return null
}
function fmtDate(v) { const d = parseDate(v); if (!d) return "—"; return d.toLocaleDateString("en-CA") }
function dateStr(v) { const d = parseDate(v); if (!d) return ""; return d.toISOString().substring(0,10) }

// ── LOAD ─────────────────────────────────────────────
async function readSheet(name) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(name)}&headers=1`
  const res = await fetch(url)
  const text = await res.text()
  const m = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)
  if (!m) throw new Error(`Cannot read: ${name}`)
  const json = JSON.parse(m[1])
  if (!json.table || !json.table.rows) return []
  const cols = json.table.cols.map(c => c.label || "")
  return json.table.rows.map(r => {
    const o = {}
    cols.forEach((c, i) => { o[c] = r.c[i]?.v ?? "" })
    return o
  })
}

async function init() {
  setMsg("Loading data...")
  try {
    const [stockRows, valRows, billRows, invoiceRows, movRows] = await Promise.all([
      readSheet("Stock"), readSheet("Valuation"),
      readSheet("Bills"), readSheet("Invoices"), readSheet("Sheet1")
    ])
    setMsg("Calculating reconciliation...")
    allData = buildReconciliation(stockRows, valRows, billRows, invoiceRows, movRows)
    renderTable()
  } catch(e) {
    document.getElementById("main-content").innerHTML = `<div class="error-box"><strong>Error:</strong> ${e.message}</div>`
  }
}

function setMsg(msg) {
  const el = document.getElementById("load-msg")
  if (el) { el.textContent = msg; return }
  document.getElementById("main-content").innerHTML = `
    <div class="loading-screen"><div class="loading-bar"><div class="loading-fill"></div></div>
    <div class="loading-text" id="load-msg">${msg}</div></div>`
}

function isInactiveWh(name) {
  return INACTIVE_WAREHOUSES.includes(String(name || "").toLowerCase().trim())
}

// ── RECONCILIATION ────────────────────────────────────
function buildReconciliation(stockRows, valRows, billRows, invoiceRows, movRows) {
  // Physical stock by SKU — total + per warehouse
  const physBySku = {}, nameBySku = {}, stockDateBySku = {}
  const whStockBySku = {} // { sku: [{warehouse_name, warehouse_status, qty}] }

  stockRows.forEach(r => {
    const sku = norm(r.sku); if (!sku) return
    const qty = flt(r.physical_stock)
    const whName = String(r.warehouse_name || "")
    const whStatus = String(r.warehouse_status || "active")
    physBySku[sku] = (physBySku[sku] || 0) + qty
    if (r.item_name) nameBySku[sku] = r.item_name
    const d = dateStr(r.last_updated); if (d) stockDateBySku[sku] = d
    if (!whStockBySku[sku]) whStockBySku[sku] = []
    whStockBySku[sku].push({ warehouse_name: whName, warehouse_status: whStatus, qty })
  })

  // Official accounting stock by SKU
  const accBySku = {}, valValueBySku = {}, unitCostBySku = {}, valDateBySku = {}
  valRows.forEach(r => {
    const sku = norm(r.sku); if (!sku) return
    accBySku[sku] = (accBySku[sku] || 0) + flt(r.valuation_qty)
    valValueBySku[sku] = (valValueBySku[sku] || 0) + flt(r.inventory_value)
    if (flt(r.unit_cost) > 0) unitCostBySku[sku] = flt(r.unit_cost)
    const d = dateStr(r.as_of_date); if (d) valDateBySku[sku] = d
  })

  // Bills
  const billsBySku = {}
  billRows.forEach(r => {
    const sku = norm(r.sku); if (!sku) return
    if (!billsBySku[sku]) billsBySku[sku] = []
    billsBySku[sku].push({
      number: r.bill_number || "", date: r.date || "",
      qty: flt(r.qty), unit_cost: flt(r.unit_cost),
      receive_id: r.receive_id || "", receive_number: r.receive_number || "",
      po_number: r.po_number || "", status: String(r.status || "").toLowerCase(),
      warehouse_id: r.warehouse_id || ""
    })
  })

  // Invoices — indexed by so_number for cross-matching
  const invoicesBySku = {}, invoicesBySo = {}
  invoiceRows.forEach(r => {
    const sku = norm(r.sku); if (!sku) return
    const soNum = String(r.so_number || "").trim()
    if (!invoicesBySku[sku]) invoicesBySku[sku] = []
    const inv = {
      number: r.invoice_number || "", date: r.date || "",
      qty: flt(r.qty), shipment_id: r.shipment_id || "",
      shipment_number: r.shipment_number || "",
      so_number: soNum, status: String(r.status || "").toLowerCase(),
      warehouse_id: r.warehouse_id || "", warehouse_name: r.warehouse_name || ""
    }
    invoicesBySku[sku].push(inv)
    if (soNum) { if (!invoicesBySo[soNum]) invoicesBySo[soNum] = []; invoicesBySo[soNum].push(inv) }
  })

  // Movements from Sheet1
  const receivesBySku = {}, shipmentsBySku = {}, adjBySku = {}
  movRows.forEach(r => {
    const sku = norm(r.sku); if (!sku) return
    const mod = String(r.module || "")
    const qty = flt(r.quantity) || flt(r.qty_received) || flt(r.quantity_packed) || flt(r.quantity_adjusted) || 0
    const soNum = String(r.so_number || "").trim()
    const doc = { number: r.doc_number || "", date: r.timestamp || "", qty, status: String(r.status || ""), so_number: soNum, doc_id: r.doc_id || "" }
    if (mod === "Purchase Receive") { if (!receivesBySku[sku]) receivesBySku[sku] = []; receivesBySku[sku].push(doc) }
    if (mod === "Shipment" || mod === "Force Fulfill") { if (!shipmentsBySku[sku]) shipmentsBySku[sku] = []; shipmentsBySku[sku].push({...doc, force: mod==="Force Fulfill"}) }
    if (mod === "Inventory Adjustment") { if (!adjBySku[sku]) adjBySku[sku] = []; adjBySku[sku].push(doc) }
  })

  const allSkus = new Set([...Object.keys(physBySku), ...Object.keys(accBySku)])

  return [...allSkus].filter(s => s && s !== "SKU" && s !== "sku").map(sku => {
    const physical = physBySku[sku] ?? 0
    const accounting = accBySku[sku] ?? null
    const hasValuation = accounting !== null
    const diff = hasValuation ? physical - accounting : null

    const bills = billsBySku[sku] || []
    const invoices = invoicesBySku[sku] || []
    const receives = receivesBySku[sku] || []
    const shipments = shipmentsBySku[sku] || []
    const adjustments = adjBySku[sku] || []
    const whStock = whStockBySku[sku] || []

    const draftBills = bills.filter(b => b.status === "draft")
    const activeBills = bills.filter(b => b.status !== "draft")

    const billQty = activeBills.reduce((s,b) => s+b.qty, 0)
    const invoiceQty = invoices.reduce((s,i) => s+i.qty, 0)
    const estAccounting = billQty - invoiceQty
    const receivedQty = receives.reduce((s,r) => s+r.qty, 0)
    const shippedQty = shipments.reduce((s,s2) => s+s2.qty, 0)

    const billsNoReceive = activeBills.filter(b => !b.receive_id)

    // Cross-match invoices and shipments by so_number
    const shipmentsWithInvoice = shipments.filter(s => {
      if (!s.so_number) return false
      return invoicesBySo[s.so_number] && invoicesBySo[s.so_number].length > 0
    })
    const shipmentsNoInvoice = shipments.filter(s => {
      if (!s.so_number) return true // no so_number — cannot match
      return !invoicesBySo[s.so_number] || invoicesBySo[s.so_number].length === 0
    })
    const invoicesNoShipment = invoices.filter(i => {
      if (!i.so_number) return true
      const matched = shipments.some(s => s.so_number === i.so_number)
      return !matched
    })

    // Warehouse analysis
    const inactiveWhStock = whStock.filter(w => isInactiveWh(w.warehouse_name) && w.qty > 0)
    const hasInactiveWhIssue = inactiveWhStock.length > 0

    // Bills/invoices pointing to inactive warehouse
    const billsInactiveWh = activeBills.filter(b => b.warehouse_id && isInactiveWh(b.warehouse_id))
    const invoicesInactiveWh = invoices.filter(i => isInactiveWh(i.warehouse_name))

    const unitCost = unitCostBySku[sku] || (hasValuation && accounting > 0 ? (valValueBySku[sku]||0)/accounting : 0)
    const valueDiff = diff !== null ? diff * unitCost : null
    const stockDate = stockDateBySku[sku] || ""
    const valDate = valDateBySku[sku] || ""
    const dateMismatch = stockDate && valDate && stockDate !== valDate

    // Primary cause
    let primaryCause = "ok"
    if (!hasValuation) primaryCause = "no-valuation"
    else if (diff !== null && diff !== 0) {
      if (hasInactiveWhIssue) primaryCause = "inactive-warehouse"
      else if (draftBills.length > 0 && diff < 0) primaryCause = "draft-bill"
      else if (diff > 0 && receivedQty > billQty && receives.length > 0) primaryCause = "receive-no-bill"
      else if (diff < 0 && billsNoReceive.length > 0) primaryCause = "bill-no-receive"
      else if (diff < 0 && shipmentsNoInvoice.length > 0) primaryCause = "shipment-no-invoice"
      else if (diff > 0 && invoicesNoShipment.length > 0) primaryCause = "invoice-no-shipment"
      else primaryCause = "multiple"
    }

    return {
      sku, name: nameBySku[sku] || "",
      physical, accounting, hasValuation, diff, unitCost, valueDiff,
      estAccounting, bills, activeBills, draftBills, invoices,
      receives, shipments, adjustments, whStock,
      billQty, invoiceQty, receivedQty, shippedQty,
      billsNoReceive, invoicesNoShipment, shipmentsNoInvoice,
      inactiveWhStock, hasInactiveWhIssue,
      billsInactiveWh, invoicesInactiveWh,
      primaryCause, stockDate, valDate, dateMismatch,
      inventoryValue: valValueBySku[sku] || 0
    }
  })
}

// ── INVESTIGATION STEPS ───────────────────────────────
function runInvestigation(item) {
  const steps = []
  const diff = item.diff
  const absDiff = Math.abs(diff || 0)

  // STEP 01 — Overview
  steps.push({
    num:"01", title:"Item Overview", status:"info",
    finding:`Physical Stock: <strong>${fmt(item.physical)}</strong> units<br>
      Official Accounting Stock (Valuation Report): <strong>${item.hasValuation ? fmt(item.accounting) : "Not found"}</strong><br>
      Est. Accounting Movement (Active Bills − Invoices): <strong>${fmt(item.estAccounting)}</strong> (diagnostic only)
      ${item.draftBills.length > 0 ? `<br><span style="color:var(--amber)">⚠ ${item.draftBills.length} Draft Bill(s) found — not counted in accounting</span>` : ""}`,
    action: null
  })

  // STEP 02 — Date validation
  steps.push({
    num:"02", title:"Report Date Validation", status: item.dateMismatch ? "warn" : "ok",
    finding: item.dateMismatch
      ? `Stock synced on <strong>${item.stockDate}</strong>, Valuation synced on <strong>${item.valDate}</strong>. Dates differ — reconciliation may show false discrepancies from transactions between these dates. Run both syncs on the same day before acting.`
      : `Both reports share sync date <strong>${item.stockDate||"unknown"}</strong>. Date validation passed.`,
    action: item.dateMismatch ? { label:"How to fix", steps:`In Apps Script: run <strong>syncPhysicalStock</strong> → then immediately run <strong>syncValuation</strong> on the same day.` } : null
  })

  // STEP 03 — Warehouse analysis
  const whIssues = item.whStock.filter(w => isInactiveWh(w.warehouse_name) && w.qty > 0)
  const whMultiple = item.whStock.filter(w => !isInactiveWh(w.warehouse_name) && w.qty > 0)
  const s3status = whIssues.length > 0 ? "err" : whMultiple.length > 1 ? "warn" : "ok"
  let s3finding = ""
  if (whIssues.length > 0) {
    s3finding = `<strong>Stock found in inactive warehouse(s):</strong><br>${whIssues.map(w => `${w.warehouse_name}: <strong>${fmt(w.qty)}</strong> units`).join("<br>")}<br>This stock is physically present but in a warehouse that is no longer active.`
  } else if (whMultiple.length > 1) {
    s3finding = `Stock spread across <strong>${whMultiple.length} active warehouses</strong>:<br>${whMultiple.map(w => `${w.warehouse_name}: <strong>${fmt(w.qty)}</strong>`).join("<br>")}<br>Verify all are correct and no transfer is pending.`
  } else {
    s3finding = `Stock is in <strong>${whMultiple.length === 1 ? whMultiple[0].warehouse_name : "one warehouse"}</strong>. No warehouse issues detected.`
  }
  steps.push({
    num:"03", title:"Warehouse Analysis", status: s3status,
    finding: s3finding,
    action: whIssues.length > 0 ? { label:"Action — Inactive Warehouse Stock", steps:`Zoho Inventory → Items → SKU <strong>${item.sku}</strong> → Check stock in FCS Consignment Delta → Create a Transfer Order to move stock to active warehouse → Or create an Inventory Adjustment to zero out the inactive warehouse if stock was consumed` } : null
  })

  // STEP 04 — Draft Bills
  if (item.draftBills.length > 0) {
    steps.push({
      num:"04", title:"Draft Bills Detected", status:"warn",
      finding:`<strong>${item.draftBills.length} Bill(s) in Draft status</strong>. Draft Bills exist in Zoho but do not impact Official Accounting Stock until confirmed as Open.`,
      action:{ label:"Action", steps: item.draftBills.slice(0,5).map((b,i) =>
        `${i+1}. Open Bill <strong>${b.number||"—"}</strong> → Verify quantities match Purchase Receive → If correct: confirm to Open → If wrong: void or delete`
      ).join("<br>") },
      docs: item.draftBills, docType:"bill-draft"
    })
  }

  if (!item.hasValuation) {
    steps.push({ num:"05", title:"Accounting vs Physical", status:"warn",
      finding:`No entry in Valuation Report for this SKU. Physical Stock: <strong>${fmt(item.physical)}</strong>. Cannot calculate official difference.`,
      action:{ label:"Action", steps:`Zoho Inventory → Reports → Inventory Valuation Summary → Search <strong>${item.sku}</strong> → If not found: check item cost method, opening stock, and whether item has been assigned a cost.` }
    })
    steps.push({ num:"—", title:"Remaining steps", status:"skip", finding:"Cannot run full investigation without Official Accounting Stock.", action:null })
    return steps
  }

  if (diff === 0) {
    steps.push({ num:"05", title:"Accounting vs Physical", status:"ok",
      finding:`✓ Physical Stock (<strong>${fmt(item.physical)}</strong>) equals Official Accounting Stock (<strong>${fmt(item.accounting)}</strong>). SKU is reconciled.`,
      action:null })
    steps.push({ num:"—", title:"Remaining steps", status:"skip", finding:"No discrepancy — no further investigation needed.", action:null })
    return steps
  }

  steps.push({
    num:"05", title:"Accounting vs Physical Comparison", status: diff > 0 ? "warn" : "err",
    finding: diff > 0
      ? `Physical Stock is <strong>+${fmt(absDiff)}</strong> units higher than Accounting Stock. Physical inventory exists without equivalent accounting recognition.`
      : `Accounting Stock is <strong>+${fmt(absDiff)}</strong> units higher than Physical Stock. Accounting records exist without equivalent physical stock.`,
    action:{ label:"Direction of Investigation", steps: diff > 0
      ? `Physical > Accounting. Check: Purchase Receives without Bills → Opening Balance → Positive Adjustments → Stock import without valuation.`
      : `Accounting > Physical. Check: Bills without Receives → Draft Bills not confirmed → Invoices without Shipments → Negative Adjustments → Incorrect Opening Balance.`
    }
  })

  // STEP 06 — Bills without Receives
  steps.push({
    num:"06", title:"Bills without Purchase Receives", status: item.billsNoReceive.length > 0 ? "err" : "ok",
    finding: item.billsNoReceive.length > 0
      ? `<strong>${item.billsNoReceive.length} Bill(s)</strong> with no linked Purchase Receive. These increased Accounting Stock without physical arrival.`
      : "All active Bills have a linked Purchase Receive.",
    action: item.billsNoReceive.length > 0 ? { label:"Action", steps: item.billsNoReceive.slice(0,5).map((b,i) =>
      `${i+1}. Open Bill <strong>${b.number||"—"}</strong> → Verify if goods arrived → If yes: create Receive from PO <strong>${b.po_number||"—"}</strong> → If no: void Bill`
    ).join("<br>") } : null,
    docs: item.billsNoReceive, docType:"bill"
  })

  // STEP 07 — Invoices without Shipments (using so_number cross-match)
  steps.push({
    num:"07", title:"Invoices without Shipments", status: item.invoicesNoShipment.length > 0 ? "err" : "ok",
    finding: item.invoicesNoShipment.length > 0
      ? `<strong>${item.invoicesNoShipment.length} Invoice(s)</strong> with no matching Shipment (matched by Sales Order number). These reduced Accounting Stock without physical outbound.`
      : `All Invoices have a matching Shipment via Sales Order. No issue found.`,
    action: item.invoicesNoShipment.length > 0 ? { label:"Action", steps: item.invoicesNoShipment.slice(0,5).map((inv,i) =>
      `${i+1}. Open Invoice <strong>${inv.number||"—"}</strong> → Check SO <strong>${inv.so_number||"—"}</strong> → If goods shipped: create Package/Shipment from SO → If not shipped: void the Invoice`
    ).join("<br>") } : null,
    docs: item.invoicesNoShipment, docType:"invoice"
  })

  // STEP 08 — Receives without Bills
  const rNoBill = item.receives.length > 0 && item.activeBills.length === 0
  const rLtB = item.receives.length > item.activeBills.length
  steps.push({
    num:"08", title:"Purchase Receives without Bills", status: rNoBill||(diff>0&&rLtB) ? "err" : "ok",
    finding: rNoBill
      ? `<strong>${item.receives.length} Purchase Receive(s)</strong> found but no active Bills. Goods arrived physically but not posted to accounting.${item.draftBills.length>0?" Note: "+item.draftBills.length+" Draft Bill(s) exist but need confirmation.":""}`
      : rLtB ? `<strong>${item.receives.length} Receive(s)</strong> vs <strong>${item.activeBills.length} active Bill(s)</strong>. Some Receives may lack a Bill.`
      : `${item.receives.length} Receive(s) and ${item.activeBills.length} active Bill(s). Volume appears balanced.`,
    action: (rNoBill||rLtB) ? { label:"Action", steps: item.receives.slice(0,5).map((r,i) =>
      `${i+1}. Locate PO for Receive <strong>${r.number||"—"}</strong> → Click "Create Bill" → Confirm quantities → Save as Open`
    ).join("<br>") } : null,
    docs: item.receives, docType:"receive"
  })

  // STEP 09 — Shipments without Invoices (so_number cross-match)
  steps.push({
    num:"09", title:"Shipments without Invoices", status: item.shipmentsNoInvoice.length>0 ? "err" : "ok",
    finding: item.shipmentsNoInvoice.length > 0
      ? `<strong>${item.shipmentsNoInvoice.length} Shipment(s)</strong> with no matching Invoice (matched by Sales Order number). Goods left physically but not posted to accounting.`
      : `All Shipments have a matching Invoice via Sales Order. No issue found.`,
    action: item.shipmentsNoInvoice.length > 0 ? { label:"Action", steps: item.shipmentsNoInvoice.slice(0,5).map((s,i) =>
      `${i+1}. Open SO for Shipment <strong>${s.number||"—"}</strong> ${s.so_number?"("+s.so_number+")":""} → Click "Create Invoice" → Confirm quantities → Save as Sent`
    ).join("<br>") } : null,
    docs: item.shipmentsNoInvoice, docType:"shipment"
  })

  // STEP 10 — Purchase qty cross-check
  const pDiff = item.receivedQty - item.billQty
  steps.push({
    num:"10", title:"Purchase Qty Cross-Check (Received vs Billed)", status: Math.abs(pDiff)>0.01?(pDiff>0?"warn":"err"):"ok",
    finding: Math.abs(pDiff)<0.01
      ? `Received <strong>${fmt(item.receivedQty)}</strong> matches Billed <strong>${fmt(item.billQty)}</strong>. Purchase quantities balanced.`
      : pDiff>0 ? `Received <strong>${fmt(item.receivedQty)}</strong> but Billed only <strong>${fmt(item.billQty)}</strong>. <strong>Missing Bill for ${fmt(pDiff)} units.</strong>${item.draftBills.length>0?" Note: "+item.draftBills.length+" Draft Bill(s) pending.":""}`
      : `Billed <strong>${fmt(item.billQty)}</strong> but received only <strong>${fmt(item.receivedQty)}</strong>. Bill may have been created before goods arrived.`,
    action: Math.abs(pDiff)>0.01 ? { label:"Action", steps: pDiff>0
      ? `Create Bill for remaining <strong>${fmt(pDiff)}</strong> units from the relevant PO`
      : `Review Bills with qty exceeding received — create missing Receive or adjust Bill qty`
    } : null
  })

  // STEP 11 — Sales qty cross-check
  const sDiff = item.shippedQty - item.invoiceQty
  steps.push({
    num:"11", title:"Sales Qty Cross-Check (Shipped vs Invoiced)", status: Math.abs(sDiff)>0.01?(sDiff>0?"warn":"err"):"ok",
    finding: Math.abs(sDiff)<0.01
      ? `Shipped <strong>${fmt(item.shippedQty)}</strong> matches Invoiced <strong>${fmt(item.invoiceQty)}</strong>. Sales quantities balanced.`
      : sDiff>0 ? `Shipped <strong>${fmt(item.shippedQty)}</strong> but Invoiced only <strong>${fmt(item.invoiceQty)}</strong>. <strong>Missing Invoice for ${fmt(sDiff)} units.</strong>`
      : `Invoiced <strong>${fmt(item.invoiceQty)}</strong> but shipped only <strong>${fmt(item.shippedQty)}</strong>. Invoice may have been created before shipment.`,
    action: Math.abs(sDiff)>0.01 ? { label:"Action", steps: sDiff>0
      ? `Create Invoice for remaining <strong>${fmt(sDiff)}</strong> units from the relevant SO`
      : `Review Invoices with qty exceeding shipped — create missing Shipment or adjust Invoice qty`
    } : null
  })

  // STEP 12 — Adjustments
  steps.push({
    num:"12", title:"Inventory Adjustments", status: item.adjustments.length>0?"warn":"ok",
    finding: item.adjustments.length>0
      ? `<strong>${item.adjustments.length} Inventory Adjustment(s)</strong> found. Review each for: correct date, warehouse, account used (Inventory Asset — not P&L unless write-off), and whether Quantity or Value Adjustment.`
      : "No Inventory Adjustments found for this SKU.",
    action: item.adjustments.length>0 ? { label:"Action", steps:`Zoho Inventory → Inventory → Inventory Adjustments → Filter by SKU <strong>${item.sku}</strong> → Verify date, warehouse, account, and type for each` } : null,
    docs: item.adjustments, docType:"adjustment"
  })

  // STEP 13 — Opening Balance
  steps.push({
    num:"13", title:"Opening Balance & Initial Import", status:"info",
    finding:`If the discrepancy existed since this item's first transaction, root cause may be: incorrect opening stock, wrong opening cost, initial stock in wrong warehouse, or migration import without valuation.`,
    action:{ label:"Action", steps:`Zoho Inventory → Items → SKU <strong>${item.sku}</strong> → Review "Opening Stock" and "Opening Stock Rate" → Cross-reference with physical count on migration date → If incorrect: consult accountant — correction requires Value Adjustment or opening balance edit, not Quantity Adjustment` }
  })

  return steps
}

// ── RENDER TABLE ──────────────────────────────────────
function renderTable() {
  const filtered = getFiltered()
  const total = allData.length
  const withDiff = allData.filter(r => r.diff!==0&&r.diff!==null).length
  const ok = allData.filter(r => r.diff===0).length
  const physGt = allData.filter(r => r.diff!==null&&r.diff>0).length
  const accGt = allData.filter(r => r.diff!==null&&r.diff<0).length
  const noVal = allData.filter(r => !r.hasValuation).length
  const inactiveWh = allData.filter(r => r.hasInactiveWhIssue).length
  const totalVal = allData.reduce((s,r) => s+Math.abs(r.valueDiff||0), 0)
  const now = new Date().toLocaleString("en-CA",{timeZone:"America/Vancouver"})

  const summary = `<div class="summary-grid">
    <div class="stat ${withDiff>0?'s-alert':'s-ok'}"><div class="stat-label">SKUs with Discrepancy</div><div class="stat-value ${withDiff>0?'c-red':'c-green'}">${withDiff}</div></div>
    <div class="stat s-ok"><div class="stat-label">Reconciled</div><div class="stat-value c-green">${ok}</div></div>
    <div class="stat ${physGt>0?'s-warn':''}"><div class="stat-label">Physical &gt; Accounting</div><div class="stat-value ${physGt>0?'c-amber':''}">${physGt}</div></div>
    <div class="stat ${accGt>0?'s-alert':''}"><div class="stat-label">Accounting &gt; Physical</div><div class="stat-value ${accGt>0?'c-red':''}">${accGt}</div></div>
    <div class="stat ${inactiveWh>0?'s-alert':''}"><div class="stat-label">Inactive Warehouse</div><div class="stat-value ${inactiveWh>0?'c-red':''}">${inactiveWh}</div></div>
    <div class="stat ${totalVal>0?'s-alert':'s-ok'}"><div class="stat-label">Total Value at Risk</div><div class="stat-value ${totalVal>0?'c-red':'c-green'}" style="font-size:16px">$${totalVal.toLocaleString("en-CA",{maximumFractionDigits:0})}</div></div>
  </div>`

  const disclaimer = `<div class="disclaimer">
    <strong>Official Accounting Stock</strong> = Zoho Inventory Valuation Report (Sheet: Valuation) &nbsp;·&nbsp;
    <strong>Est. Acc. Movement</strong> = Active Bills − Invoices (diagnostic only, not official) &nbsp;·&nbsp;
    <strong>Shipment/Invoice matching</strong> = by Sales Order number
  </div>`

  const filters = `<div class="filter-bar">
    <input class="search-input" type="text" placeholder="Search SKU or name..." value="${searchTerm}" oninput="onSearch(this.value)" />
    <span class="flabel">Show:</span>
    <button class="filter-btn ${activeFilter==='all'?'active':''}" onclick="setFilter('all')">All (${total})</button>
    <button class="filter-btn ${activeFilter==='discrepancy'?'active':''}" onclick="setFilter('discrepancy')">Issues (${withDiff})</button>
    <button class="filter-btn ${activeFilter==='physical_gt'?'active':''}" onclick="setFilter('physical_gt')">Physical &gt; Acc (${physGt})</button>
    <button class="filter-btn ${activeFilter==='accounting_gt'?'active':''}" onclick="setFilter('accounting_gt')">Acc &gt; Physical (${accGt})</button>
    <button class="filter-btn ${activeFilter==='inactive_wh'?'active':''}" onclick="setFilter('inactive_wh')">Inactive WH (${inactiveWh})</button>
    <button class="filter-btn ${activeFilter==='no_val'?'active':''}" onclick="setFilter('no_val')">No Valuation (${noVal})</button>
    <button class="filter-btn ${activeFilter==='ok'?'active':''}" onclick="setFilter('ok')">OK (${ok})</button>
    <span class="flabel ml-auto">Sort:</span>
    <select class="sort-sel" onchange="setSort(this.value)">
      <option value="value_diff" ${sortBy==='value_diff'?'selected':''}>Value Impact</option>
      <option value="qty_diff" ${sortBy==='qty_diff'?'selected':''}>Qty Difference</option>
      <option value="sku" ${sortBy==='sku'?'selected':''}>SKU</option>
      <option value="physical" ${sortBy==='physical'?'selected':''}>Physical Stock</option>
    </select>
    <span class="ts-label">Updated: ${now}</span>
  </div>`

  if (!filtered.length) {
    document.getElementById("main-content").innerHTML = summary + disclaimer + filters +
      `<div class="empty-state"><div class="empty-big">✓</div><p>No items match the current filter.</p></div>`
    return
  }

  const rows = filtered.map((item, idx) => {
    const cp = causeInfo(item.primaryCause)
    const dCls = item.diff===null?"diff-zero":item.diff>0?"diff-pos":item.diff<0?"diff-neg":"diff-zero"
    const dSign = item.diff!==null&&item.diff>0?"+" : ""
    const vCls = !item.valueDiff?"":item.valueDiff>0?"c-green":item.valueDiff<0?"c-red":""
    const isOpen = openRows.has(idx)
    const draftBadge = item.draftBills.length>0?`<span style="font-size:9px;background:var(--amber-bg);color:var(--amber);padding:1px 5px;border-radius:2px;margin-left:4px;font-weight:700">${item.draftBills.length} DRAFT</span>`:""
    const whBadge = item.hasInactiveWhIssue?`<span style="font-size:9px;background:var(--red-bg);color:var(--red);padding:1px 5px;border-radius:2px;margin-left:4px;font-weight:700">INACT.WH</span>`:""

    return `<tr class="dr ${isOpen?'expanded':''}" onclick="toggleRow(${idx})">
      <td style="width:26px"><span class="arr ${isOpen?'open':''}">▶</span></td>
      <td class="sku-cell" style="width:130px">${item.sku}${draftBadge}${whBadge}</td>
      <td class="name-cell" style="width:150px" title="${item.name}">${item.name||"—"}</td>
      <td class="mono r" style="width:85px">${fmt(item.physical)}</td>
      <td class="mono r" style="width:100px">${item.hasValuation?fmt(item.accounting):'<span class="no-val">No data</span>'}</td>
      <td class="mono r" style="width:90px"><span style="font-size:10px;color:var(--muted)">${fmt(item.estAccounting)}</span></td>
      <td class="r" style="width:90px"><span class="${dCls}">${item.diff===null?"—":dSign+fmt(item.diff)}</span></td>
      <td class="r" style="width:115px"><span class="mono ${vCls}">${!item.valueDiff||item.unitCost===0?"—":fmtVal(item.valueDiff)}</span></td>
      <td style="width:175px"><span class="cp ${cp.cls}">${cp.label}</span></td>
      <td style="width:120px"><button class="open-full-btn" onclick="event.stopPropagation();openInv('${item.sku}')">Full Investigation →</button></td>
    </tr>
    <tr class="detail-row ${isOpen?'open':''}" id="drow-${idx}">
      <td class="detail-cell" colspan="10"><div class="detail-inner">${buildInlineDetail(item)}</div></td>
    </tr>`
  }).join("")

  document.getElementById("main-content").innerHTML = summary + disclaimer + filters + `
    <div id="tbl-view">
      <div class="table-wrap"><table>
        <thead><tr>
          <th style="width:26px"></th>
          <th style="width:130px">SKU</th>
          <th style="width:150px">Item Name</th>
          <th class="r" style="width:85px">Physical</th>
          <th class="r" style="width:100px">Official Acc.</th>
          <th class="r" style="width:90px">Est. Acc. Mov.</th>
          <th class="r" style="width:90px">Difference</th>
          <th class="r" style="width:115px">Value Impact</th>
          <th style="width:175px">Primary Cause</th>
          <th style="width:120px"></th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
      <p class="result-meta">${filtered.length} of ${total} SKU(s) · Official Acc. = Valuation Report · Est. Acc. Mov. = Active Bills − Invoices · Shipment↔Invoice matched by SO number</p>
    </div>
    <div id="inv-page"></div>`
}

function buildInlineDetail(item) {
  if (!item.hasValuation) return `<div style="font-size:12px;color:var(--amber);font-weight:500">⚠ No entry in Valuation Report. Check item cost and opening stock in Zoho Inventory.</div>`

  let html = ""

  if (item.hasInactiveWhIssue) {
    html += item.inactiveWhStock.map(w =>
      `<div class="wh-remark">⚠ <strong>Inactive Warehouse Stock:</strong> ${w.warehouse_name} has <strong>${fmt(w.qty)}</strong> units. This stock is in an inactive warehouse — it may not be accessible or correctly valued. Create a Transfer Order or Adjustment to resolve.</div>`
    ).join("")
  }

  if (item.draftBills.length > 0) {
    html += item.draftBills.map(b =>
      `<div class="draft-remark">⚠ <strong>Draft Bill: ${b.number||"—"}</strong> (${fmtDate(b.date)}, ${fmt(b.qty)} units) — In Draft status. Does not impact Official Accounting Stock until confirmed as Open.</div>`
    ).join("")
  }

  if (item.diff !== 0 && item.diff !== null) {
    const steps = runInvestigation(item).filter(s => s.status==="err"||s.status==="warn")
    const filtered = steps.filter(s => s.title !== "Draft Bills Detected" && s.title !== "Warehouse Analysis")
    if (filtered.length > 0) html += `<div class="steps-grid" style="margin-top:${html?'12px':'0'}">${filtered.map(s => buildStepCard(s)).join("")}</div>`
  }

  if (!html) {
    if (item.diff === 0) return `<div style="font-size:12px;color:var(--green);font-weight:500">✓ Physical and Official Accounting Stock match. No action needed.</div>`
    return `<div style="font-size:12px;color:var(--muted)">No specific document mismatches found. Review Adjustments and Opening Balance in Full Investigation.</div>`
  }
  return html
}

function buildStepCard(s) {
  const cls = {ok:"s-ok",warn:"s-warn",err:"s-err",skip:"s-skip",info:"s-info"}[s.status]||"s-skip"
  const scls = {ok:"ss-ok",warn:"ss-warn",err:"ss-err",skip:"ss-skip",info:"ss-info"}[s.status]||"ss-skip"
  const slbl = {ok:"OK",warn:"Warning",err:"Issue Found",skip:"Skip",info:"Info"}[s.status]||"Skip"
  return `<div class="sc ${cls}">
    <div class="sc-head"><span class="sc-num">Step ${s.num}</span><span class="sc-title">${s.title}</span><span class="ss ${scls}">${slbl}</span></div>
    <div class="sc-body"><div class="sc-finding">${s.finding}</div>${s.action?`<div class="sc-action"><div class="sc-action-lbl">Action</div>${s.action.steps}</div>`:""}</div>
  </div>`
}

// ── FULL INVESTIGATION ────────────────────────────────
function openInv(sku) {
  const item = allData.find(r => r.sku===sku)
  if (!item) return
  const steps = runInvestigation(item)
  const dSign = item.diff!==null&&item.diff>0?"+":""
  const dCls = item.diff===null?"":item.diff>0?"c-green":item.diff<0?"c-red":""

  const dateAlertHtml = item.dateMismatch
    ? `<div class="date-alert-box">⚠ <strong>Date mismatch.</strong> Stock synced on <strong>${item.stockDate}</strong>, Valuation synced on <strong>${item.valDate}</strong>. Run both syncs on the same day before acting on any difference.</div>`
    : ""

  const whBreakdown = item.whStock.length > 0 ? `
    <div class="wh-breakdown">
      <div class="wh-breakdown-title">Physical Stock by Warehouse</div>
      ${item.whStock.map(w => {
        const inactive = isInactiveWh(w.warehouse_name)
        const cls = inactive && w.qty > 0 ? "wh-inactive" : w.qty === 0 ? "wh-zero" : "wh-active"
        return `<div class="wh-row ${cls}">
          <span class="wh-name">${w.warehouse_name||"Unknown"}${inactive?`<span class="wh-badge wh-badge-inactive">Inactive</span>`:""}
          </span>
          <span class="wh-qty">${fmt(w.qty)} units</span>
        </div>`
      }).join("")}
    </div>` : ""

  const sourceBanner = `<div class="source-banner">
    <div class="source-box source-physical">
      <div class="source-box-lbl">Physical Stock · Stock on Hand</div>
      <div class="source-box-val">${fmt(item.physical)}</div>
      <div class="source-box-sub">Source: Zoho Stock Summary → Sheet: Stock · Sync: ${item.stockDate||"—"}</div>
      ${whBreakdown}
    </div>
    <div class="source-box source-official">
      <div class="source-box-lbl">Official Accounting Stock · Valuation Report</div>
      <div class="source-box-val">${item.hasValuation?fmt(item.accounting):"Not found"}</div>
      <div class="source-box-sub">Source: Zoho Inventory Valuation Report → Sheet: Valuation · Sync: ${item.valDate||"—"}<br>Inventory Value: $${fmt(item.inventoryValue)} · Unit Cost: $${fmt(item.unitCost)}</div>
    </div>
    <div class="source-box source-diff ${item.diff===0?'ok':''}">
      <div class="source-box-lbl">Difference = Physical − Official Accounting</div>
      <div class="source-box-val ${dCls}">${item.diff===null?"—":dSign+fmt(item.diff)}</div>
      <div class="source-box-sub">Est. Accounting Movement (Active Bills−Invoices): ${fmt(item.estAccounting)} units${item.draftBills.length>0?`<br><span style="color:var(--amber);font-weight:600">${item.draftBills.length} Draft Bill(s) pending</span>`:""}</div>
    </div>
  </div>`

  const stepsHtml = steps.map((s, idx) => {
    const cls = {ok:"s-ok",warn:"s-warn",err:"s-err",skip:"s-skip",info:"s-info"}[s.status]||"s-skip"
    const scls = {ok:"ss-ok",warn:"ss-warn",err:"ss-err",skip:"ss-skip",info:"ss-info"}[s.status]||"ss-skip"
    const slbl = {ok:"✓ OK",warn:"⚠ Warning",err:"⚠ Issue Found",skip:"— Skipped",info:"ℹ Info"}[s.status]||"Skip"
    const isOpen = s.status==="err"||s.status==="warn"

    let docsHtml = ""
    if (s.docs && s.docs.length > 0) {
      const isDraft = s.docType==="bill-draft"
      docsHtml = `<div class="doc-list">${s.docs.slice(0,8).map(d => {
        const isProblem = !isDraft && ((s.docType==="bill"&&!d.receive_id)||(s.docType==="invoice"&&!d.so_number))
        const dcls = isDraft?"fdi-draft":isProblem?"fdi-prob":"fdi-neutral"
        const linked = s.docType==="bill"
          ? (d.receive_id?`Receive: ${d.receive_number||d.receive_id}`:`<span style="color:var(--red);font-weight:600">No Receive linked</span>`)
          : s.docType==="invoice"
          ? (d.so_number?`SO: ${d.so_number}`:`<span style="color:var(--red);font-weight:600">No SO number</span>`)
          : s.docType==="shipment"
          ? (d.so_number?`SO: ${d.so_number}`:`<span style="color:var(--amber);font-weight:600">No SO — cannot match</span>`)
          : ""
        const draftNote = isDraft?`<span style="color:var(--amber);font-weight:700"> · DRAFT — not impacting accounting</span>`:""
        return `<div class="fdi ${dcls}">
          <div class="fdi-left">
            <div class="fdi-num">${d.number||"No number"}</div>
            <div class="fdi-meta">${fmtDate(d.date)}${d.status?" · "+d.status:""}${draftNote}${linked?" · "+linked:""}</div>
          </div>
          <div class="fdi-qty">${d.qty>0?fmt(d.qty)+" un":d.qty===0?"0 un":""}</div>
        </div>`
      }).join("")}${s.docs.length>8?`<div style="font-size:11px;color:var(--muted);padding:4px 0">+ ${s.docs.length-8} more</div>`:""}</div>`
    }

    return `<div class="fsc ${cls}">
      <div class="fsc-head" onclick="toggleStep(${idx})">
        <span class="fsc-num">Step ${s.num}</span>
        <span class="fsc-title">${s.title}</span>
        <span class="ss ${scls}" style="margin-left:auto">${slbl}</span>
        <span class="arr ${isOpen?'open':''}" style="margin-left:10px" id="farr-${idx}">▶</span>
      </div>
      <div class="fsc-body ${isOpen?'open':''}" id="fbdy-${idx}">
        <div class="finding-box"><div class="finding-lbl">Finding</div>${s.finding}</div>
        ${docsHtml}
        ${s.action?`<div class="action-blk"><div class="action-blk-lbl">${s.action.label}</div><div class="action-blk-body">${s.action.steps}</div></div>`:""}
      </div>
    </div>`
  }).join("")

  const invPage = document.getElementById("inv-page")
  const tblView = document.getElementById("tbl-view")
  if (invPage && tblView) {
    tblView.classList.add("hidden")
    invPage.innerHTML = `
      <button class="back-btn" onclick="closeInv()">← Back to All SKUs</button>
      ${dateAlertHtml}
      <div class="inv-hdr">
        <div class="inv-sku">${item.sku}</div>
        <div class="inv-name">${item.name||"—"}</div>
        ${sourceBanner}
      </div>
      <div class="full-steps">${stepsHtml}</div>`
    invPage.classList.add("active")
    window.scrollTo(0,0)
  }
}

function closeInv() {
  document.getElementById("inv-page").classList.remove("active")
  document.getElementById("inv-page").innerHTML=""
  document.getElementById("tbl-view").classList.remove("hidden")
}
function toggleStep(idx) {
  document.getElementById(`fbdy-${idx}`)?.classList.toggle("open")
  document.getElementById(`farr-${idx}`)?.classList.toggle("open")
}

// ── HELPERS ───────────────────────────────────────────
function norm(v){return String(v||"").trim().toUpperCase()}
function flt(v){return parseFloat(v)||0}
function fmt(n){return parseFloat(n||0).toLocaleString("en-CA",{maximumFractionDigits:2})}
function fmtVal(n){if(!n)return"$0";return`${n>0?"+":"-"}$${Math.abs(n).toLocaleString("en-CA",{minimumFractionDigits:2,maximumFractionDigits:2})}`}
function causeInfo(c){
  return({
    "receive-no-bill":{cls:"cp-rnb",label:"Receive → No Bill"},
    "bill-no-receive":{cls:"cp-bnr",label:"Bill → No Receive"},
    "shipment-no-invoice":{cls:"cp-sni",label:"Shipment → No Invoice"},
    "invoice-no-shipment":{cls:"cp-ins",label:"Invoice → No Shipment"},
    "draft-bill":{cls:"cp-draft",label:"Draft Bill Pending"},
    "inactive-warehouse":{cls:"cp-wh",label:"Inactive Warehouse"},
    "multiple":{cls:"cp-multi",label:"Multiple Causes"},
    "no-valuation":{cls:"cp-noval",label:"No Valuation Data"},
    "ok":{cls:"cp-ok",label:"Reconciled"},
  })[c]||{cls:"cp-multi",label:"Review Needed"}
}
function getFiltered(){
  let d=[...allData]
  if(searchTerm){const q=searchTerm.toLowerCase();d=d.filter(r=>r.sku.toLowerCase().includes(q)||r.name.toLowerCase().includes(q))}
  if(activeFilter==="discrepancy")d=d.filter(r=>r.diff!==0&&r.diff!==null)
  if(activeFilter==="physical_gt")d=d.filter(r=>r.diff!==null&&r.diff>0)
  if(activeFilter==="accounting_gt")d=d.filter(r=>r.diff!==null&&r.diff<0)
  if(activeFilter==="inactive_wh")d=d.filter(r=>r.hasInactiveWhIssue)
  if(activeFilter==="no_val")d=d.filter(r=>!r.hasValuation)
  if(activeFilter==="ok")d=d.filter(r=>r.diff===0)
  if(sortBy==="value_diff")d.sort((a,b)=>Math.abs(b.valueDiff||0)-Math.abs(a.valueDiff||0))
  if(sortBy==="qty_diff")d.sort((a,b)=>Math.abs(b.diff||0)-Math.abs(a.diff||0))
  if(sortBy==="sku")d.sort((a,b)=>a.sku.localeCompare(b.sku))
  if(sortBy==="physical")d.sort((a,b)=>b.physical-a.physical)
  return d
}
function toggleRow(idx){if(openRows.has(idx))openRows.delete(idx);else openRows.add(idx);renderTable()}
function setFilter(f){activeFilter=f;openRows.clear();renderTable()}
function setSort(s){sortBy=s;openRows.clear();renderTable()}
function onSearch(v){searchTerm=v;openRows.clear();renderTable()}

init()
</script>
