<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FCS Can — Accounting Reconciliation</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F5F5F5; --surface: #FFFFFF; --border: #D6D6D6;
    --text: #000000; --muted: #4B4B4D;
    --red: #E30613; --red-bg: #FDECEA;
    --green: #2D6A4F; --green-bg: #D8F3DC;
    --blue: #2F4F6F; --blue-bg: #D6E8F5;
    --amber: #7D4E00; --amber-bg: #FEF3CD;
    --purple: #4A235A; --purple-bg: #E8DAEF;
    --gray: #4B4B4D; --gray-bg: #EBEBEB;
  }
  body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header { background: #000; padding: 0 40px; display: flex; align-items: center; height: 64px; border-bottom: 3px solid var(--red); position: sticky; top: 0; z-index: 100; }
  .logo-wrap { display: flex; align-items: center; gap: 20px; }
  .company-name { color: white; font-size: 28px; font-weight: 700; letter-spacing: -0.02em; }
  .hdr-div { width: 1px; height: 28px; background: rgba(255,255,255,0.2); }
  .app-name { color: white; font-size: 13px; font-weight: 500; opacity: 0.7; }
  .tagline { color: rgba(255,255,255,0.4); font-size: 11px; font-family: 'IBM Plex Mono', monospace; letter-spacing: 0.06em; text-transform: uppercase; }
  .hdr-actions { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .btn-hdr { background: transparent; border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.7); padding: 7px 16px; font-size: 12px; font-weight: 500; cursor: pointer; border-radius: 2px; transition: all 0.15s; }
  .btn-hdr:hover { border-color: var(--red); color: white; }

  .container { max-width: 1300px; margin: 0 auto; padding: 32px 24px; }

  /* DATE ALERT */
  .date-alert { background: var(--amber-bg); border: 1px solid #F0C060; border-left: 4px solid var(--amber); border-radius: 3px; padding: 12px 18px; margin-bottom: 20px; font-size: 13px; color: var(--amber); display: none; }
  .date-alert.show { display: block; }

  /* DISCLAIMER */
  .disclaimer { background: var(--blue-bg); border: 1px solid #A8C8E8; border-left: 4px solid var(--blue); border-radius: 3px; padding: 12px 18px; margin-bottom: 20px; font-size: 12px; color: var(--blue); line-height: 1.5; }

  /* SUMMARY */
  .summary-grid { display: grid; grid-template-columns: repeat(6, minmax(0,1fr)); gap: 10px; margin-bottom: 28px; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 3px; padding: 14px 16px; border-top: 3px solid var(--border); }
  .stat.s-alert { border-top-color: var(--red); }
  .stat.s-ok { border-top-color: var(--green); }
  .stat.s-warn { border-top-color: var(--amber); }
  .stat-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 6px; }
  .stat-value { font-family: 'IBM Plex Mono', monospace; font-size: 20px; font-weight: 400; line-height: 1; }
  .c-red { color: var(--red); } .c-green { color: var(--green); } .c-amber { color: var(--amber); }

  /* FILTERS */
  .filter-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .search-input { border: 2px solid var(--text); border-radius: 3px; padding: 8px 14px; font-family: 'IBM Plex Mono', monospace; font-size: 13px; background: var(--surface); outline: none; width: 200px; }
  .search-input:focus { border-color: var(--red); }
  .flabel { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
  .filter-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 2px; padding: 7px 12px; font-size: 12px; font-weight: 500; cursor: pointer; color: var(--muted); transition: all 0.1s; }
  .filter-btn.active { background: #000; color: white; border-color: #000; }
  .filter-btn:hover:not(.active) { border-color: var(--text); color: var(--text); }
  .sort-sel { border: 1px solid var(--border); border-radius: 2px; padding: 7px 10px; font-size: 12px; background: var(--surface); outline: none; cursor: pointer; }
  .ml-auto { margin-left: auto; }
  .ts-label { font-size: 11px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; }

  /* TABLE */
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 3px; overflow: hidden; margin-bottom: 8px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { background: #000; color: white; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; text-align: left; padding: 10px 14px; white-space: nowrap; }
  thead th.r { text-align: right; }
  tbody tr.dr { border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; }
  tbody tr.dr:hover { background: #FAFAFA; }
  tbody tr.dr.expanded { background: #F0F0F0; }
  td { padding: 11px 14px; vertical-align: middle; }
  .mono { font-family: 'IBM Plex Mono', monospace; font-size: 12px; }
  .r { text-align: right; }
  .sku-cell { font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 600; }
  .name-cell { font-size: 12px; color: var(--muted); max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .diff-pos { color: var(--green); font-family: 'IBM Plex Mono', monospace; font-weight: 500; }
  .diff-neg { color: var(--red); font-family: 'IBM Plex Mono', monospace; font-weight: 500; }
  .diff-zero { color: var(--muted); font-family: 'IBM Plex Mono', monospace; }
  .no-val { color: var(--amber); font-size: 11px; font-style: italic; }

  /* CAUSE PILLS */
  .cp { display: inline-flex; align-items: center; font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 2px; white-space: nowrap; text-transform: uppercase; letter-spacing: 0.04em; }
  .cp-rnb { background: var(--amber-bg); color: var(--amber); }
  .cp-bnr { background: var(--red-bg); color: var(--red); }
  .cp-sni { background: var(--purple-bg); color: var(--purple); }
  .cp-ins { background: var(--blue-bg); color: var(--blue); }
  .cp-multi { background: var(--gray-bg); color: var(--gray); }
  .cp-ok { background: var(--green-bg); color: var(--green); }
  .cp-noval { background: var(--amber-bg); color: var(--amber); }

  /* EXPAND */
  .arr { font-size: 10px; color: var(--muted); transition: transform 0.2s; display: inline-block; }
  .arr.open { transform: rotate(90deg); }

  /* DETAIL ROW */
  .detail-row { display: none; }
  .detail-row.open { display: table-row; }
  .detail-cell { padding: 0 !important; border-bottom: 2px solid var(--red) !important; }
  .detail-inner { padding: 20px 24px; background: #F9F9F9; }

  /* STEP CARDS */
  .steps-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .sc { background: var(--surface); border: 1px solid var(--border); border-radius: 3px; overflow: hidden; }
  .sc.s-ok { border-left: 4px solid var(--green); }
  .sc.s-warn { border-left: 4px solid var(--amber); }
  .sc.s-err { border-left: 4px solid var(--red); }
  .sc.s-skip { border-left: 4px solid var(--border); opacity: 0.55; }
  .sc.s-info { border-left: 4px solid var(--blue); }
  .sc-head { display: flex; align-items: center; gap: 8px; padding: 9px 12px; border-bottom: 1px solid var(--border); }
  .sc-num { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); flex-shrink: 0; }
  .sc-title { font-size: 12px; font-weight: 600; flex: 1; }
  .ss { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 2px; text-transform: uppercase; }
  .ss-ok { background: var(--green-bg); color: var(--green); }
  .ss-warn { background: var(--amber-bg); color: var(--amber); }
  .ss-err { background: var(--red-bg); color: var(--red); }
  .ss-skip { background: var(--gray-bg); color: var(--gray); }
  .ss-info { background: var(--blue-bg); color: var(--blue); }
  .sc-body { padding: 10px 12px; font-size: 12px; }
  .sc-finding { color: var(--muted); margin-bottom: 8px; line-height: 1.5; }
  .sc-action { background: #000; color: white; border-radius: 2px; padding: 8px 10px; margin-top: 6px; font-size: 11px; line-height: 1.7; }
  .sc-action-lbl { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(255,255,255,0.4); margin-bottom: 4px; }

  /* FULL INVESTIGATION */
  #inv-page { display: none; }
  #inv-page.active { display: block; }
  #tbl-view.hidden { display: none; }

  .back-btn { display: flex; align-items: center; gap: 8px; background: none; border: none; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--text); padding: 0; margin-bottom: 24px; }
  .back-btn:hover { color: var(--red); }

  .inv-hdr { background: var(--surface); border: 1px solid var(--border); border-left: 4px solid var(--red); border-radius: 3px; padding: 20px 24px; margin-bottom: 20px; }
  .inv-hdr-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 24px; flex-wrap: wrap; margin-bottom: 16px; }
  .inv-sku { font-family: 'IBM Plex Mono', monospace; font-size: 26px; font-weight: 500; }
  .inv-name { font-size: 14px; color: var(--muted); margin-top: 4px; }
  .inv-metrics { display: flex; gap: 28px; flex-wrap: wrap; }
  .inv-metric { display: flex; flex-direction: column; gap: 2px; text-align: right; }
  .inv-metric-lbl { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
  .inv-metric-val { font-family: 'IBM Plex Mono', monospace; font-size: 20px; font-weight: 400; }

  /* OFFICIAL SOURCE BANNER */
  .source-banner { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .source-box { background: var(--bg); border: 1px solid var(--border); border-radius: 3px; padding: 12px 16px; }
  .source-box-lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 6px; }
  .source-box-val { font-family: 'IBM Plex Mono', monospace; font-size: 18px; font-weight: 400; }
  .source-box-sub { font-size: 10px; color: var(--muted); margin-top: 3px; }
  .source-official { border-top: 2px solid var(--blue); }
  .source-physical { border-top: 2px solid var(--green); }
  .source-diff { border-top: 2px solid var(--red); }
  .source-diff.ok { border-top-color: var(--green); }

  .full-steps { display: flex; flex-direction: column; gap: 10px; }
  .fsc { background: var(--surface); border: 1px solid var(--border); border-radius: 3px; overflow: hidden; }
  .fsc.s-ok { border-left: 4px solid var(--green); }
  .fsc.s-warn { border-left: 4px solid var(--amber); }
  .fsc.s-err { border-left: 4px solid var(--red); }
  .fsc.s-skip { border-left: 4px solid var(--border); opacity: 0.6; }
  .fsc.s-info { border-left: 4px solid var(--blue); }
  .fsc-head { display: flex; align-items: center; gap: 12px; padding: 14px 20px; border-bottom: 1px solid var(--border); cursor: pointer; }
  .fsc-num { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); flex-shrink: 0; width: 55px; }
  .fsc-title { font-size: 13px; font-weight: 600; flex: 1; }
  .fsc-body { padding: 18px 22px; display: none; }
  .fsc-body.open { display: block; }
  .finding-box { background: var(--bg); border: 1px solid var(--border); border-radius: 3px; padding: 14px 18px; margin-bottom: 14px; font-size: 13px; line-height: 1.6; }
  .finding-lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 8px; }
  .action-blk { background: #000; color: white; border-radius: 3px; padding: 14px 18px; }
  .action-blk-lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(255,255,255,0.4); margin-bottom: 10px; }
  .action-blk-body { font-size: 13px; line-height: 1.8; }

  .doc-list { margin: 10px 0; }
  .fdi { display: flex; justify-content: space-between; align-items: center; padding: 7px 10px; border-radius: 2px; margin-bottom: 3px; font-size: 11px; }
  .fdi.fdi-ok { background: var(--green-bg); }
  .fdi.fdi-prob { background: var(--red-bg); }
  .fdi.fdi-neutral { background: var(--gray-bg); }
  .fdi-left { display: flex; flex-direction: column; gap: 1px; }
  .fdi-num { font-family: 'IBM Plex Mono', monospace; font-weight: 500; font-size: 12px; }
  .fdi-meta { font-size: 10px; color: var(--muted); }
  .fdi-qty { font-family: 'IBM Plex Mono', monospace; font-weight: 500; }

  /* OPEN FULL BTN */
  .open-full-btn { background: #000; color: white; border: none; padding: 5px 12px; font-size: 11px; font-weight: 600; cursor: pointer; border-radius: 2px; transition: background 0.15s; white-space: nowrap; }
  .open-full-btn:hover { background: var(--red); }

  /* LOADING */
  .loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 400px; gap: 16px; }
  .loading-bar { width: 240px; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .loading-fill { height: 100%; background: var(--red); border-radius: 2px; animation: lp 1.4s ease-in-out infinite; }
  @keyframes lp { 0%,100%{width:20%} 50%{width:80%} }
  .loading-text { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--muted); }
  .empty-state { text-align: center; padding: 80px 20px; color: var(--muted); }
  .empty-big { font-size: 48px; font-family: 'IBM Plex Mono', monospace; margin-bottom: 12px; opacity: 0.15; color: var(--green); }
  .error-box { background: var(--red-bg); color: var(--red); border: 1px solid #F1948A; border-radius: 3px; padding: 14px 18px; font-size: 13px; margin-bottom: 16px; }
  .result-meta { font-size: 11px; color: var(--muted); margin-top: 8px; font-family: 'IBM Plex Mono', monospace; }
</style>
</head>
<body>

<header>
  <div class="logo-wrap">
    <div class="company-name">FCS Can Ltd.</div>
    <div class="hdr-div"></div>
    <div>
      <div class="app-name">Accounting Reconciliation</div>
      <div class="tagline">Physical vs Official Accounting Stock</div>
    </div>
  </div>
  <div class="hdr-actions">
    <button class="btn-hdr" onclick="init()">↺ Refresh Data</button>
  </div>
</header>

<div class="container">
  <div id="main-content">
    <div class="loading-screen">
      <div class="loading-bar"><div class="loading-fill"></div></div>
      <div class="loading-text" id="load-msg">Loading data...</div>
    </div>
  </div>
</div>

<script>
const SHEET_ID = "1j6D_5NN07ovQa62wVvWs_7n6uXjystpVNHoJFsNe32Y"

let allData = []
let activeFilter = "discrepancy"
let searchTerm = ""
let sortBy = "value_diff"
let openRows = new Set()

// ── LOAD ─────────────────────────────────────────────
async function readSheet(name) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(name)}&headers=1`
  const res = await fetch(url)
  const text = await res.text()
  const m = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)
  if (!m) throw new Error(`Cannot read: ${name}`)
  const json = JSON.parse(m[1])
  if (!json.table || !json.table.rows) return []
  const cols = json.table.cols.map(c => c.label || "")
  return json.table.rows.map(r => {
    const o = {}
    cols.forEach((c, i) => { o[c] = r.c[i]?.v ?? "" })
    return o
  })
}

async function init() {
  setMsg("Loading physical stock (Stock)...")
  try {
    const [stockRows, valRows, billRows, invoiceRows, movRows] = await Promise.all([
      readSheet("Stock"),
      readSheet("Valuation"),
      readSheet("Bills"),
      readSheet("Invoices"),
      readSheet("Sheet1")
    ])
    setMsg("Calculating reconciliation...")
    allData = buildReconciliation(stockRows, valRows, billRows, invoiceRows, movRows)
    renderTable()
  } catch(e) {
    document.getElementById("main-content").innerHTML =
      `<div class="error-box"><strong>Error:</strong> ${e.message}</div>`
  }
}

function setMsg(msg) {
  const el = document.getElementById("load-msg")
  if (el) { el.textContent = msg; return }
  document.getElementById("main-content").innerHTML = `
    <div class="loading-screen">
      <div class="loading-bar"><div class="loading-fill"></div></div>
      <div class="loading-text" id="load-msg">${msg}</div>
    </div>`
}

// ── RECONCILIATION ────────────────────────────────────
function buildReconciliation(stockRows, valRows, billRows, invoiceRows, movRows) {
  // Physical stock by SKU (Sheet4 — Stock)
  const physBySku = {}, nameBySku = {}, whBySku = {}, stockDateBySku = {}
  stockRows.forEach(r => {
    const sku = norm(r.sku); if (!sku) return
    physBySku[sku] = (physBySku[sku] || 0) + flt(r.physical_stock)
    if (r.item_name) nameBySku[sku] = r.item_name
    if (r.warehouse_name) whBySku[sku] = r.warehouse_name
    if (r.last_updated) stockDateBySku[sku] = String(r.last_updated).substring(0,10)
  })

  // Official Accounting Stock by SKU (Sheet5 — Valuation)
  const accBySku = {}, valValueBySku = {}, unitCostBySku = {}, valDateBySku = {}
  valRows.forEach(r => {
    const sku = norm(r.sku); if (!sku) return
    accBySku[sku] = (accBySku[sku] || 0) + flt(r.valuation_qty)
    valValueBySku[sku] = (valValueBySku[sku] || 0) + flt(r.inventory_value)
    if (flt(r.unit_cost) > 0) unitCostBySku[sku] = flt(r.unit_cost)
    if (r.as_of_date) valDateBySku[sku] = String(r.as_of_date).substring(0,10)
  })

  // Diagnostic docs by SKU
  const billsBySku = {}, invoicesBySku = {}
  const receivesBySku = {}, shipmentsBySku = {}, adjBySku = {}

  billRows.forEach(r => {
    const sku = norm(r.sku); if (!sku) return
    if (!billsBySku[sku]) billsBySku[sku] = []
    billsBySku[sku].push({
      number: r.bill_number || "", date: r.date || "",
      qty: flt(r.qty), unit_cost: flt(r.unit_cost),
      receive_id: r.receive_id || "", receive_number: r.receive_number || "",
      po_number: r.po_number || "", status: r.status || ""
    })
  })

  invoiceRows.forEach(r => {
    const sku = norm(r.sku); if (!sku) return
    if (!invoicesBySku[sku]) invoicesBySku[sku] = []
    invoicesBySku[sku].push({
      number: r.invoice_number || "", date: r.date || "",
      qty: flt(r.qty), shipment_id: r.shipment_id || "",
      shipment_number: r.shipment_number || "",
      so_number: r.so_number || "", status: r.status || ""
    })
  })

  movRows.forEach(r => {
    const sku = norm(r.sku); if (!sku) return
    const mod = r.module || "", qty = flt(r.quantity)
    const doc = { number: r.doc_number || "", date: r.timestamp || "", qty, status: r.status || "" }
    if (mod === "Purchase Receive") { if (!receivesBySku[sku]) receivesBySku[sku] = []; receivesBySku[sku].push(doc) }
    if (mod === "Shipment" || mod === "Force Fulfill") { if (!shipmentsBySku[sku]) shipmentsBySku[sku] = []; shipmentsBySku[sku].push({...doc, force: mod === "Force Fulfill"}) }
    if (mod === "Inventory Adjustment") { if (!adjBySku[sku]) adjBySku[sku] = []; adjBySku[sku].push(doc) }
  })

  // All SKUs from physical + valuation
  const allSkus = new Set([...Object.keys(physBySku), ...Object.keys(accBySku)])

  return [...allSkus].filter(s => s && s !== "SKU" && s !== "sku").map(sku => {
    const physical = physBySku[sku] ?? null
    const accounting = accBySku[sku] ?? null  // null = not in valuation report
    const hasValuation = accounting !== null
    const diff = hasValuation ? (physical || 0) - accounting : null

    const bills = billsBySku[sku] || []
    const invoices = invoicesBySku[sku] || []
    const receives = receivesBySku[sku] || []
    const shipments = shipmentsBySku[sku] || []
    const adjustments = adjBySku[sku] || []

    const billQty = bills.reduce((s,b) => s+b.qty, 0)
    const invoiceQty = invoices.reduce((s,i) => s+i.qty, 0)
    const estAccounting = billQty - invoiceQty
    const receivedQty = receives.reduce((s,r) => s+r.qty, 0)
    const shippedQty = shipments.reduce((s,s2) => s+s2.qty, 0)

    const billsNoReceive = bills.filter(b => !b.receive_id)
    const invoicesNoShipment = invoices.filter(i => !i.shipment_id)

    const unitCost = unitCostBySku[sku] || (hasValuation && accounting > 0 ? (valValueBySku[sku]||0)/accounting : 0)
    const valueDiff = diff !== null ? diff * unitCost : null

    const stockDate = stockDateBySku[sku] || ""
    const valDate = valDateBySku[sku] || ""
    const dateMismatch = stockDate && valDate && stockDate !== valDate

    // Primary cause
    let primaryCause = "ok"
    if (!hasValuation) { primaryCause = "no-valuation" }
    else if (diff !== 0 && diff !== null) {
      if (diff > 0) {
        if (receivedQty > billQty && receives.length > 0) primaryCause = "receive-no-bill"
        else if (invoicesNoShipment.length > 0) primaryCause = "invoice-no-shipment"
        else primaryCause = "multiple"
      } else {
        if (billsNoReceive.length > 0) primaryCause = "bill-no-receive"
        else if (shippedQty > invoiceQty && shipments.length > 0) primaryCause = "shipment-no-invoice"
        else primaryCause = "multiple"
      }
    }

    return {
      sku, name: nameBySku[sku] || "", warehouse: whBySku[sku] || "",
      physical: physical || 0, accounting, hasValuation,
      diff, unitCost, valueDiff, estAccounting,
      bills, invoices, receives, shipments, adjustments,
      billQty, invoiceQty, receivedQty, shippedQty,
      billsNoReceive, invoicesNoShipment,
      primaryCause, stockDate, valDate, dateMismatch,
      inventoryValue: valValueBySku[sku] || 0
    }
  })
}

// ── 10-STEP INVESTIGATION ─────────────────────────────
function runInvestigation(item) {
  const steps = []
  const diff = item.diff
  const absDiff = Math.abs(diff || 0)

  // STEP 1 — SKU + Warehouse
  steps.push({
    num:"01", title:"Item by SKU + Warehouse", status:"info",
    finding: `Physical Stock: <strong>${fmt(item.physical)}</strong> units · Warehouse: <strong>${item.warehouse || "unknown"}</strong><br>
      Official Accounting Stock (Valuation Report): <strong>${item.hasValuation ? fmt(item.accounting) : "Not found in Valuation Report"}</strong><br>
      Estimated Accounting Movement (Bills − Invoices): <strong>${fmt(item.estAccounting)}</strong> units (diagnostic only)`,
    action: null
  })

  // STEP 2 — Date validation
  const s2status = item.dateMismatch ? "warn" : "ok"
  steps.push({
    num:"02", title:"Report Date Validation", status: s2status,
    finding: item.dateMismatch
      ? `⚠️ Stock on Hand date (<strong>${item.stockDate}</strong>) differs from Valuation Report date (<strong>${item.valDate}</strong>). Reconciliation may show false discrepancies due to timing differences.`
      : `Stock on Hand and Valuation Report share the same date (<strong>${item.stockDate || "unknown"}</strong>). Date validation passed.`,
    action: item.dateMismatch ? { label:"Action", steps:`Refresh both the Stock sync and Valuation sync on the same day before running reconciliation. In Apps Script: run syncPhysicalStock then syncValuation on the same execution.` } : null
  })

  // STEP 3 — Comparison
  if (!item.hasValuation) {
    steps.push({
      num:"03", title:"Accounting vs Physical Comparison", status:"warn",
      finding:`This SKU has <strong>no entry in the Inventory Valuation Report</strong>. Physical Stock is <strong>${fmt(item.physical)}</strong> units but there is no official accounting quantity to compare against.`,
      action:{ label:"Action", steps:`In Zoho Inventory → Reports → Inventory Valuation Summary → Search for SKU <strong>${item.sku}</strong>. If not found: this item may have no cost assigned, no opening balance, or may be a service item. Check item settings and opening stock.` }
    })
    steps.push({ num:"04–10", title:"Remaining steps", status:"skip", finding:"Cannot run full investigation without Official Accounting Stock from Valuation Report.", action:null })
    return steps
  }

  if (diff === 0) {
    steps.push({ num:"03", title:"Accounting vs Physical Comparison", status:"ok", finding:`✓ Physical Stock (<strong>${fmt(item.physical)}</strong>) equals Official Accounting Stock (<strong>${fmt(item.accounting)}</strong>). This SKU is fully reconciled.`, action:null })
    steps.push({ num:"04–10", title:"Remaining steps", status:"skip", finding:"No discrepancy — no further investigation needed.", action:null })
    return steps
  }

  const direction = diff > 0
    ? `Physical Stock is <strong>+${fmt(absDiff)}</strong> units higher than Accounting Stock. Physical inventory exists without equivalent accounting recognition.`
    : `Accounting Stock is <strong>+${fmt(absDiff)}</strong> units higher than Physical Stock. Accounting records exist without equivalent physical stock.`

  steps.push({
    num:"03", title:"Accounting vs Physical Comparison", status: diff > 0 ? "warn" : "err",
    finding: direction,
    action:{ label:"Direction of Investigation", steps: diff > 0
      ? `Physical > Accounting. Check first: Purchase Receives without Bills → Opening Balance → Positive Inventory Adjustments → Stock import/migration without valuation.`
      : `Accounting > Physical. Check first: Bills without Purchase Receives → Invoices without Shipments → Negative Inventory Adjustments → Incorrect Opening Balance → Document posted before physical movement.`
    }
  })

  // STEP 4 — Bills without Receives
  const s4 = item.billsNoReceive.length > 0 ? "err" : "ok"
  steps.push({
    num:"04", title:"Bills without Purchase Receives", status:s4,
    finding: item.billsNoReceive.length > 0
      ? `<strong>${item.billsNoReceive.length} Bill(s)</strong> found with no linked Purchase Receive. These Bills increased Accounting Stock without a corresponding physical arrival.`
      : "All Bills have a linked Purchase Receive.",
    action: item.billsNoReceive.length > 0 ? { label:"Action", steps:
      item.billsNoReceive.slice(0,5).map((b,i) =>
        `${i+1}. Open Bill <strong>${b.number||"—"}</strong> → Verify if goods physically arrived → If yes: create Purchase Receive from PO <strong>${b.po_number||"—"}</strong> → If no: void or delete the Bill`
      ).join("<br>")
    } : null,
    docs: item.billsNoReceive, docType:"bill"
  })

  // STEP 5 — Invoices without Shipments
  const s5 = item.invoicesNoShipment.length > 0 ? "err" : "ok"
  steps.push({
    num:"05", title:"Invoices without Shipments", status:s5,
    finding: item.invoicesNoShipment.length > 0
      ? `<strong>${item.invoicesNoShipment.length} Invoice(s)</strong> found with no linked Shipment. These Invoices reduced Accounting Stock without a corresponding physical outbound.`
      : "All Invoices have a linked Shipment.",
    action: item.invoicesNoShipment.length > 0 ? { label:"Action", steps:
      item.invoicesNoShipment.slice(0,5).map((inv,i) =>
        `${i+1}. Open Invoice <strong>${inv.number||"—"}</strong> → Check SO <strong>${inv.so_number||"—"}</strong> → If goods shipped: create Package/Shipment from SO → If not shipped: void the Invoice`
      ).join("<br>")
    } : null,
    docs: item.invoicesNoShipment, docType:"invoice"
  })

  // STEP 6 — Receives without Bills
  const rNoBill = item.receives.length > 0 && item.bills.length === 0
  const rLtB = item.receives.length > item.bills.length
  const s6 = rNoBill || (diff > 0 && rLtB) ? "err" : "ok"
  steps.push({
    num:"06", title:"Purchase Receives without Bills", status:s6,
    finding: rNoBill
      ? `<strong>${item.receives.length} Purchase Receive(s)</strong> found but <strong>no Bills</strong> created. Goods arrived physically but were never posted to accounting.`
      : rLtB
        ? `<strong>${item.receives.length} Receive(s)</strong> vs <strong>${item.bills.length} Bill(s)</strong>. Some Receives may not have a corresponding Bill.`
        : `${item.receives.length} Receive(s) and ${item.bills.length} Bill(s) found. Volume appears balanced.`,
    action: (rNoBill || rLtB) ? { label:"Action", steps:
      item.receives.slice(0,5).map((r,i) =>
        `${i+1}. Locate PO for Receive <strong>${r.number||"—"}</strong> in Zoho Inventory → Click "Create Bill" → Confirm quantities match received → Save as Open`
      ).join("<br>")
    } : null,
    docs: item.receives, docType:"receive"
  })

  // STEP 7 — Shipments without Invoices
  const sNoInv = item.shipments.length > 0 && item.invoices.length === 0
  const sLtI = item.shipments.length > item.invoices.length
  const s7 = sNoInv || (diff < 0 && sLtI) ? "err" : "ok"
  steps.push({
    num:"07", title:"Shipments without Invoices", status:s7,
    finding: sNoInv
      ? `<strong>${item.shipments.length} Shipment(s)</strong> found but <strong>no Invoices</strong> created. Goods left physically but were never posted to accounting.`
      : sLtI
        ? `<strong>${item.shipments.length} Shipment(s)</strong> vs <strong>${item.invoices.length} Invoice(s)</strong>. Some Shipments may not have a corresponding Invoice.`
        : `${item.shipments.length} Shipment(s) and ${item.invoices.length} Invoice(s) found. Volume appears balanced.`,
    action: (sNoInv || sLtI) ? { label:"Action", steps:
      item.shipments.slice(0,5).map((s,i) =>
        `${i+1}. Open SO linked to Shipment <strong>${s.number||"—"}</strong> → Click "Create Invoice" → Confirm shipped quantities → Save as Sent`
      ).join("<br>")
    } : null,
    docs: item.shipments, docType:"shipment"
  })

  // STEP 8 — Purchase qty cross-check
  const pDiff = item.receivedQty - item.billQty
  const s8 = Math.abs(pDiff) > 0.01 ? (pDiff > 0 ? "warn" : "err") : "ok"
  steps.push({
    num:"08", title:"Purchase Qty Cross-Check (Received vs Billed)", status:s8,
    finding: Math.abs(pDiff) < 0.01
      ? `Received qty <strong>${fmt(item.receivedQty)}</strong> matches Billed qty <strong>${fmt(item.billQty)}</strong>. Purchase quantities balanced.`
      : pDiff > 0
        ? `Received <strong>${fmt(item.receivedQty)}</strong> but Billed only <strong>${fmt(item.billQty)}</strong>. <strong>Missing Bill for ${fmt(pDiff)} units.</strong>`
        : `Billed <strong>${fmt(item.billQty)}</strong> but received only <strong>${fmt(item.receivedQty)}</strong>. <strong>Bill created before goods arrived — ${fmt(Math.abs(pDiff))} units excess.</strong>`,
    action: Math.abs(pDiff) > 0.01 ? { label:"Action", steps: pDiff > 0
      ? `Open the relevant PO in Zoho Inventory → Create Bill for remaining <strong>${fmt(pDiff)}</strong> units → Ensure Bill date matches when goods were received`
      : `Find Bill(s) with qty exceeding received amounts → Edit to match actual received qty → Or create missing Purchase Receive if goods did arrive`
    } : null
  })

  // STEP 9 — Sales qty cross-check
  const sDiff = item.shippedQty - item.invoiceQty
  const s9 = Math.abs(sDiff) > 0.01 ? (sDiff > 0 ? "warn" : "err") : "ok"
  steps.push({
    num:"09", title:"Sales Qty Cross-Check (Shipped vs Invoiced)", status:s9,
    finding: Math.abs(sDiff) < 0.01
      ? `Shipped qty <strong>${fmt(item.shippedQty)}</strong> matches Invoiced qty <strong>${fmt(item.invoiceQty)}</strong>. Sales quantities balanced.`
      : sDiff > 0
        ? `Shipped <strong>${fmt(item.shippedQty)}</strong> but Invoiced only <strong>${fmt(item.invoiceQty)}</strong>. <strong>Missing Invoice for ${fmt(sDiff)} units.</strong>`
        : `Invoiced <strong>${fmt(item.invoiceQty)}</strong> but shipped only <strong>${fmt(item.shippedQty)}</strong>. <strong>Invoice created before shipment — ${fmt(Math.abs(sDiff))} units excess.</strong>`,
    action: Math.abs(sDiff) > 0.01 ? { label:"Action", steps: sDiff > 0
      ? `Open the relevant SO in Zoho Inventory → Create Invoice for remaining <strong>${fmt(sDiff)}</strong> units → Ensure Invoice date matches shipment date`
      : `Find Invoice(s) with qty exceeding shipped amounts → Create missing Shipment/Package if goods went out → Or adjust Invoice qty to match what was actually shipped`
    } : null
  })

  // STEP 10 — Adjustments
  const adjCount = item.adjustments.length
  steps.push({
    num:"10", title:"Inventory Adjustments", status: adjCount > 0 ? "warn" : "ok",
    finding: adjCount > 0
      ? `<strong>${adjCount} Inventory Adjustment(s)</strong> found. These may have altered physical quantity without a corresponding accounting entry, or vice versa. Review each for correct date, warehouse, account used, and whether it was a Quantity or Value Adjustment.`
      : "No Inventory Adjustments found for this SKU.",
    action: adjCount > 0 ? { label:"Action", steps:`Zoho Inventory → Inventory → Inventory Adjustments → Filter by SKU <strong>${item.sku}</strong> → For each: verify warehouse, date, account (must post to Inventory Asset — not P&L unless write-off), and whether it affected physical qty, inventory asset, or only valuation` } : null,
    docs: item.adjustments, docType:"adjustment"
  })

  // STEP 11 — Opening Balance
  steps.push({
    num:"11", title:"Opening Balance & Initial Import", status:"info",
    finding:`If the discrepancy existed since this item's first transaction, the root cause may be: incorrect opening stock, wrong opening cost, initial stock loaded to the wrong warehouse, or a migration import without proper valuation posting.`,
    action:{ label:"Action", steps:`Zoho Inventory → Items → Open SKU <strong>${item.sku}</strong> → Review "Opening Stock" and "Opening Stock Rate" → Cross-reference with physical count on migration date → If incorrect: consult your accountant — correction requires a Value Adjustment or opening balance edit, not a Quantity Adjustment` }
  })

  return steps
}

  const physGt = allData.filter(r => r.diff !== null && r.diff > 0).length
  const accGt = allData.filter(r => r.diff !== null && r.diff < 0).length
  const noVal = allData.filter(r => !r.hasValuation).length
  const totalVal = allData.reduce((s,r) => s + Math.abs(r.valueDiff||0), 0)
  const now = new Date().toLocaleString("en-CA", { timeZone:"America/Vancouver" })

  const summary = `<div class="summary-grid">
    <div class="stat ${withDiff>0?'s-alert':'s-ok'}">
      <div class="stat-label">SKUs with Discrepancy</div>
      <div class="stat-value ${withDiff>0?'c-red':'c-green'}">${withDiff}</div>
    </div>
    <div class="stat s-ok">
      <div class="stat-label">Reconciled</div>
      <div class="stat-value c-green">${ok}</div>
    </div>
    <div class="stat ${physGt>0?'s-warn':''}">
      <div class="stat-label">Physical &gt; Accounting</div>
      <div class="stat-value ${physGt>0?'c-amber':''}">${physGt}</div>
    </div>
    <div class="stat ${accGt>0?'s-alert':''}">
      <div class="stat-label">Accounting &gt; Physical</div>
      <div class="stat-value ${accGt>0?'c-red':''}">${accGt}</div>
    </div>
    <div class="stat ${noVal>0?'s-warn':''}">
      <div class="stat-label">No Valuation Data</div>
      <div class="stat-value ${noVal>0?'c-amber':''}">${noVal}</div>
    </div>
    <div class="stat ${totalVal>0?'s-alert':'s-ok'}">
      <div class="stat-label">Total Value at Risk</div>
      <div class="stat-value ${totalVal>0?'c-red':'c-green'}" style="font-size:16px">$${totalVal.toLocaleString("en-CA",{maximumFractionDigits:0})}</div>
    </div>
  </div>`

  const disclaimer = `<div class="disclaimer">
    <strong>Official Accounting Stock</strong> is sourced from the Zoho Inventory Valuation Report (Sheet: Valuation). 
    Bills − Invoices is used only as a diagnostic estimate to identify document mismatches and is labeled "Est. Acc. Movement" — it is not the official accounting quantity.
  </div>`

  const filters = `<div class="filter-bar">
    <input class="search-input" type="text" placeholder="Search SKU or name..." value="${searchTerm}" oninput="onSearch(this.value)" />
    <span class="flabel">Show:</span>
    <button class="filter-btn ${activeFilter==='all'?'active':''}" onclick="setFilter('all')">All (${total})</button>
    <button class="filter-btn ${activeFilter==='discrepancy'?'active':''}" onclick="setFilter('discrepancy')">Issues (${withDiff})</button>
    <button class="filter-btn ${activeFilter==='physical_gt'?'active':''}" onclick="setFilter('physical_gt')">Physical &gt; Acc (${physGt})</button>
    <button class="filter-btn ${activeFilter==='accounting_gt'?'active':''}" onclick="setFilter('accounting_gt')">Acc &gt; Physical (${accGt})</button>
    <button class="filter-btn ${activeFilter==='no_val'?'active':''}" onclick="setFilter('no_val')">No Valuation (${noVal})</button>
    <button class="filter-btn ${activeFilter==='ok'?'active':''}" onclick="setFilter('ok')">OK (${ok})</button>
    <span class="flabel ml-auto">Sort:</span>
    <select class="sort-sel" onchange="setSort(this.value)">
      <option value="value_diff" ${sortBy==='value_diff'?'selected':''}>Value Impact</option>
      <option value="qty_diff" ${sortBy==='qty_diff'?'selected':''}>Qty Difference</option>
      <option value="sku" ${sortBy==='sku'?'selected':''}>SKU</option>
      <option value="physical" ${sortBy==='physical'?'selected':''}>Physical Stock</option>
    </select>
    <span class="ts-label">Updated: ${now}</span>
  </div>`

  if (!filtered.length) {
    document.getElementById("main-content").innerHTML = summary + disclaimer + filters +
      `<div class="empty-state"><div class="empty-big">✓</div><p>No items match the current filter.</p></div>`
    return
  }

  const rows = filtered.map((item, idx) => {
    const cp = causeInfo(item.primaryCause)
    const dCls = item.diff === null ? "diff-zero" : item.diff > 0 ? "diff-pos" : item.diff < 0 ? "diff-neg" : "diff-zero"
    const dSign = item.diff !== null && item.diff > 0 ? "+" : ""
    const vCls = item.valueDiff === null ? "" : item.valueDiff > 0 ? "c-green" : item.valueDiff < 0 ? "c-red" : ""
    const isOpen = openRows.has(idx)

    return `<tr class="dr ${isOpen?'expanded':''}" onclick="toggleRow(${idx})">

      <td class="sku-cell" style="width:120px">${item.sku}</td>
      <td class="name-cell" style="width:160px" title="${item.name}">${item.name||"—"}</td>
      <td class="mono r" style="width:90px">${fmt(item.physical)}</td>

      <td style="width:180px"><span class="cp ${cp.cls}">${cp.label}</span></td>
      <td style="width:120px"><button class="open-full-btn" onclick="event.stopPropagation();openInv('${item.sku}')">Full Investigation →</button></td>
    </tr>
    <tr class="detail-row ${isOpen?'open':''}" id="drow-${idx}">
      <td class="detail-cell" colspan="10"><div class="detail-inner">${buildInlineDetail(item)}</div></td>

  }).join("")

  document.getElementById("main-content").innerHTML = summary + disclaimer + filters + `
    <div id="tbl-view">
      <div class="table-wrap"><table>
        <thead><tr>
          <th style="width:26px"></th>
          <th style="width:120px">SKU</th>
          <th style="width:160px">Item Name</th>
          <th class="r" style="width:90px">Physical</th>
          <th class="r" style="width:100px">Official Acc.</th>
          <th class="r" style="width:90px">Est. Acc. Mov.</th>
          <th class="r" style="width:95px">Difference</th>
          <th class="r" style="width:120px">Value Impact</th>
          <th style="width:180px">Primary Cause</th>
          <th style="width:120px"></th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
      <p class="result-meta">${filtered.length} of ${total} SKU(s) · Official Acc. = Valuation Report · Est. Acc. Mov. = Bills − Invoices (diagnostic only)</p>
    </div>
    <div id="inv-page"></div>`
}

function buildInlineDetail(item) {
  if (!item.hasValuation) return `<div style="font-size:12px;color:var(--amber);font-weight:500">⚠ This SKU has no entry in the Valuation Report. Check item settings and opening stock in Zoho Inventory.</div>`
  if (item.diff === 0) return `<div style="font-size:12px;color:var(--green);font-weight:500">✓ Physical and Official Accounting Stock match. No action needed.</div>`
  const steps = runInvestigation(item).filter(s => s.status === "err" || s.status === "warn")
  if (!steps.length) return `<div style="font-size:12px;color:var(--muted)">No specific document mismatches found. Review Steps 10 (Adjustments) and 11 (Opening Balance) in Full Investigation.</div>`
  return `<div class="steps-grid">${steps.map(s => buildStepCard(s)).join("")}</div>`
}

function buildStepCard(s) {
  const cls = {ok:"s-ok",warn:"s-warn",err:"s-err",skip:"s-skip",info:"s-info"}[s.status]||"s-skip"
  const scls = {ok:"ss-ok",warn:"ss-warn",err:"ss-err",skip:"ss-skip",info:"ss-info"}[s.status]||"ss-skip"
  const slbl = {ok:"OK",warn:"Warning",err:"Issue Found",skip:"Skip",info:"Info"}[s.status]||"Skip"
  return `<div class="sc ${cls}">
    <div class="sc-head"><span class="sc-num">Step ${s.num}</span><span class="sc-title">${s.title}</span><span class="ss ${scls}">${slbl}</span></div>
    <div class="sc-body">
      <div class="sc-finding">${s.finding}</div>
      ${s.action ? `<div class="sc-action"><div class="sc-action-lbl">Action</div>${s.action.steps}</div>` : ""}
    </div>
  </div>`
}

// ── FULL INVESTIGATION PAGE ───────────────────────────
function openInv(sku) {
  const item = allData.find(r => r.sku === sku)
  if (!item) return
  const steps = runInvestigation(item)
  const dSign = item.diff !== null && item.diff > 0 ? "+" : ""
  const dCls = item.diff === null ? "" : item.diff > 0 ? "c-green" : item.diff < 0 ? "c-red" : ""

  const sourceBanner = `<div class="source-banner">
    <div class="source-box source-physical">
      <div class="source-box-lbl">Physical Stock · Stock on Hand</div>
      <div class="source-box-val">${fmt(item.physical)}</div>
      <div class="source-box-sub">Source: Zoho Stock Summary (Sheet: Stock) · ${item.stockDate||"—"}</div>
    </div>
    <div class="source-box source-official">
      <div class="source-box-lbl">Official Accounting Stock · Valuation Report</div>
      <div class="source-box-val">${item.hasValuation ? fmt(item.accounting) : "Not found"}</div>
      <div class="source-box-sub">Source: Zoho Inventory Valuation Report (Sheet: Valuation) · ${item.valDate||"—"}<br>Inventory Value: $${fmt(item.inventoryValue)} · Unit Cost: $${fmt(item.unitCost)}</div>
    </div>
    <div class="source-box source-diff ${item.diff===0?'ok':''}">
      <div class="source-box-lbl">Difference = Physical − Official Accounting</div>
      <div class="source-box-val ${dCls}">${item.diff===null ? "—" : dSign+fmt(item.diff)}</div>
      <div class="source-box-sub">Est. Accounting Movement (Bills−Invoices, diagnostic only): ${fmt(item.estAccounting)} units</div>
    </div>
  </div>`

  const stepsHtml = steps.map((s, idx) => {
    const cls = {ok:"s-ok",warn:"s-warn",err:"s-err",skip:"s-skip",info:"s-info"}[s.status]||"s-skip"
    const scls = {ok:"ss-ok",warn:"ss-warn",err:"ss-err",skip:"ss-skip",info:"ss-info"}[s.status]||"ss-skip"
    const slbl = {ok:"✓ OK",warn:"⚠ Warning",err:"⚠ Issue Found",skip:"— Skipped",info:"ℹ Info"}[s.status]||"Skip"
    const isOpen = s.status === "err" || s.status === "warn"

    let docsHtml = ""
    if (s.docs && s.docs.length > 0) {
      docsHtml = `<div class="doc-list">${s.docs.slice(0,8).map(d => {
        const isProblem = (s.docType==="bill"&&!d.receive_id)||(s.docType==="invoice"&&!d.shipment_id)
        const dcls = isProblem ? "fdi-prob" : "fdi-neutral"
        const linked = s.docType==="bill"
          ? (d.receive_id ? `Receive: ${d.receive_number||d.receive_id}` : `<span style="color:var(--red);font-weight:600">No Receive linked</span>`)
          : s.docType==="invoice"
          ? (d.shipment_id ? `Shipment: ${d.shipment_number||d.shipment_id}` : `<span style="color:var(--red);font-weight:600">No Shipment linked</span>`)
          : ""
        return `<div class="fdi ${dcls}">
          <div class="fdi-left">
            <div class="fdi-num">${d.number||"No number"}</div>
            <div class="fdi-meta">${fmtDate(d.date)}${d.status?" · "+d.status:""}${linked?" · "+linked:""}</div>
          </div>
          <div class="fdi-qty">${d.qty!==undefined?fmt(d.qty)+" un":""}</div>
        </div>`
      }).join("")}${s.docs.length>8?`<div style="font-size:11px;color:var(--muted);padding:4px 0">+ ${s.docs.length-8} more</div>`:""}</div>`
    }

    return `<div class="fsc ${cls}">
      <div class="fsc-head" onclick="toggleStep(${idx})">
        <span class="fsc-num">Step ${s.num}</span>
        <span class="fsc-title">${s.title}</span>
        <span class="ss ${scls}" style="margin-left:auto">${slbl}</span>
        <span class="arr ${isOpen?'open':''}" style="margin-left:10px" id="farr-${idx}">▶</span>
      </div>
      <div class="fsc-body ${isOpen?'open':''}" id="fbdy-${idx}">
        <div class="finding-box"><div class="finding-lbl">Finding</div>${s.finding}</div>
        ${docsHtml}
        ${s.action?`<div class="action-blk"><div class="action-blk-lbl">${s.action.label}</div><div class="action-blk-body">${s.action.steps}</div></div>`:""}
      </div>
    </div>`
  }).join("")

  const invPage = document.getElementById("inv-page")
  const tblView = document.getElementById("tbl-view")
  if (invPage && tblView) {
    tblView.classList.add("hidden")
    invPage.innerHTML = `
      <button class="back-btn" onclick="closeInv()">← Back to All SKUs</button>
      <div class="inv-hdr">
        <div class="inv-hdr-top">
          <div>
            <div class="inv-sku">${item.sku}</div>
            <div class="inv-name">${item.name||"—"} ${item.warehouse?"· "+item.warehouse:""}</div>
          </div>
        </div>
        ${sourceBanner}
      </div>
      <div class="full-steps">${stepsHtml}</div>`
    invPage.classList.add("active")
    window.scrollTo(0,0)
  }
}

function closeInv() {
  document.getElementById("inv-page").classList.remove("active")
  document.getElementById("inv-page").innerHTML = ""
  document.getElementById("tbl-view").classList.remove("hidden")
}

function toggleStep(idx) {
  const b = document.getElementById(`fbdy-${idx}`)
  const a = document.getElementById(`farr-${idx}`)
  if (b) b.classList.toggle("open")
  if (a) a.classList.toggle("open")
}

// ── HELPERS ───────────────────────────────────────────
function norm(v) { return String(v||"").trim().toUpperCase() }
function flt(v) { return parseFloat(v)||0 }
function fmt(n) { return parseFloat(n||0).toLocaleString("en-CA",{maximumFractionDigits:2}) }
function fmtVal(n) {
  if (!n) return "$0"
  return `${n>0?"+":"-"}$${Math.abs(n).toLocaleString("en-CA",{minimumFractionDigits:2,maximumFractionDigits:2})}`
}
function fmtDate(ts) {
  if (!ts) return "—"
  try { return new Date(ts).toLocaleDateString("en-CA") } catch { return String(ts) }
}
function causeInfo(c) {
  return ({
    "receive-no-bill":     {cls:"cp-rnb", label:"Receive → No Bill"},
    "bill-no-receive":     {cls:"cp-bnr", label:"Bill → No Receive"},
    "shipment-no-invoice": {cls:"cp-sni", label:"Shipment → No Invoice"},
    "invoice-no-shipment": {cls:"cp-ins", label:"Invoice → No Shipment"},
    "multiple":            {cls:"cp-multi", label:"Multiple Causes"},
    "no-valuation":        {cls:"cp-noval", label:"No Valuation Data"},
    "ok":                  {cls:"cp-ok", label:"Reconciled"},
  })[c] || {cls:"cp-multi", label:"Review Needed"}
}
function getFiltered() {
  let d = [...allData]
  if (searchTerm) { const q=searchTerm.toLowerCase(); d=d.filter(r=>r.sku.toLowerCase().includes(q)||r.name.toLowerCase().includes(q)) }
  if (activeFilter==="discrepancy") d=d.filter(r=>r.diff!==0&&r.diff!==null)
  if (activeFilter==="physical_gt") d=d.filter(r=>r.diff!==null&&r.diff>0)
  if (activeFilter==="accounting_gt") d=d.filter(r=>r.diff!==null&&r.diff<0)
  if (activeFilter==="no_val") d=d.filter(r=>!r.hasValuation)
  if (activeFilter==="ok") d=d.filter(r=>r.diff===0)
  if (sortBy==="value_diff") d.sort((a,b)=>Math.abs(b.valueDiff||0)-Math.abs(a.valueDiff||0))
  if (sortBy==="qty_diff") d.sort((a,b)=>Math.abs(b.diff||0)-Math.abs(a.diff||0))
  if (sortBy==="sku") d.sort((a,b)=>a.sku.localeCompare(b.sku))
  if (sortBy==="physical") d.sort((a,b)=>b.physical-a.physical)
  return d
}
function toggleRow(idx) { if(openRows.has(idx))openRows.delete(idx);else openRows.add(idx); renderTable() }
function setFilter(f) { activeFilter=f; openRows.clear(); renderTable() }
function setSort(s) { sortBy=s; openRows.clear(); renderTable() }
function onSearch(v) { searchTerm=v; openRows.clear(); renderTable() }

init()
</script>
</body>
</html>
