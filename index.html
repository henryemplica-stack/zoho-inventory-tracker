<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FCS Can — Stock Movement Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F5F5F5; --surface: #FFFFFF; --border: #D6D6D6; --text: #000000; --muted: #4B4B4D;
    --red: #E30613; --red-bg: #FDECEA;
    --green: #2D6A4F; --green-bg: #D8F3DC;
    --blue: #2F4F6F; --blue-bg: #D6E8F5;
    --amber: #7D4E00; --amber-bg: #FEF3CD;
    --purple: #4A235A; --purple-bg: #E8DAEF;
    --teal: #0E6655; --teal-bg: #D1F2EB;
    --gray: #4B4B4D; --gray-bg: #EBEBEB;
  }
  body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header { background: #000; padding: 0 40px; display: flex; align-items: center; height: 64px; border-bottom: 3px solid var(--red); }
  header .logo-wrap { display: flex; align-items: center; gap: 20px; }
  header .company-name { color: white; font-size: 28px; font-weight: 700; letter-spacing: -0.02em; }
  header .divider { width: 1px; height: 28px; background: rgba(255,255,255,0.2); }
  header .app-name { color: white; font-size: 13px; font-weight: 500; letter-spacing: 0.04em; opacity: 0.7; }
  header .tagline { color: rgba(255,255,255,0.4); font-size: 11px; font-family: 'IBM Plex Mono', monospace; letter-spacing: 0.06em; text-transform: uppercase; }

  .container { max-width: 1040px; margin: 0 auto; padding: 36px 24px; }

  .search-row { display: flex; margin-bottom: 16px; border: 2px solid var(--text); border-radius: 3px; overflow: hidden; background: var(--surface); }
  .search-row input { flex: 1; border: none; outline: none; padding: 13px 20px; font-family: 'IBM Plex Mono', monospace; font-size: 15px; color: var(--text); background: transparent; letter-spacing: 0.04em; }
  .search-row input::placeholder { color: var(--muted); opacity: 0.5; }
  .search-row button { background: var(--red); color: white; border: none; padding: 13px 32px; font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; letter-spacing: 0.04em; transition: background 0.15s; }
  .search-row button:hover { background: #c00510; }
  .search-row button:disabled { background: #999; cursor: not-allowed; }

  .item-info-bar { background: var(--surface); border: 1px solid var(--border); border-left: 4px solid var(--red); border-radius: 3px; padding: 12px 20px; margin-bottom: 16px; display: flex; align-items: center; gap: 24px; flex-wrap: wrap; }
  .item-info-bar.hidden { display: none; }
  .item-info-field { display: flex; flex-direction: column; gap: 2px; }
  .item-info-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
  .item-info-value { font-size: 14px; font-weight: 500; }
  .item-info-value.mono { font-family: 'IBM Plex Mono', monospace; font-size: 13px; }
  .item-info-loading { font-size: 12px; color: var(--muted); font-style: italic; }
  .stock-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--blue-bg); color: var(--blue); font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 500; padding: 3px 10px; border-radius: 2px; }

  .period-row { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; padding: 13px 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 3px; flex-wrap: wrap; }
  .period-row label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); white-space: nowrap; }
  .period-row input[type=date] { border: 1px solid var(--border); border-radius: 2px; padding: 6px 10px; font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--text); background: var(--bg); outline: none; }
  .period-row input[type=date]:focus { border-color: var(--red); }
  .period-row .sep { color: var(--muted); font-size: 13px; }
  .period-row .opening-wrap { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .opening-input { width: 110px; border: 1px solid var(--border); border-radius: 2px; padding: 6px 10px; font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--text); background: var(--bg); outline: none; text-align: right; }
  .opening-input:focus { border-color: var(--red); }
  .opening-note { font-size: 10px; color: var(--muted); font-style: italic; }

  .stats-grid { display: grid; grid-template-columns: repeat(5, minmax(0,1fr)); gap: 10px; margin-bottom: 24px; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 3px; padding: 14px 16px; border-top: 3px solid var(--border); }
  .stat.has-alert { border-top-color: var(--red); }
  .stat-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 6px; }
  .stat-value { font-family: 'IBM Plex Mono', monospace; font-size: 24px; font-weight: 400; line-height: 1; }
  .stat-value.positive { color: var(--green); }
  .stat-value.negative { color: var(--red); }
  .stat-value.warn { color: var(--red); }

  .reconcile-box { background: var(--surface); border: 1px solid var(--border); border-radius: 3px; padding: 20px 24px; margin-bottom: 24px; border-left: 4px solid var(--red); }
  .reconcile-box h3 { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 16px; }
  .reconcile-grid { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 0; }
  .reconcile-item { padding: 0 20px; border-right: 1px solid var(--border); }
  .reconcile-item:first-child { padding-left: 0; }
  .reconcile-item:last-child { border-right: none; }
  .reconcile-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .reconcile-value { font-family: 'IBM Plex Mono', monospace; font-size: 22px; font-weight: 400; }
  .positive { color: var(--green); }
  .negative { color: var(--red); }
  .discrepancy-ok { color: var(--green); }
  .discrepancy-warn { color: var(--red); }

  .section-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 10px; margin-top: 24px; }
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 3px; overflow: hidden; margin-bottom: 8px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
  thead th { background: #000; color: white; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; text-align: left; padding: 9px 14px; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #FAFAFA; }
  tbody tr.row-alert { background: #FFF5F5; }
  tbody tr.row-in td.qty-col { color: var(--green); font-weight: 500; }
  tbody tr.row-out td.qty-col { color: var(--red); font-weight: 500; }
  td { padding: 10px 14px; color: var(--text); vertical-align: middle; word-break: break-word; }
  .mono { font-family: 'IBM Plex Mono', monospace; font-size: 12px; }
  .qty-col { font-family: 'IBM Plex Mono', monospace; font-weight: 500; text-align: right; }
  .badge { display: inline-flex; align-items: center; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 2px; white-space: nowrap; }
  .b-ship { background: var(--teal-bg); color: var(--teal); }
  .b-recv { background: var(--green-bg); color: var(--green); }
  .b-adj { background: var(--purple-bg); color: var(--purple); }
  .b-transfer { background: var(--gray-bg); color: var(--gray); }
  .b-return { background: var(--amber-bg); color: var(--amber); }
  .b-force { background: var(--red-bg); color: var(--red); }
  .direction { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 2px; }
  .dir-in { background: var(--green-bg); color: var(--green); }
  .dir-out { background: var(--red-bg); color: var(--red); }
  .dir-neutral { background: var(--gray-bg); color: var(--gray); }
  .alert-pill { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 2px; background: var(--red); color: white; text-transform: uppercase; letter-spacing: 0.05em; }
  .empty-state { text-align: center; padding: 80px 20px; color: var(--muted); }
  .empty-state .big { font-size: 48px; font-family: 'IBM Plex Mono', monospace; margin-bottom: 12px; opacity: 0.15; color: var(--red); }
  .empty-state p { font-size: 14px; }
  .error-box { background: var(--red-bg); color: var(--red); border: 1px solid #F1948A; border-radius: 3px; padding: 14px 18px; font-size: 13px; }
  .result-meta { font-size: 11px; color: var(--muted); margin-top: 8px; font-family: 'IBM Plex Mono', monospace; }
</style>
</head>
<body>

<header>
  <div class="logo-wrap">
    <div class="company-name">FCS Can Ltd.</div>
    <div class="divider"></div>
    <div>
      <div class="app-name">Stock Movement Tracker</div>
      <div class="tagline">Inventory Audit Tool</div>
    </div>
  </div>
</header>

<div class="container">
  <div class="search-row">
    <input type="text" id="sku-input" placeholder="Enter SKU to audit..." autocomplete="off" />
    <button id="search-btn" onclick="search()">Search</button>
  </div>

  <div class="item-info-bar hidden" id="item-info-bar">
    <div class="item-info-field">
      <div class="item-info-label">Item Name</div>
      <div class="item-info-value" id="item-name-display">—</div>
    </div>
    <div class="item-info-field">
      <div class="item-info-label">SKU</div>
      <div class="item-info-value mono" id="item-sku-display">—</div>
    </div>
    <div class="item-info-field" style="margin-left:auto">
      <div class="item-info-label">Current Physical Stock (Geotechnical)</div>
      <div id="current-stock-display" class="item-info-loading">—</div>
    </div>
  </div>

  <div class="period-row">
    <label>Period</label>
    <input type="date" id="date-from" onchange="onDateFromChange()" />
    <span class="sep">→</span>
    <input type="date" id="date-to" />
    <div class="opening-wrap">
      <div style="display:flex;flex-direction:column;gap:2px;align-items:flex-end">
        <label>Opening Stock</label>
        <span class="opening-note" id="opening-note"></span>
      </div>
      <input type="number" class="opening-input" id="opening-stock" placeholder="0" min="0" />
    </div>
  </div>

  <div id="main-content">
    <div class="empty-state">
      <div class="big">—</div>
      <p>Enter a SKU and select a period to audit stock movements</p>
    </div>
  </div>
</div>

<script>
const SHEET_ID = "1j6D_5NN07ovQa62wVvWs_7n6uXjystpVNHoJFsNe32Y"
const ZOHO_PROXY = "https://eomkur131nyolke.m.pipedream.net"

const MODULE_DIRECTION = {
  "Shipment": "out", "Force Fulfill": "out",
  "Purchase Receive": "in", "Sales Return": "in",
  "Inventory Adjustment": "neutral", "Transfer Order": "neutral",
}
const MODULE_BADGE = {
  "Shipment": "b-ship", "Purchase Receive": "b-recv",
  "Sales Return": "b-return", "Inventory Adjustment": "b-adj",
  "Transfer Order": "b-transfer", "Force Fulfill": "b-force",
}

let currentItemData = null
let allSheetRows = []

async function loadSheet() {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Sheet1&headers=1`
  const res = await fetch(url)
  const text = await res.text()
  const match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)
  if (!match) throw new Error("Could not read spreadsheet.")
  const json = JSON.parse(match[1])
  if (!json.table || !json.table.rows) return []
  return json.table.rows.map(r => ({
    timestamp: r.c[0]?.v || "",
    module: r.c[1]?.v || "",
    status: r.c[2]?.v || "",
    doc_id: r.c[3]?.v || "",
    doc_number: r.c[4]?.v || "",
    sku: r.c[5]?.v || "",
    item_name: r.c[6]?.v || "",
    quantity: parseFloat(r.c[7]?.v) || 0,
  })).filter(r => r.sku && r.sku !== "sku")
}

async function fetchZohoItem(sku) {
  const res = await fetch(`${ZOHO_PROXY}?sku=${encodeURIComponent(sku)}`)
  const d = await res.json()
  if (!d.found) return null
  return { name: d.name, sku: d.sku, warehouse_actual_available_stock: d.physical_stock }
}

function onDateFromChange() {
  const sku = document.getElementById("sku-input").value.trim().toUpperCase()
  const dateFrom = document.getElementById("date-from").value
  const dateTo = document.getElementById("date-to").value
  if (sku && allSheetRows.length) renderResults(sku, dateFrom, dateTo, parseFloat(document.getElementById("opening-stock").value) || 0)
}

async function search() {
  const sku = document.getElementById("sku-input").value.trim().toUpperCase()
  const dateFrom = document.getElementById("date-from").value
  const dateTo = document.getElementById("date-to").value
  const content = document.getElementById("main-content")
  const btn = document.getElementById("search-btn")
  if (!sku) return

  btn.disabled = true; btn.textContent = "Loading..."
  content.innerHTML = `<div class="empty-state"><div class="big">...</div><p>Loading ${sku}…</p></div>`

  currentItemData = null; allSheetRows = []
  document.getElementById("item-info-bar").classList.add("hidden")
  document.getElementById("current-stock-display").innerHTML = `<span class="item-info-loading">—</span>`

  try {
    const rows = await loadSheet()
    allSheetRows = rows.filter(r => (r.sku || "").toUpperCase() === sku)

    if (allSheetRows.length) {
      const sampleName = allSheetRows.find(r => r.item_name)?.item_name || ""
      document.getElementById("item-name-display").textContent = sampleName || "—"
      document.getElementById("item-sku-display").textContent = sku
      document.getElementById("current-stock-display").innerHTML = `<span class="item-info-loading">Fetching from Zoho…</span>`
      document.getElementById("item-info-bar").classList.remove("hidden")

      fetchZohoItem(sku).then(itemData => {
        if (itemData) {
          currentItemData = { name: itemData.name, sku: itemData.sku, currentPhysicalStock: itemData.warehouse_actual_available_stock ?? null }
          document.getElementById("item-name-display").textContent = itemData.name || sampleName
          const stock = currentItemData.currentPhysicalStock
          document.getElementById("current-stock-display").innerHTML = stock != null
            ? `<span class="stock-badge">📦 ${stock.toLocaleString()} units</span>`
            : `<span class="item-info-loading">Not found in Geotechnical</span>`
        } else {
          document.getElementById("current-stock-display").innerHTML = `<span class="item-info-loading">Not found in Zoho</span>`
        }
      }).catch(() => {
        document.getElementById("current-stock-display").innerHTML = `<span class="item-info-loading">Could not fetch stock</span>`
      })
    }

    const opening = parseFloat(document.getElementById("opening-stock").value) || 0
    renderResults(sku, dateFrom, dateTo, opening)

  } catch(e) {
    content.innerHTML = `<div class="error-box"><strong>Error:</strong> ${e.message}</div>`
  } finally {
    btn.disabled = false; btn.textContent = "Search"
  }
}

function renderResults(sku, dateFrom, dateTo, openingStock) {
  const content = document.getElementById("main-content")
  let found = [...allSheetRows]
  if (dateFrom || dateTo) {
    found = found.filter(r => {
      if (!r.timestamp) return false
      const d = new Date(r.timestamp).toLocaleDateString("en-CA", { timeZone: "America/Vancouver" })
      if (dateFrom && d < dateFrom) return false
      if (dateTo && d > dateTo) return false
      return true
    })
  }
  if (!found.length) {
    content.innerHTML = `<div class="empty-state"><div class="big">0</div><p>No movements found for <strong>${sku}</strong> in the selected period.</p></div>`
    return
  }

  let totalIn = 0, totalOut = 0, forceCount = 0
  found.forEach(r => {
    const dir = MODULE_DIRECTION[r.module] || "neutral"
    if (dir === "in") totalIn += r.quantity
    else if (dir === "out") totalOut += r.quantity
    if (r.module === "Force Fulfill") forceCount++
  })

  const expectedClosing = openingStock + totalIn - totalOut
  const modules = [...new Set(found.map(r => r.module).filter(Boolean))]
  const currentStock = currentItemData?.currentPhysicalStock
  const discrepancy = currentStock != null ? currentStock - expectedClosing : null

  const cols = discrepancy != null ? 5 : 4
  const discrepancyCell = discrepancy != null ? `<div class="reconcile-item">
    <div class="reconcile-label">Discrepancy vs Zoho</div>
    <div class="reconcile-value ${discrepancy === 0 ? 'discrepancy-ok' : 'discrepancy-warn'}">${discrepancy > 0 ? '+' : ''}${discrepancy.toLocaleString()}</div>
  </div>` : ''

  const statsHtml = `<div class="stats-grid">
    <div class="stat"><div class="stat-label">Movements</div><div class="stat-value">${found.length}</div></div>
    <div class="stat"><div class="stat-label">Total IN</div><div class="stat-value positive">+${totalIn.toLocaleString()}</div></div>
    <div class="stat"><div class="stat-label">Total OUT</div><div class="stat-value negative">-${totalOut.toLocaleString()}</div></div>
    <div class="stat ${forceCount > 0 ? 'has-alert' : ''}"><div class="stat-label">Force Fulfils</div><div class="stat-value ${forceCount > 0 ? 'warn' : ''}">${forceCount}</div></div>
    <div class="stat"><div class="stat-label">Event Types</div><div class="stat-value">${modules.length}</div></div>
  </div>`

  const reconcileHtml = `<div class="reconcile-box">
    <h3>Stock Reconciliation</h3>
    <div class="reconcile-grid" style="grid-template-columns:repeat(${cols},minmax(0,1fr))">
      <div class="reconcile-item"><div class="reconcile-label">Opening stock</div><div class="reconcile-value">${openingStock.toLocaleString()}</div></div>
      <div class="reconcile-item"><div class="reconcile-label">+ Received / Returned</div><div class="reconcile-value positive">+${totalIn.toLocaleString()}</div></div>
      <div class="reconcile-item"><div class="reconcile-label">− Shipped / Fulfilled</div><div class="reconcile-value negative">-${totalOut.toLocaleString()}</div></div>
      <div class="reconcile-item"><div class="reconcile-label">Expected closing stock</div><div class="reconcile-value ${expectedClosing < 0 ? 'discrepancy-warn' : 'discrepancy-ok'}">${expectedClosing.toLocaleString()}</div></div>
      ${discrepancyCell}
    </div>
  </div>`

  const tableRows = found.map(r => {
    const dir = MODULE_DIRECTION[r.module] || "neutral"
    const force = r.module === "Force Fulfill"
    const rowClass = force ? "row-alert" : (dir === "in" ? "row-in" : dir === "out" ? "row-out" : "")
    const qp = dir === "in" ? "+" : dir === "out" ? "-" : ""
    const dirHtml = dir === "in" ? `<span class="direction dir-in">IN</span>` : dir === "out" ? `<span class="direction dir-out">OUT</span>` : `<span class="direction dir-neutral">~</span>`
    const cls = MODULE_BADGE[r.module] || "b-adj"
    return `<tr class="${rowClass}">
      <td class="mono" style="width:120px">${formatDate(r.timestamp)}</td>
      <td style="width:150px"><span class="badge ${cls}">${r.module}</span></td>
      <td class="mono" style="width:140px">${r.doc_number || "-"}</td>
      <td style="width:200px;font-size:12px;color:var(--muted)">${r.item_name || "-"}</td>
      <td style="width:55px">${dirHtml}</td>
      <td class="qty-col" style="width:80px">${qp}${r.quantity.toLocaleString()}</td>
      <td style="width:130px">${force ? '<span class="alert-pill">▲ Force Fulfill</span>' : (r.status || "-")}</td>
    </tr>`
  }).join("")

  content.innerHTML = statsHtml + reconcileHtml + `
    <div class="section-title">All Movements</div>
    <div class="table-wrap"><table>
      <thead><tr>
        <th style="width:120px">Date</th><th style="width:150px">Type</th>
        <th style="width:140px">Document</th><th style="width:200px">Item Name</th>
        <th style="width:55px">Dir.</th><th style="width:80px;text-align:right">Qty</th>
        <th style="width:130px">Status</th>
      </tr></thead>
      <tbody>${tableRows}</tbody>
    </table></div>
    <p class="result-meta">${found.length} movement(s) for ${sku}${dateFrom ? ` from ${dateFrom}` : ''}${dateTo ? ` to ${dateTo}` : ''}</p>
  `
}

function formatDate(ts) {
  if (!ts) return "-"
  try { return new Date(ts).toLocaleString("en-US", { month:"2-digit", day:"2-digit", year:"2-digit", hour:"2-digit", minute:"2-digit", hour12:false }) }
  catch { return String(ts) }
}

document.getElementById("sku-input").addEventListener("keydown", e => { if (e.key === "Enter") search() })
document.getElementById("opening-stock").addEventListener("input", () => {
  const sku = document.getElementById("sku-input").value.trim().toUpperCase()
  const dateFrom = document.getElementById("date-from").value
  const dateTo = document.getElementById("date-to").value
  const opening = parseFloat(document.getElementById("opening-stock").value) || 0
  if (sku && allSheetRows.length) renderResults(sku, dateFrom, dateTo, opening)
})
</script>
</body>
</html>
